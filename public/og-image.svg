<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B0E14;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#312e81;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="text-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3D7AFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C65FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-gradient)"/>
  
  <!-- Subtle pattern overlay -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Moliam branding -->
  <text x="600" y="280" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="800" fill="url(#text-gradient)" letter-spacing="-2">
    Moliam
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="350" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" fill="#818389" letter-spacing="2">
    AI-POWERED OPERATIONS
  </text>
  
  <!-- Decorative elements -->
  <circle cx="200" cy="150" r="80" fill="none" stroke="rgba(61, 122, 255, 0.1)" stroke-width="2"/>
  <circle cx="1000" cy="480" r="100" fill="none" stroke="rgba(124, 101, 255, 0.1)" stroke-width="2"/>
  
  <!-- Accent line -->
  <line x1="600" y1="380" x2="600" y2="400" stroke="url(#text-gradient)" stroke-width="3"/>
</svg>
