<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="20%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="80%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="15%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowPurple" cx="85%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dotFade" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="60%" stop-color="white" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <mask id="dotMask">
      <rect width="1200" height="630" fill="url(#dotFade)"/>
    </mask>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="1" fill="#3B82F6" opacity="0.25"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0B0E14"/>

  <!-- Glow orbs -->
  <rect width="1200" height="630" fill="url(#glowBlue)"/>
  <rect width="1200" height="630" fill="url(#glowPurple)"/>

  <!-- Dot grid with fade mask -->
  <rect width="1200" height="630" fill="url(#dots)" mask="url(#dotMask)"/>

  <!-- Logo icon -->
  <rect x="568" y="175" width="64" height="64" rx="16" fill="url(#iconGrad)"/>
  <text x="600" y="220" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="800" fill="white">M</text>

  <!-- Title -->
  <text x="600" y="330" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="96" font-weight="800" fill="url(#textGrad)" letter-spacing="-3">Moliam</text>

  <!-- Subtitle -->
  <text x="600" y="385" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="400" fill="white" opacity="0.55">AI-Powered Operations for Modern Agencies</text>

  <!-- URL -->
  <text x="600" y="590" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="white" opacity="0.25" letter-spacing="2">MOLIAM.PAGES.DEV</text>

  <!-- Top accent line -->
  <line x1="500" y1="0" x2="700" y2="0" stroke="url(#barGrad)" stroke-width="1" opacity="0.4"/>

  <!-- Bottom accent bar -->
  <rect x="0" y="627" width="1200" height="3" fill="url(#barGrad)" opacity="0.7"/>
</svg>
