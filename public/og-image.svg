<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0B0E14"/>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Title text - "Moliam" -->
  <text x="600" y="250" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="72" font-weight="800" fill="url(#gradient)" text-anchor="middle" letter-spacing="-2">Moliam</text>
  
  <!-- Subtitle -->
  <text x="600" y="350" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="32" fill="#F9FAFB" text-anchor="middle">AI-Powered Operations for Modern Agencies</text>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="rgba(59,130,246,0.2)" stroke-width="2"/>
  <circle cx="1100" cy="530" r="100" fill="none" stroke="rgba(139,92,246,0.2)" stroke-width="2"/>
</svg>
