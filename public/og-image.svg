<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="630" viewBox="0 0 1200 630">
    <defs>
        <!-- Gradient definitions -->
        <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3B82F6" />
            <stop offset="100%" stop-color="#8B5CF6" />
        </linearGradient>
        
        <linearGradient id="title-gradient" x1="0%" y1="50%" x2="100%" y2="50%">
            <stop offset="0%" stop-color="#3B82F6" />
            <stop offset="50%" stop-color="#8B5CF6" />
            <stop offset="100%" stop-color="#3B82F6" />
        </linearGradient>
        
        <linearGradient id="bottom-accent-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="transparent" />
            <stop offset="50%" stop-color="#3B82F6" />
            <stop offset="75%" stop-color="#8B5CF6" />
            <stop offset="100%" stop-color="#10B981" />
            <stop offset="100%" stop-color="transparent" />
        </linearGradient>
        
        <linearGradient id="blue-glow" x1="0%" y1="0%" x2="50%" y2="50%">
            <stop offset="0%" stop-color="rgba(59,130,246,0.15)" />
            <stop offset="70%" stop-color="transparent" />
        </linearGradient>
        
        <linearGradient id="purple-glow" x1="100%" y1="100%" x2="50%" y2="50%">
            <stop offset="0%" stop-color="rgba(139,92,246,0.12)" />
            <stop offset="70%" stop-color="transparent" />
        </linearGradient>
        
        <!-- Drop shadow -->
        <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
            <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#3B82F6" flood-opacity="0.3" />
        </filter>
    </defs>

    <!-- Background -->
    <rect width="1200" height="630" fill="#0B0E14" />

    <!-- Dot grid pattern -->
    <pattern id="dot-grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
        <circle cx="1" cy="1" r="1.5" fill="rgba(59,130,246,0.12)" />
    </pattern>
    <rect width="1200" height="630" fill="url(#dot-grid)" mask="url(#vignette-mask)" />

    <!-- Vignette mask for dot/grid fading -->
    <defs>
        <mask id="vignette-mask">
            <radialGradient id="ellipse-mask" cx="50%" cy="50%" rx="70%" ry="60%">
                <stop offset="20%" stop-color="black" />
                <stop offset="70%" stop-color="transparent" />
            </radialGradient>
            <rect width="1200" height="630" fill="url(#ellipse-mask)" />
        </mask>
    </defs>

    <!-- Glow orbs -->
    <circle cx="-50" cy="-100" r="250" fill="url(#blue-glow)" />
    <circle cx="1200" cy="600" r="250" fill="url(#purple-glow)" />

    <!-- Logo icon square with drop shadow -->
    <g filter="url(#shadow)">
        <rect x="480" y="238" width="96" height="96" rx="16" fill="url(#logo-gradient)" />
        <text x="528" y="300" font-family="'Inter', Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">M</text>
    </g>

    <!-- Main title -->
    <text x="600" y="360" font-family="'Inter', Arial, sans-serif" font-size="96" font-weight="800" fill="url(#title-gradient)" text-anchor="middle" letter-spacing="-3">Moliam</text>

    <!-- Subtitle -->
    <text x="600" y="415" font-family="'Inter', Arial, sans-serif" font-size="28" font-weight="400" fill="rgba(255,255,255,0.55)" text-anchor="middle" letter-spacing="-0.3">AI-Powered Operations for Modern Agencies</text>

    <!-- Bottom gradient accent line -->
    <rect x="0" y="627" width="1200" height="3" fill="url(#bottom-accent-gradient)" opacity=".7" />

    <!-- Top border decorative line -->
    <g>
        <line x1="550" y1="0" x2="650" y2="0" stroke="rgba(139,92,246,0.4)" stroke-width="1" />
    </g>

    <!-- URL footer -->
    <text x="600" y="598" font-family="'Inter', Arial, sans-serif" font-size="16" font-weight="600" fill="rgba(255,255,255,0.25)" text-anchor="middle" letter-spacing="2" text-transform="uppercase">MOLIAM.PAGES.DEV</text>

    <!-- Bottom accent glow -->
    <rect x="0" y="617" width="1200" height="3" fill="url(#bottom-accent-gradient)" />

    <!-- Border line at top -->
    <line x1="550" y1="0" x2="650" y2="0" stroke="#8B5CF6" stroke-width="1" opacity=".4" />
</svg>
