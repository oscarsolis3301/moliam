<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moliam OG Image Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: #1a1a2e;
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
}
.og-container {
  width: 1200px;
  height: 630px;
  background: #0B0E14;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  box-shadow: 0 25px 80px rgba(0,0,0,0.5);
}

/* Dot grid pattern */
.dot-grid {
  position: absolute;
  inset: 0;
  background-image: radial-gradient(circle, rgba(59,130,246,0.12) 1px, transparent 1px);
  background-size: 32px 32px;
  mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 20%, transparent 70%);
  -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 20%, transparent 70%);
}

/* Subtle glow orbs */
.glow-blue {
  position: absolute;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, transparent 70%);
  top: -100px;
  left: -50px;
  pointer-events: none;
}
.glow-purple {
  position: absolute;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(139,92,246,0.12) 0%, transparent 70%);
  bottom: -120px;
  right: -50px;
  pointer-events: none;
}
.glow-green {
  position: absolute;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(16,185,129,0.06) 0%, transparent 70%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

/* Content */
.content {
  position: relative;
  z-index: 2;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
}

/* Logo icon */
.logo-icon {
  width: 64px;
  height: 64px;
  border-radius: 16px;
  background: linear-gradient(135deg, #3B82F6, #8B5CF6);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  font-weight: 800;
  color: white;
  letter-spacing: -1px;
  box-shadow: 0 4px 24px rgba(59,130,246,0.3);
}

.title {
  font-size: 96px;
  font-weight: 800;
  letter-spacing: -3px;
  background: linear-gradient(135deg, #3B82F6 0%, #8B5CF6 50%, #3B82F6 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.1;
}

.subtitle {
  font-size: 28px;
  font-weight: 400;
  color: rgba(255,255,255,0.55);
  letter-spacing: -0.3px;
  max-width: 600px;
}

/* Bottom bar accent */
.bottom-accent {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, #3B82F6, #8B5CF6, #10B981, transparent);
  opacity: 0.7;
}

/* Top border line */
.border-line {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 200px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(139,92,246,0.4), transparent);
}

/* URL footer */
.url {
  position: absolute;
  bottom: 28px;
  font-size: 16px;
  font-weight: 600;
  color: rgba(255,255,255,0.25);
  letter-spacing: 2px;
  text-transform: uppercase;
}
</style>
</head>
<body>
  <div class="og-container">
    <div class="dot-grid"></div>
    <div class="glow-blue"></div>
    <div class="glow-purple"></div>
    <div class="glow-green"></div>
    <div class="border-line"></div>

    <div class="content">
      <div class="logo-icon">M</div>
      <div class="title">Moliam</div>
      <div class="subtitle">AI-Powered Operations for Modern Agencies</div>
    </div>

    <div class="url">moliam.pages.dev</div>
    <div class="bottom-accent"></div>
  </div>
</body>
</html>
