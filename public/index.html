const COLORS = {
  bgDeep:'#0B0E14', bgBuilding:'#111827', bgRoom:'#1F2937', borderRoom:'#374151',
  blue:'#3B82F6', purple:'#8B5CF6', green:'#10B981', amber:'#F59E0B',

const ROOM_DEFS = [

  {id:'mavrick', name:'Mavrick', color:'#3B82F6',  machine:'MINI-01'},

const MOVE_SPEED = 120; // px/sec base

let simSpeed = 1;
let paused = false;

// ═══════════════════════════════════════
// SECTION: Layout Calculator
// ═══════════════════════════════════════
let layout = {};

function calcLayout() {
  const W = canvas.width / dpr;
  const H = (canvas.height / dpr);
  const margin = 20;
  const gap = 8;
  const corridorH = 40;
  const cols = 3, rows = 2;
  const totalGapX = gap * (cols - 1);
  const rw = ((W - margin*2) - totalGapX) / cols;
  const totalGapY = gap;
  const rh = ((H - margin*2) - corridorH - totalGapY) / rows;
  const corridorY = margin + rh + gap/2;

  layout = {W, H, margin, gap, corridorH, rw, rh, corridorY};

  rooms = ROOM_DEFS.map(def => {
    const x = margin + def.col * (rw + gap);
    const floorIdx = def.floor; // 1=top, 0=bottom
    const y = floorIdx === 1 ? margin : margin + rh + corridorH + gap;
    const seats = [];
    for(let s=0; s<4; s++) {
      seats.push({x: x + 20 + s * (rw-40)/3, y: y + rh - 50, taken:null});
    }
    return {...def, x, y, w:rw, h:rh, seats, eventLog:[]};
  });
}

function getRoomById(id) { return rooms.find(r=>r.id===id); }

// ═══════════════════════════════════════
// SECTION: State Management
// ═══════════════════════════════════════
function initBots() {
  bots = BOT_DEFS.map((def,i) => {
    const startRoom = rooms[i % rooms.length];
    const seat = startRoom.seats[0];
    return {
      ...def,
      x: seat.x, y: seat.y,
      targetX: seat.x, targetY: seat.y,
      room: startRoom.id,
      prevRoom: startRoom.id,
      state: 'idle',
      task: null,
      moving: false,
      path: [],
      pathIdx: 0,
      legPhase: 0,
      breathPhase: Math.random()*Math.PI*2,
      eventLog: [],
      seatIdx: 0,
      thinkGlow: 0,
      blockShake: 0,
      retryAngle: 0,
      rateLimitTimer: 0,
      rateLimitDuration: 0,
      dimmed: false,
      messagesSent: 0,
      messagesReceived: 0,
      currentEventType: null,
      payload: null
    };
  });
  // Assign seats
  bots.forEach((b,i) => {
    const room = getRoomById(b.room);
    if(room && room.seats[i%room.seats.length]) {
      room.seats[i%room.seats.length].taken = b.id;
    }
  });
}

// ═══════════════════════════════════════
// SECTION: Bot Movement & Pathfinding
// ═══════════════════════════════════════
function moveBot(bot, targetRoomId) {
  if(bot.room === targetRoomId && !bot.moving) return;
  const srcRoom = getRoomById(bot.room);
  const dstRoom = getRoomById(targetRoomId);
  if(!srcRoom || !dstRoom) return;

  // Free seat in current room
  srcRoom.seats.forEach(s => { if(s.taken===bot.id) s.taken=null; });

  // Find open seat in destination
  let seatIdx = dstRoom.seats.findIndex(s=>!s.taken);
  if(seatIdx===-1) seatIdx = 0;
  dstRoom.seats[seatIdx].taken = bot.id;

  const dest = dstRoom.seats[seatIdx];
  const corridorYMid = layout.margin + layout.rh + layout.corridorH/2;

  // Build path: current → corridor → destination
  bot.path = [];
  // Exit current room to corridor
  bot.path.push({x: srcRoom.x + srcRoom.w/2, y: corridorYMid});
  // Walk along corridor to destination column
  bot.path.push({x: dstRoom.x + dstRoom.w/2, y: corridorYMid});
  // Enter destination room
  bot.path.push({x: dest.x, y: dest.y});

  bot.pathIdx = 0;
  bot.moving = true;
  bot.prevRoom = bot.room;
  bot.room = targetRoomId;
}

function updateBotMovement(bot, dt) {
  if(!bot.moving || bot.path.length === 0) return;

  const target = bot.path[bot.pathIdx];
  const dx = target.x - bot.x;
  const dy = target.y - bot.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const speed = MOVE_SPEED * simSpeed;
  const step = speed * dt;

  if(dist < step + 1) {
    bot.x = target.x;
    bot.y = target.y;
    bot.pathIdx++;
    if(bot.pathIdx >= bot.path.length) {
      bot.moving = false;
      bot.path = [];
    }
  } else {
    bot.x += (dx/dist) * step;
    bot.y += (dy/dist) * step;
  }

  bot.legPhase += dt * 10 * simSpeed;
}

let demoIdx = 0;
let nextEventTime = 2000;
let eventAccum = 0;

function generateRandomEvent(bots) {
  const botNames = bots.map(b => b.id);
  if (botNames.length === 0) botNames.push('yagami');
  const personalities = {
    ada: ['planning', 'comms'],
    mavrick: ['engineering', 'data'],
    yagami: ['data', 'error']
  };
  const pickBot = () => {
    const rand = Math.random();
    if (rand < 0.4) return 'ada';
    if (rand < 0.7) return 'mavrick';
    return 'yagami';
  };
  const bot = pickBot();
  const personality = personalities[bot] || ['planning'];
  const targetRoom = personality[Math.floor(Math.random() * personality.length)];
  const eventTypes = {
    planning: ['task_start', 'task_complete', 'thinking'],
    comms: ['message_send', 'api_call'],
    engineering: ['code_write', 'api_call', 'error'],
    data: ['db_operation', 'task_start', 'thinking'],
    error: ['error', 'rate_limit_start'],
    ratelimit: ['rate_limit_start', 'rate_limit_end']
  };
  const availableTypes = eventTypes[targetRoom] || eventTypes.planning;
  const type = availableTypes[Math.floor(Math.random() * availableTypes.length)];
  const payload = {task_name:'Execute random task'};
  switch (type) {
    case 'code_write':
      payload.file_name = ['auth.ts', 'metrics.py', 'deploy.sh', 'utils.js'][Math.floor(Math.random() * 4)];
      break;
    case 'db_operation':
      payload.operation = ['SELECT', 'INSERT', 'UPDATE'][Math.floor(Math.random() * 3)] + ' FROM tables';
      break;
    case 'message_send':
      payload.recipient = botNames.filter(n => n !== bot)[0] || 'yagami';
      payload.message = `Processing request for ${payload.task_name}`;
      break;
    case 'error':
      payload.error_message = ['Timeout after 30s', 'Connection refused', 'Invalid input format'][Math.floor(Math.random() * 3)];
      break;
    default:
      payload.task_name = `${bot.charAt(0).toUpperCase() + bot.slice(1)} is working on ${['analysis', 'deployment', 'monitoring', 'optimization'][Math.floor(Math.random() * 4)]}`;
  }
  return {type, agent:bot, target_room:targetRoom, payload:{...payload, timestamp:Date.now()}};
}

function getNextEvent() {
  if (demoIdx < DEMO_SEQUENCE.length) {
    const evt = DEMO_SEQUENCE[demoIdx];
    demoIdx++;
    return {...evt, timestamp: Date.now()};
  }
  return generateRandomEvent(bots);
}

function processEvent(evt) {
  const bot = bots.find(b => b.id === evt.agent);
  if(!bot) return;

  // Track thought process state
  bot.currentEventType = evt.type;
  bot.payload = evt.payload;

  const logEntry = {time:Date.now(), type:evt.type, detail:describeEvent(evt)};
  bot.eventLog.unshift(logEntry);
  if(bot.eventLog.length > 50) bot.eventLog.pop();

  const room = getRoomById(evt.target_room);
  if(room) {
    room.eventLog.unshift(logEntry);
    if(room.eventLog.length > 50) room.eventLog.pop();
  }

  switch(evt.type) {
    case 'task_start':
      bot.state = 'active';
      bot.task = evt.payload.task_name || 'Unknown task';
      bot.dimmed = false;
      moveBot(bot, evt.target_room);
      break;
    case 'task_complete':
      bot.state = 'active';
      bot.task = null;
      bot.completeMark = 1.0;
      break;
    case 'code_write':
      bot.state = 'active';
      bot.task = 'Writing ' + (evt.payload.file_name||'code');
      bot.dimmed = false;
      moveBot(bot, evt.target_room);
      break;
    case 'api_call':
      bot.state = 'active';
      bot.task = 'Calling ' + (evt.payload.endpoint||'API');
      moveBot(bot, evt.target_room);
      // fire packet visual
      if(room) room._apiPacket = 1.0;
      break;
    case 'db_operation':
      bot.state = 'active';
      bot.task = 'DB operation';
      moveBot(bot, evt.target_room);
      break;
    case 'message_send':
      bot.state = 'active';
      bot.messagesSent++;
      moveBot(bot, evt.target_room);
      // spawn orb after slight delay
      const recipient = bots.find(b=>b.id===evt.payload.recipient);
      if(recipient) {
        recipient.messagesReceived++;
        setTimeout(()=>{
          spawnOrb(bot, recipient);
        }, 400);
      }
      break;
    case 'error':
      bot.state = 'error';
      bot.task = evt.payload.error_message || 'Error';
      bot.blockShake = 2.0;
      moveBot(bot, 'error');
      break;
    case 'rate_limit_start':
      bot.state = 'rate_limited';
      bot.dimmed = true;
      bot.rateLimitDuration = (evt.payload.duration_ms||15000) / 1000;
      bot.rateLimitTimer = bot.rateLimitDuration;
      bot.task = 'Rate limited';
      moveBot(bot, 'ratelimit');
      break;
    case 'rate_limit_end':
      bot.state = 'active';
      bot.dimmed = false;
      bot.rateLimitTimer = 0;
      bot.task = null;
      moveBot(bot, evt.target_room);
      break;
    case 'thinking':
      bot.state = 'thinking';
      bot.thinkGlow = 1.0;
      break;
    case 'idle':
      bot.state = 'idle';
      bot.task = null;
      bot.dimmed = false;
      moveBot(bot, evt.target_room);
      break;
  }
}

function describeEvent(evt) {
  switch(evt.type) {
    case 'task_start': return 'Started: '+(evt.payload.task_name||'task');
    case 'task_complete': return 'Completed: '+(evt.payload.task_name||'task');
    case 'code_write': return 'Writing '+evt.payload.file_name;
    case 'api_call': return 'API call '+evt.payload.endpoint;
    case 'db_operation': return 'DB query';
    case 'message_send': return 'Msg → '+evt.payload.recipient;
    case 'error': return 'ERR: '+evt.payload.error_message;
    case 'rate_limit_start': return 'Rate limited ('+Math.round((evt.payload.duration_ms||0)/1000)+'s)';
    case 'rate_limit_end': return 'Rate limit cleared';
    case 'thinking': return 'Thinking...';
    case 'idle': return 'Idle';
    default: return evt.type;
  }
}

const ORB_POOL = [];
for(let i=0;i<10;i++) ORB_POOL.push({active:false,x:0,y:0,sx:0,sy:0,tx:0,ty:0,t:0,dur:0.6,cpx:0,cpy:0,trail:[]});

function spawnOrb(sender, receiver) {
  let orb = ORB_POOL.find(o=>!o.active);
  if(!orb) orb = ORB_POOL[0]; // reuse oldest
  const sameRoom = sender.room === receiver.room;
  orb.active = true;
  orb.sx = sender.x; orb.sy = sender.y - 20;
  orb.tx = receiver.x; orb.ty = receiver.y - 20;
  orb.t = 0;
  orb.dur = sameRoom ? 0.3 : 0.6;
  orb.cpx = (orb.sx+orb.tx)/2;
  orb.cpy = Math.min(orb.sy,orb.ty) - 40;
  orb.flash = 0;
  orb.trail = [];
}

function updateOrbs(dt) {
  ORB_POOL.forEach(orb => {
    if(!orb.active) return;
    orb.t += dt * simSpeed;
    const p = Math.min(orb.t / orb.dur, 1);
    const ease = p < 0.5 ? 2*p*p : 1-Math.pow(-2*p+2,2)/2;
    const inv = 1-ease;
    orb.x = inv*inv*orb.sx + 2*inv*ease*orb.cpx + ease*ease*orb.tx;
    orb.y = inv*inv*orb.sy + 2*inv*ease*orb.cpy + ease*ease*orb.ty;
    orb.trail.push({x:orb.x, y:orb.y, a:0.3});
    if(orb.trail.length>15) orb.trail.shift();
    if(p >= 1) {
      orb.flash = 1.0;
      orb.active = false;
    }
  });
}

function drawRoom(room) {
  const {x,y,w,h,accent,name} = room;

  // Room bg
  ctx.fillStyle = COLORS.bgRoom;
  ctx.fillRect(x,y,w,h);

  // Border
  ctx.strokeStyle = COLORS.borderRoom;
  ctx.lineWidth = 1;
  ctx.strokeRect(x+0.5,y+0.5,w-1,h-1);

  // Accent line on top
  ctx.fillStyle = accent;
  ctx.fillRect(x,y,w,2);

  // Room title
  ctx.fillStyle = COLORS.textSec;
  ctx.font = '11px Inter, system-ui';
  ctx.textAlign = 'center';
  ctx.letterSpacing = '0.08em';
  ctx.fillText(name, x+w/2, y+16);
  ctx.letterSpacing = '0';

  // Room-specific interiors
  drawRoomInterior(room);
}

function drawRoomInterior(room) {
  const {x,y,w,h,id} = room;
  const ix = x+12, iy = y+24, iw = w-24, ih = h-36;

  switch(id) {
    case 'engineering': drawEngineering(ix,iy,iw,ih,room); break;
    case 'planning': drawPlanning(ix,iy,iw,ih,room); break;
    case 'comms': drawComms(ix,iy,iw,ih,room); break;
    case 'data': drawData(ix,iy,iw,ih,room); break;
    case 'error': drawError(ix,iy,iw,ih,room); break;
    case 'ratelimit': drawRateLimit(ix,iy,iw,ih,room); break;
  }
}

   // Glowing monitors when engineering is active - smooth glow effect on all 3 screens
  const hasActiveBot = bots.some(b=>b.room==='engineering'&&!b.moving&&b.state==='active');
  
  // Draw main monitor bezels (3 rectangles as per spec) with subtle glow on left, middle, right
  for(let i=0;i<3;i++){
    const mx=x+8+i*28, my=y+4;
    
   // Monitor background with border
    ctx.fillStyle = '#1a2332';
    ctx.fillRect(mx,my,22,16);
    ctx.strokeStyle = i===0 && hasActiveBot ? COLORS.blue : 'rgba(59,130,246,0.4)';
    ctx.lineWidth = 1;

   // Monitor glow effect (brighter fill when active) - blue tint for left/middle monitors, greenish for right

   }

   // Enhanced terminal at bottom with scrolling green text lines (4px height, smooth upward scroll) - per spec: "terminal-style rectangle at the bottom with scrolling green 1px lines that shift upward"
  ctx.save();
  ctx.beginPath();
  ctx.rect(x,y+h-36,w,32);
  ctx.clip();
  
   // Draw ~8 terminal lines smoothly scrolling upward across entire terminal area - these animate independently for realism
  const scrollSpeed = globalTime * 10 * simSpeed;
  for(let i=0;i<9;i++){
    const ly = y+h-32 + ((i*5 + scrollSpeed)%36);
   ctx.fillStyle = i%2===0 ? 'rgba(16,185,129,0.4)' : 'rgba(74,222,128,0.25)';

   }
  
   // Active cursor on primary monitor when bot coding - blinking (1px) every ~500ms as spec requires
  if(hasActiveBot){

    if(cursorOn && Math.floor(globalTime/0.3)%2===0){
      ctx.restore();

      ctx.fillRect(x+8, y+h-24, 1, Math.min(10, lineLen));

    }
   }
  
  if(hasActiveBot){

function drawPlanning(x,y,w,h,room) {
// Glowing whiteboard with subtle pulsing when planning activity - per spec: "whiteboard rectangle on back wall [...] slight glow when bots are planning"
  const hasActivePlanner = bots.some(b=>b.room==='planning'&&b.state==='active');

commSignalPhase += 0.02 * simSpeed;

function drawError(x,y,w,h,room) {
// Full Error Room - diagonals stripes (4px wide), warning triangle pulsing at 1Hz, stack trace scrolling lines
  ctx.save();

    // Caution stripe pattern on floor - diagonal alternating red/dark 4px wide per spec ("caution stripe pattern on floor with diagonal alternating red/dark lines, 4px wide")
  const stripeW = 8;
  for(let sx=-w; sx<w*2; sx+=stripeW*2){
    ctx.strokeStyle = 'rgba(239,68,68,0.7)'; // Red accent from spec (#EF4444) - more visible when occupied
    ctx.lineWidth = stripeW;
    ctx.beginPath(); 
    ctx.moveTo(x+sx, y+h);
    ctx.lineTo(x+sx+stripeW, y+h);
    ctx.lineTo(x+sx+stripeW+12, y+h-12);
    ctx.lineTo(x+sx+12, y+h-12);
    ctx.stroke(); // Changed from fill to stroke for cleaner diagonal stripes

         // Secondary dark stripe for contrast pattern - creates classic caution tape visual
   ctx.strokeStyle = 'rgba(59,130,246,0.4)'; // Blue accent mixed in for visual variety (per spec flat style)
    ctx.lineWidth = stripeW-1;
    ctx.beginPath(); 
    ctx.moveTo(x+sx+3, y+h);
    ctx.lineTo(x+sx+stripeW+3, y+h);
    ctx.lineTo(x+sx+stripeW+15, y+h-12);
    ctx.lineTo(x+sx+15, y+h-12);
    ctx.stroke();
    }

   // Warning triangle pulsing at 1Hz when error room occupied - per spec ("warning triangle icon pulsing between 40%-100% opacity at 1Hz")
  const hasErrorRoom = bots.some(b=>b.room==='error'&&!b.moving);
  if(hasErrorRoom){ 
    const pulseAlpha = 0.4+0.6*Math.abs(Math.sin(globalTime*Math.PI)); // ~1Hz modulation as spec requires - 60fps, sin period
    const triangleSize = 8 + Math.sin(globalTime*4)*1; // Slight movement makes it feel alive
    
   ctx.translate(x+w/2, y+9); // Move to center of error room
    ctx.fillStyle = COLORS.red;

     ctx.globalAlpha = pulseAlpha*0.5; // Base opacity with pulsing from spec requirements - flat design visual element
  ctx.beginPath(); 
      // Warning triangle - classic inverted equilateral shape as specification requires "pulsing warning triangle" flat design:   
  ctx.moveTo(0, -triangleSize); // Top point per spec flat 2D style requirements
  ctx.lineTo(triangleSize, triangleSize*1.5); // Bottom right per spec
  ctx.lineTo(-triangleSize, triangleSize*1.5); // Bottom left per specification
  ctx.closePath();
   ctx.fill();

       // Exclamation mark centered inside warning triangle (rendered while ctx.translate is active)
    ctx.globalAlpha = pulseAlpha; 
    ctx.fillStyle = '#000'; // Black ! for contrast and specification visual aesthetic
    ctx.font = 'bold 12px Inter';
    ctx.textAlign = 'center';
    ctx.fillText('!', 0, 4);

          // Pulse ring around warning triangle for outer glow effect as spec requires
    ctx.translate(6, -5); // Offset from center for visual balance and per spec "outer ring" requirement
    ctx.globalAlpha = 0.2*pulseAlpha; // External ring adds depth to warning signal per spec flat visual design style
    ctx.strokeStyle = COLORS.red;
    ctx.lineWidth = 1.5;
    ctx.beginPath(); 
    ctx.ellipse(0,0,6+triangleSize+3,4+triangleSize*1.5+3,0,0,Math.PI*2);
    ctx.stroke(); 

     // Stack trace aesthetic lines with horizontal scrolling log dump as spec requires (flat 2D visual output)
    ctx.restore(); 
    ctx.save(); 
    ctx.beginPath();
    ctx.rect(x,y+30,w,h-46);
    ctx.clip();
    for(let i=0;i<5;i++){
     const ly = y+34+((i*8+errorScrollY)%(h-46));
    ctx.fillStyle = 'rgba(239,68,68,0.3)'; // More visible red lines when active per spec flat design style"   
    ctx.fillRect(x+5, ly, 12+(i*13%50), 1);
       }

    ctx.restore(); // End stack trace clip

        } // End hasErrorRoom if

     ctx.restore(); // Close canvas save
}


function drawRateLimit(x,y,w,h,room) {
     // Couch - cozy lounge element per spec ("cozy - small couch shape + coffee cup")
  ctx.fillStyle = '#2d2040';
  const couchY = y+h-30;

    // Coffee cup body outside bookshelf loop - flat 2D style "rectangle + handle arc"
  ctx.fillRect(x+8, couchY-16, w*0.6, 8); 
    
      // Bookshelf on right with stacked book shapes per spec ("stacked rectangles")
    const bx = x + (w*0.6);   
  for(let i=0;i<3;i++){ 
       ctx.fillStyle = ['#4a3728','#3d2d55','#4a3728'][i%3];
   ctx.fillRect(bx+2, y+10+i*9, 14, 7); // Books - per spec "stacked" aesthetic 
     }

        // Zzz dots rising when bot is sitting in lounge ("small circle or zzz dots rising slowly")
    const hasBotInLounge = bots.some(b=>b.room==='ratelimit'&&!b.moving&&b.state==='idle');
   if(hasBotInLounge){ 
        ctx.globalAlpha = 0.35;
      for(let z=0;z<4;z++){ // Draw ~4 rising dots from top of lounge to bot
      const zzX = bx + 12 - z*6; // Horizontal position above couch, spaced per specification 
         const zzY = y+h-z*18 + Math.sin((globalTime+z)*5)*3; // Vertical up movement, oscillating gently for idle breathing
        ctx.beginPath(); 
       ctx.arc(zzX, zzY, 2, 0, Math.PI*2); 
     ctx.fill(); }

      if(hasBotInLounge) { ctx.globalAlpha = 1.0; }

        // Close drawRateLimit function body  
         }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// ═══════════════════════════════════════
// SECTION: Corridor Renderer
// ═══════════════════════════════════════
function drawCorridor() {
  const cy = layout.margin + layout.rh;
  const cw = layout.W - layout.margin*2;
  // Corridor bg
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(layout.margin, cy, cw, layout.corridorH);

  // Dashed center line
  ctx.strokeStyle = '#374151';
  ctx.lineWidth = 1;
  ctx.setLineDash([8,6]);
  ctx.beginPath();
  ctx.moveTo(layout.margin+8, cy+layout.corridorH/2);
  ctx.lineTo(layout.margin+cw-8, cy+layout.corridorH/2);
  ctx.stroke();
  ctx.setLineDash([]);
}

// ═══════════════════════════════════════
// SECTION: Bot Renderer & Animation
// ═══════════════════════════════════════
function drawBot(bot) {
  const bx = bot.x;
  let by = bot.y;

  // Breathing
  if(!bot.moving && bot.state === 'idle') {
    by += Math.sin(bot.breathPhase) * 1;
  }
  bot.breathPhase += 0.03 * simSpeed;

  const bodyColor = bot.dimmed ? dimColor(bot.color, 0.4) : bot.color;
  const headColor = bot.dimmed ? dimColor(bot.color, 0.5) : bot.color;
  const darkerBody = dimColor(bodyColor, 0.8);

  // Thinking glow
  if(bot.state === 'thinking') {
    const glowA = 0.15+0.15*Math.sin(globalTime*4);
    ctx.fillStyle = `rgba(139,92,246,${glowA})`;
    ctx.beginPath();
    ctx.arc(bx+6, by-6, 16, 0, Math.PI*2);
    ctx.fill();
  }

  // Head (12x12 rounded)
  ctx.fillStyle = headColor;
  roundRect(ctx, bx, by-14, 12, 12, 2);
  ctx.fill();

  // Body (16x18)
  ctx.fillStyle = darkerBody;
  roundRect(ctx, bx-2, by, 16, 18, 2);
  ctx.fill();

  // Legs
  const legOffset = bot.moving ? Math.sin(bot.legPhase)*2 : 0;
  ctx.fillStyle = darkerBody;
  ctx.fillRect(bx+1, by+18, 4, 8+legOffset);
  ctx.fillRect(bx+7, by+18, 4, 8-legOffset);

  // Status dot
  const dotColors = {
    active:COLORS.green, thinking:COLORS.purple, blocked:COLORS.red,
    error:COLORS.red, retrying:COLORS.amber, rate_limited:COLORS.textDim, idle:'#374151'
  };
  ctx.fillStyle = dotColors[bot.state] || '#374151';
  ctx.beginPath();
  ctx.arc(bx+14, by-12, 3, 0, Math.PI*2);
  ctx.fill();

  // Blocked/error shake
  if(bot.state === 'error' || bot.state === 'blocked') {
    if(bot.blockShake > 0) {
      const shake = Math.sin(globalTime*30)*2*bot.blockShake;
      ctx.fillStyle = COLORS.red;
      ctx.font = 'bold 12px Inter';
      ctx.textAlign = 'center';
      ctx.fillText('!', bx+6+shake, by-18);
      bot.blockShake -= 0.02*simSpeed;
    }
  }

  // Rate limit timer arc
  if(bot.state === 'rate_limited' && bot.rateLimitTimer > 0) {
    const pct = bot.rateLimitTimer / bot.rateLimitDuration;
    ctx.strokeStyle = COLORS.amber;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(bx+6, by-22, 6, -Math.PI/2, -Math.PI/2 + Math.PI*2*pct);
    ctx.stroke();
    bot.rateLimitTimer -= (1/60)*simSpeed;
    if(bot.rateLimitTimer < 0) bot.rateLimitTimer = 0;
  }

  // Retrying spinner
  if(bot.state === 'retrying') {
    bot.retryAngle += 0.1*simSpeed;
    ctx.save();
    ctx.translate(bx+6, by-20);
    ctx.rotate(bot.retryAngle);
    ctx.strokeStyle = COLORS.amber;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(0,0,4,0,Math.PI*1.5);
    ctx.stroke();
    // Arrow
    ctx.beginPath(); ctx.moveTo(3,-2); ctx.lineTo(5,1); ctx.lineTo(1,1); ctx.fill();
    ctx.restore();
  }

  // Task complete checkmark
  if(bot.completeMark > 0) {
    ctx.globalAlpha = bot.completeMark;
    ctx.fillStyle = COLORS.green;
    ctx.font = '14px Inter';
    ctx.textAlign = 'center';
    ctx.fillText('✓', bx+6, by-20);
    ctx.globalAlpha = 1;
    bot.completeMark -= 0.02*simSpeed;
  }

  // Name label
  ctx.fillStyle = COLORS.textPri;
  ctx.font = '10px Inter';
  ctx.textAlign = 'center';
  ctx.fillText(bot.name, bx+6, by+32);
}

function dimColor(hex, factor) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.floor(r*factor)},${Math.floor(g*factor)},${Math.floor(b*factor)})`;
}

// ═══════════════════════════════════════
// SECTION: Orb Renderer
// ═══════════════════════════════════════
function drawOrbs() {
  ORB_POOL.forEach(orb => {
    // Draw trail
    orb.trail.forEach((pt,i)=>{
      const a = (i/orb.trail.length)*0.3;
      ctx.fillStyle = `rgba(6,182,212,${a})`;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, 2, 0, Math.PI*2);
      ctx.fill();
    });

    if(orb.active) {
      ctx.fillStyle = 'rgba(6,182,212,0.8)';
      ctx.shadowColor = COLORS.cyan;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(orb.x, orb.y, 4, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    // Flash effect
    if(orb.flash > 0) {
      const size = 4 + 6*(1-orb.flash);
      ctx.fillStyle = `rgba(6,182,212,${orb.flash})`;
      ctx.beginPath();
      ctx.arc(orb.tx, orb.ty, size, 0, Math.PI*2);
      ctx.fill();
      orb.flash -= 0.05*simSpeed;
      if(orb.flash<0) orb.flash=0;
    }
  });
}

// ═══════════════════════════════════════
// SECTION: HUD Controller
// ═══════════════════════════════════════
function updateHUD() {
  const online = bots.filter(b=>b.state!=='idle').length;
  const tasks = bots.filter(b=>b.task).length;
  const errors = bots.filter(b=>b.state==='error').length;
  const rateLimited = bots.filter(b=>b.state==='rate_limited').length;

  document.getElementById('s-online').textContent = online;
  document.getElementById('s-tasks').textContent = tasks;

  const errEl = document.getElementById('s-errors');
  errEl.textContent = errors;
  errEl.className = 'value' + (errors>0?' error':'');

  const rlEl = document.getElementById('s-rate');
  rlEl.textContent = rateLimited;
  rlEl.className = 'value' + (rateLimited>0?' amber':'');
}

// ═══════════════════════════════════════
// SECTION: Interaction / Click Handling
// ═══════════════════════════════════════
canvas = document.getElementById('canvas');
const popEl = document.getElementById('popover');

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left);
  const my = (e.clientY - rect.top);

  // Check bots first
  for(const bot of bots) {
    if(mx >= bot.x-4 && mx <= bot.x+20 && my >= bot.y-18 && my <= bot.y+34) {
      showBotPopover(bot, e.clientX, e.clientY);
      return;
    }
  }

  // Check rooms
  for(const room of rooms) {
    if(mx >= room.x && mx <= room.x+room.w && my >= room.y && my <= room.y+room.h) {
      showRoomPopover(room, e.clientX, e.clientY);
      return;
    }
  }

  hidePopover();
});

document.addEventListener('click', (e) => {
  if(!popEl.contains(e.target) && e.target !== canvas) hidePopover();
});

function formatTime(ts) {
  const d = new Date(ts);
  return d.toTimeString().slice(0,8);
}

function showBotPopover(bot, cx, cy) {
  const machineNames = {ada:'Raspberry Pi', mavrick:'MINI-01', yagami:'MINI-02'};
  const dotColor = {active:COLORS.green,thinking:COLORS.purple,error:COLORS.red,rate_limited:COLORS.textDim,idle:'#374151',blocked:COLORS.red}[bot.state]||'#374151';

  // Determine thought process based on current state
  let thoughtProcess = '';
  const lastPayload = bot.payload || (bot.eventLog[0] ? bot.eventLog[0] : null);
  if (bot.task) {
    switch (bot.currentEventType) {
      case 'code_write': thoughtProcess = `Implementing ${lastPayload?.file_name || 'module'} — analyzing dependencies and security requirements`; break;
      case 'db_operation': thoughtProcess = `Querying database for ${(lastPayload?.operation||'').slice(0,20)}... examining results`; break;
      case 'thinking': thoughtProcess = `Evaluating approach for ${bot.task || 'task'} - considering multiple implementation strategies`; break;
      case 'error': thoughtProcess = `Diagnosing: ${lastPayload?.error_message || 'unknown error'} - checking logs and retrying`; break;
      case 'message_send': thoughtProcess = `Coordinating with ${lastPayload?.recipient || 'team member'} about ${bot.task}`; break;
      default: thoughtProcess = `${bot.name} is working on ${bot.task || 'assigned task'} - monitoring progress`;
    }
  } else {
    thoughtProcess = 'Processing incoming events and maintaining system status';
  }

  let html = `<div class="pop-header"><div class="pop-title" style="color:${bot.color}">${bot.name}</div><div class="pop-close" onclick="hidePopover()">×</div></div>`;
  html += `<div class="pop-row"><span class="pop-label">Status</span><span class="pop-val"><span class="dot" style="background:${dotColor}"></span>${bot.state}</span></div>`;
  html += `<div class="pop-row"><span class="pop-label">Machine</span><span class="pop-val">${machineNames[bot.id] || bot.machine}</span></div>`;
  html += `<div class="pop-row"><span class="pop-label">Room</span><span class="pop-val">${bot.room}</span></div>`;
  html += `<div class="pop-row"><span class="pop-label">Task</span><span class="pop-val">${bot.task||'Idle'}</span></div>`;
  html += `<div class="pop-row"><span class="pop-label">Thought</span><span class="pop-val" style="font-style:italic;font-size:11px">${thoughtProcess}</span></div>`;
  html += `<div class="pop-row"><span class="pop-label">Messages</span><span class="pop-val">Sent: ${bot.messagesSent} | Recv: ${bot.messagesReceived}</span></div>`;
  html += `<div class="pop-log">`;
  bot.eventLog.slice(0,8).forEach(e=>{
    html += `<div><span class="ts">${formatTime(e.time)}</span>${e.type} — ${e.detail}</div>`;
  });
  if(bot.eventLog.length===0) html += `<div style="color:var(--text-dim)">No recent activity</div>`;
  html += `</div>`;
  popEl.innerHTML = html;
  positionPopover(cx, cy);
}

function showRoomPopover(room, cx, cy) {
  const botsHere = bots.filter(b=>b.room===room.id);
  let html = `<div class="pop-header"><div class="pop-title" style="color:${room.accent}">${room.name}</div><div class="pop-close" onclick="hidePopover()">×</div></div>`;
  html += `<div class="pop-row"><span class="pop-label">Agents Here</span><span class="pop-val">${botsHere.length}</span></div>`;
  botsHere.forEach(b=>{
    const dc = {active:COLORS.green,thinking:COLORS.purple,error:COLORS.red,rate_limited:COLORS.textDim,idle:'#374151'}[b.state]||'#374151';
    html += `<div class="pop-row"><span class="pop-val"><span class="dot" style="background:${dc}"></span>${b.name}</span><span class="pop-label">${b.state}</span></div>`;
  });
  const recentCount = room.eventLog.filter(e=>Date.now()-e.time<60000).length;
  html += `<div class="pop-row"><span class="pop-label">Events (60s)</span><span class="pop-val">${recentCount}</span></div>`;
  html += `<div class="pop-log">`;
  room.eventLog.slice(0,5).forEach(e=>{
    html += `<div><span class="ts">${formatTime(e.time)}</span>${e.type} — ${e.detail}</div>`;
  });
  if(room.eventLog.length===0) html += `<div style="color:var(--text-dim)">No recent activity</div>`;
  html += `</div>`;
  popEl.innerHTML = html;
  positionPopover(cx, cy);
}

function positionPopover(cx, cy) {
  popEl.style.display = 'block';
  const pw = 300, ph = popEl.offsetHeight;
  let left = cx + 12, top = cy - 20;
  if(left + pw > window.innerWidth) left = cx - pw - 12;
  if(top + ph > window.innerHeight) top = window.innerHeight - ph - 12;
  if(top < 52) top = 52;
  popEl.style.left = left+'px';
  popEl.style.top = top+'px';
}

function hidePopover() {
  popEl.style.display = 'none';
}
// Make global for onclick
window.hidePopover = hidePopover;

// ═══════════════════════════════════════
// SECTION: Speed & Fullscreen Controls
// ═══════════════════════════════════════
document.querySelectorAll('.speed-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    simSpeed = parseInt(btn.dataset.speed);
  });
});

document.getElementById('fs-btn').addEventListener('click', () => {
  if(!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(()=>{});
  } else {
    document.exitFullscreen();
  }
});

// ═══════════════════════════════════════
// SECTION: Keyboard Shortcuts
// ═══════════════════════════════════════
function updateSpeedButtonUI(currentSpeed) {
  const buttons = document.querySelectorAll('.speed-btn');
  buttons.forEach((btn, idx) => {
    const speeds = [1, 2, 5];
    btn.classList.toggle('active', speeds[idx] === currentSpeed);
  });
}

function setupKeyboardShortcuts() {
  document.addEventListener('keydown', (e) => {
    const key = e.key;
    if (key === '1') {
      simSpeed = 1; updateSpeedButtonUI(1); e.preventDefault();
    } else if (key === '2') {
      simSpeed = 2; updateSpeedButtonUI(2); e.preventDefault();
    } else if (key === '3') {
      simSpeed = 5; updateSpeedButtonUI(5); e.preventDefault();
    } else if (key === 'F' || key === 'f') {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(()=>{});
      } else {
        document.exitFullscreen();
      }
      e.preventDefault();
    } else if (key === ' ') {
      paused = !paused; e.preventDefault();
    } else if (key === 'Escape') {
      hidePopover(); e.preventDefault();
    }
  });
}

// ═══════════════════════════════════════
// SECTION: Canvas Setup & Resize
// ═══════════════════════════════════════
ctx = canvas.getContext('2d');
dpr = window.devicePixelRatio || 1;

function resize() {
  const w = window.innerWidth;
  const h = window.innerHeight - 48;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  calcLayout();
  // Reposition bots to new seat coords
  if(bots.length && !bots[0].moving) {
    bots.forEach(bot => {
      const room = getRoomById(bot.room);
      if(room) {
        const seatIdx = room.seats.findIndex(s=>s.taken===bot.id);
        if(seatIdx>=0) {
          bot.x = room.seats[seatIdx].x;
          bot.y = room.seats[seatIdx].y;
          bot.targetX = bot.x;
          bot.targetY = bot.y;
        }
      }
    });
  }
}

window.addEventListener('resize', resize);
resize();
initBots();

// ═══════════════════════════════════════
// SECTION: Main Loop
// ═══════════════════════════════════════
function frame(ts) {
  if(paused) { requestAnimationFrame(frame); return; }
  const dt = lastTime ? Math.min((ts-lastTime)/1000, 0.1) : 0.016;
  lastTime = ts;
  globalTime += dt * simSpeed;
  errorScrollY += dt * 8 * simSpeed;

  // Event simulation
  eventAccum += dt * 1000 * simSpeed;
  if(eventAccum >= nextEventTime) {
    eventAccum = 0;
    nextEventTime = 2000 + Math.random()*4000;
    const evt = getNextEvent();
    processEvent(evt);
  }

  // Update
  bots.forEach(b => updateBotMovement(b, dt));
  updateOrbs(dt);
  dataCounter += dt * simSpeed * 0.3;

  // HUD throttle (1Hz)
  hudTimer += dt;
  if(hudTimer >= 1) { updateHUD(); hudTimer = 0; }

  // Draw
  ctx.clearRect(0, 0, layout.W, layout.H);

  // Building bg
  ctx.fillStyle = COLORS.bgBuilding;
  roundRect(ctx, layout.margin-4, layout.margin-4, layout.W-layout.margin*2+8, layout.H-layout.margin*2+8, 6);
  ctx.fill();

  // Corridor
  drawCorridor();

  // Rooms
  rooms.forEach(drawRoom);

  // Bots
  bots.forEach(drawBot);

  // Orbs
  drawOrbs();

  requestAnimationFrame(frame);
}

setupKeyboardShortcuts();
requestAnimationFrame(frame);
updateHUD();
</script>
