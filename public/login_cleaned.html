    <form id="loginForm" autocomplete="on" aria-describedby="login-desc" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@company.com" required autocomplete="email" autofocus
               aria-required="true" tabindex="1"
               aria-describedby="email-error">
        <span id="email-error" class="visually-hidden" aria-live="polite"></span>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password"
                 aria-required="true" tabindex="2">
          <button type="button" class="password-toggle" id="passwordToggle" tabindex="3"
                  aria-label="Show password" aria-pressed="false">
            <svg class="icon-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>

            <svg class="icon-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>

          </button>

        <div class="field-footer">
          <a href="#" class="forgot-link" tabindex="4" onclick="event.preventDefault(); showAlert('Contact hello@moliam.com to reset your password.', 'error');">Forgot password?</a>
        </div>
      </div>
      <button type="submit" class="btn-login" id="loginBtn" tabindex="5" aria-label="Sign in to your account">
        <span class="btn-text">Sign In</span>
        <div class="spinner" aria-hidden="true"></div>

<script>
const form = document.getElementById('loginForm');
const btn = document.getElementById('loginBtn');
const alertEl = document.getElementById('alert');
const passwordInput=docume...d');
const passwordToggle=docume...e');

// Password show/hide toggle
passwordToggle.addEventListener('click', () => {
  const isPassword=passwo...type === 'password';
  passwordInput.type = isPassword ? 'text' : 'password';
  passwordToggle.classList.toggle('active', isPassword);
  passwordToggle.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
  passwordToggle.setAttribute('aria-pressed', isPassword ? 'true' : 'false');
  passwordInput.focus();
});

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  alertEl.className = 'alert';
  alertEl.style.display = 'none';
  alertEl.textContent = '';

  const email = document.getElementById('email').value.trim();
  const password=passwo...lue;

  if (!email || !password) {
    showAlert('Please fill in all fields.', 'error');
    if (!email) document.getElementById('email').focus();
    else passwordInput.focus();
    return;
  }

  btn.classList.add('loading');
  btn.disabled = true;
  btn.setAttribute('aria-busy', 'true');

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ email, password }),
    });

    const data = await res.json();

    if (data.success) {
      showAlert('Signing in...', 'success');
      // Redirect based on role
      if (data.user.role === 'admin') {
        window.location.href = '/admin';
      } else {
        window.location.href = '/dashboard';
      }
    } else {
      showAlert(data.message || 'Login failed.', 'error');
      btn.classList.remove('loading');
      btn.disabled = false;
      btn.removeAttribute('aria-busy');
      passwordInput.focus();
    }
  } catch (err) {
    showAlert('Connection error. Please try again.', 'error');
    btn.classList.remove('loading');
    btn.disabled = false;
    btn.removeAttribute('aria-busy');
  }
});

function showAlert(msg, type) {
  alertEl.textContent = msg;
  alertEl.className = `alert ${type}`;
  alertEl.style.display = 'block';
}

// Mobile: collapse branding when form is focused (keyboard pushes content up)
const formInputs = document.querySelectorAll('#loginForm input');
let focusTimeout;
formInputs.forEach(input => {
  input.addEventListener('focus', () => {
    clearTimeout(focusTimeout);
    document.body.classList.add('form-focused');
    // Scroll form into view on mobile
    setTimeout(() => {
      input.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 300);
  });
  input.addEventListener('blur', () => {
    focusTimeout = setTimeout(() => {
      // Only remove if no other input is focused
      if (!document.activeElement || !document.activeElement.closest('#loginForm input')) {
        document.body.classList.remove('form-focused');
      }
    }, 200);
  });
});

// If already logged in, redirect
(async () => {
  try {
    const res = await fetch('/api/auth/me', { credentials: 'include' });
    const data = await res.json();
    if (data.success) {
      window.location.href = data.user.role === 'admin' ? '/admin' : '/dashboard';
    }
  } catch {}
})();
</script>
