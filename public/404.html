<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | Moliam</title>
  <meta name="description" content="The page you're looking for couldn't be found. Let's get you back on track.">
   <link rel="canonical" href="https://moliam.com/404">
  <style>
    /* Reset & Base */
    * { margin: 0; padding: 0; box-sizing: border-box; }
  
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0B0E14, #1e1b4b);
      color: #EAECEF;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      overflow-x: hidden;
    }
  
    /* Container */
    .container {
      max-width: 600px;
      margin: 0 auto;
      z-index: 1;
    }
  
     h1 {
       font-size: clamp(2.5rem, 8vw, 4rem);
       font-weight: 700;
       margin-bottom: 1.5rem;
       background: linear-gradient(90deg, #a855f7, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
       background-clip: text;
       letter-spacing: -1px;
    }
  
     p {
       font-size: clamp(1.125rem, 2vw, 1.375rem);
       opacity: 0.9;
       line-height: 1.6;
       margin-bottom: 2rem;
    }
  
     .button {
      display: inline-block;
      background: linear-gradient(135deg, #3D7AFF, #7C65FF);
      color: white;
      padding: 1rem 2.5rem;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: clamp(1rem, 1.5vw, 1.125rem);
      transition: all 0.3s ease;
      box-shadow: 0 4px 16px rgba(61, 122, 255, 0.3);
      border: none;
      cursor: pointer;
    }
  
     .button:hover {
       transform: translateY(-2px) scale(1.03);
       box-shadow: 0 8px 24px rgba(61, 122, 255, 0.45);
    }
  
   /* Subtle background animation */
    .background-shape {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(124, 101, 255, 0.1), transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      animation: float 6s ease-in-out infinite;
      z-index: 0;
    }
  
     @keyframes float {
       0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
      50% { transform: translate(-50%, -40%) scale(1.1); opacity: 0.7; }
    }
  
     @media (max-width: 768px) {
       body {
         padding: 1rem;
        font-size: 14px;
       }
  
      h1 { font-size: 2.5rem; }
  
       .button {
         width: 100%;
         min-height: 52px;
        padding: 1rem 1.5rem;
       }
    }
  
     @media (prefers-reduced-motion: reduce) {
       .background-shape { animation: none; opacity: 0.3; }
    }
  </style>
</head>
<body>
   <div class="background-shape"></div>
  
    <div class="container">
       <h1>404</h1>
      <p>Looks like you've wandered into uncharted territory. The page you're looking for doesn't exist or has been moved.</p>
     <a href="/" class="button">← Back to Home</a>
    </div>
  
   <script>
     // Optional: Auto-redirect after 30 seconds (can be disabled)
     // setTimeout(() => { window.location.href = '/'; }, 30000);
    
      // Track 404 event for analytics (if using analytics)
     if (typeof gtag !== 'undefined') {
       gtag('event', 'page_not_found', {
         'event_category': 'Navigation',
         'event_label': document.referrer || 'Direct'
       });
    }
  </script>
</body>
</html>
