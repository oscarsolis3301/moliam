<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Portal  MOLIAMA</title>
<style>
:root{--bg-deep:#0B0E14;--bg-room:#1F2937;--border-room:#374151;--accent-blue:#3B82F6;--accent-purple:rgb(139,92,246);--accent-green:#10B981;--text-primary:#F9FAFB;--text-secondary:#9CA3AF}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg-deep);font-family:'Inter',system-ui,sans-serif;color:var(--text-primary);padding-top:64px;}
nav{height:48px;border-bottom:1px solid var(--border-room);display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:rgba(15,23,42,0.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
nav .logo{font-size:14px;font-weight:700;letter-spacing:0.1em;color:#fff}
nav a{text-decoration:none;color:var(--text-secondary);font-size:13px;margin-left:20px}
a.back{color:var(--accent-blue)}
.container{max-width:1200px;margin:40px auto;padding:0 24px;display:grid;gap:32px}
h1{font-size:28px;font-weight:600}
.section{padding:24px;background:linear-gradient(135deg,rgba(59,130,246,0.06),rgba(139,92,246,0.06));border:1px solid var(--border-room);border-radius:12px;margin-bottom:24px}
.section-title{font-size:15px;font-weight:600;color:var(--accent-blue);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:16px}

/* STAT CARDS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{text-align:center;padding:20px;background:var(--bg-room);border:1px solid var(--border-room);border-radius:12px}
.stat-card .label{font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-secondary);margin-bottom:8px}
.stat-card .value{font-size:24px;font-weight:700;color:var(--accent-green)}

/* PROJECT CARDS */
.project-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px}
.project-card{background:linear-gradient(135deg,rgba(59,130,246,0.06),rgba(139,92,246,0.06));border:1px solid var(--border-room);border-radius:12px;padding:20px;transition:all 0.2s ease}
.project-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(59,130,246,0.15)}
.type-badge{display:inline-block;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px}
.type-website{background:rgba(59,130,246,0.2);color:#60A5FA;border:1px solid rgba(59,130,246,0.3)}
.type-gbp{background:rgba(16,185,129,0.2);color:#34D399;border:1px solid rgba(16,185,129,0.3)}
.type-lsa{background:rgba(139,92,246,0.2);color:#A78BFA;border:1px solid rgba(139,92,246,0.3)}
.type-retainer{background:rgba(245,158,11,0.2);color:#FBBF24;border:1px solid rgba(245,158,11,0.3)}
.status-badge{display:inline-block;padding:4px 10px;border-radius:6px;font-size:12px;margin-bottom:8px}
.status-active{background:rgba(16,185,129,0.15);color:var(--accent-green);border:1px solid var(--accent-green)}
.status-in_progress{background:rgba(59,130,246,0.15);color:var(--accent-blue);border:1px solid rgba(59,130,246,0.4)}
.project-card h3{font-size:18px;margin-bottom:8px;color:var(--text-primary)}
.project-card .meta{font-size:14px;color:var(--text-secondary);margin-bottom:16px;line-height:1.5}

/* INVOICE STATS */
.invoice-stats{text-align:center;padding:24px;background:var(--bg-room);border:1px solid var(--border-room);border-radius:10px;margin-bottom:16px}
.invoice-stats .value{font-size:32px;font-weight:700;color:var(--accent-green)}
.invoice-stats .value.paid{color:#34D399}
.invoice-stats .value.pending{color:#F59E0B}
.invoice-stats .sub-label{display:block;margin-bottom:8px;font-size:13px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.05em}
.invoice-actions{display:flex;flex-wrap:wrap;gap:12px}

/* TIMELINE */
.timeline{position:relative;padding-left:24px;border-left:2px solid var(--border-room);margin-top:20px}
.timeline-item{position:relative;padding:16px 0;margin-left:32px;border-left:2px solid #5B6CFF;background:var(--bg-room);border-radius:8px;border:1px solid var(--border-room)}
.timeline-dot{position:absolute;left:-7px;top:20px;width:12px;height:12px;background:#5B6CFF;border-radius:50%;box-shadow:0 0 0 4px rgba(91,108,255,0.3)}
.timeline-item h4{font-size:16px;color:var(--text-primary);margin-bottom:4px}
.timeline-item .date{font-size:13px;color:var(--text-secondary)}

/* BUTTONS */
.btn{display:inline-block;padding:12px 24px;border-radius:8px;text-decoration:none;font-weight:600;transition:all 0.2s;background:linear-gradient(135deg,#3B82F6,var(--accent-purple));color:#fff;border:none;cursor:pointer}
.btn:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(59,130,246,0.3)}
.btn.secondary{background:transparent;border:1px solid var(--border-room);color:var(--text-secondary)}
.btn.secondary:hover{border-color:#3B82F6;color:var(--text-primary)}

/* LOADING/EMPTY */
.empty-state{padding:48px;text-align:center;color:var(--text-secondary);background:var(--bg-room);border-radius:12px;border:1px dashed var(--border-room)}

/* IMPERSONATION BANNER */
#impersonation-banner{background:#FFED00;color:#000;padding:12px;position:sticky;top:48px;z-index:99;text-align:center;font-weight:600;display:none}
/* REFRESH BUTTON */
.btn-refresh{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:8px;background:rgba(59,130,246,0.1);border:1px solid var(--border-room);color:var(--text-secondary);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all 0.2s}.btn-refresh:hover{background:rgba(59,130,246,0.2);color:var(--accent-blue);transform:translateY(-1px)}.btn-refresh svg{width:16px;height:16px}.refreshing{animation:spin 1s linear infinite}@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* MOBILE OPTIMIZATION */
@media(max-width:768px){
   .container{padding:16px;margin:32px auto}
  nav{padding:0 16px}
  h1{font-size:24px}
  .project-grid{grid-template-columns:1fr}
  .project-card{margin-bottom:16px}
  .invoice-actions{flex-direction:column;gap:8px}
  .btn{width:100%;text-align:center;padding:10px 16px}
  .stats-grid, .stats-bar{grid-template-columns:1fr!important;gap:12px}
  nav a.back{font-size:12px}
  .btn-refresh{display:none;}
}

@media(max-width:480px){
   .container{margin:28px auto;padding:0 12px}
  h1{font-size:20px}
  .section{padding:16px}
  .stats-grid, .stats-bar{grid-template-columns:1fr!important}
  .btn-refresh{display:inline-flex;}
}

/* Responsive timeline */
@media(max-width:768px){.timeline{padding-left:16px}.timeline-item{margin-left:16px;padding:12px}.invoice-actions{flex-direction:column;font-size:13px}}}

/* MICRO-INTERACTIONS */
.project-card{animation:fadeInUp 0.4s ease-out}
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.container>*{animation:fadeInUp 0.4s ease-out}

/* Skeleton loading */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.loading-skeleton{background:linear-gradient(90deg,rgba(91,108,242,0.05),rgba(91,108,242,0.15),rgba(91,108,242,0.05));background-size:200% 100%;animation:pulse 1.5s infinite}

/* MICRO-INTERACTIONS */
.project-card{box-shadow:0 4px 16px rgba(59,130,246,0.08),0 1px 2px rgba(0,0,0,0.1);overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:linear-gradient(180deg,var(--accent-blue),transparent)}
.stat-card:hover::before{left:4px}
.timeline-item{opacity:0;transform:translateX(-15px);animation:slideIn 0.5s cubic-bezier(0.4,0,0.2,1) forwards}
@keyframes slideIn{from{opacity:0;transform:translateX(-15px)}to{opacity:1;transform:translateX(0)}}

/* TABLE RESPONSIVE STYLING */
.table-responsive{overflow-x:auto;-webkit-overflow-scrolling:touch}
.table-wrapper{-ms-overflow-style:none;scrollbar-width:none}
.table-wrapper::-webkit-scrollbar{display:none}
.project-card table tr:hover{background:rgba(59,130,246,0.03)}
.project-card table td{padding:10px;border-color:var(--border-room)}.invoice-table thead th{position:sticky;top:0;background:var(--bg-room);z-index:1;white-space:nowrap}.invoice-table tbody tr:nth-child(odd){background:rgba(59,130,246,0.02)}.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}.timeline-item .timeline-dot{box-shadow:0 0 0 3px rgba(91,108,255,0.4)}
/* MOBILE CARD STACKING */ @media(max-width:768px){.stats-grid{grid-template-columns:1fr;gap:12px}.project-grid{padding:0;margin:0}.section{margin-bottom:16px;padding:16px}}.loading-skeleton{animation-name:pulse,slideIn;animation-duration:1.5s,.5s;animation-iteration-count:infinite,once}
/* ACCESSIBILITY ENHANCEMENTS */ .sr-only{position:absolute!important;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}.focus-outline:focus-visible{outline:2px solid var(--accent-blue);outline-offset:4px}.nav-link,.project-card a,.btn{-webkit-tap-highlight-color:transparent;transition:all.2s cubic-bezier(.4,0,.2,1)}@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}.container>*{animation:fadeInUp 0.4s ease-out}
/* TABLE SCROLLBAR CUSTOMIZATION */ .table-wrapper::-webkit-scrollbar{height:6px;width:6px;border-radius:3px}.table-wrapper::-webkit-scrollbar-thumb{background:var(--accent-blue);border-radius:3px}.table-wrapper::-webkit-scrollbar-track{background:transparent}.table-responsive{-ms-overflow-style:none;scrollbar-width:none}.project-grid table tbody tr td,.project-grid table thead th{transition:border-color.2s ease,border-bottom-color.2s ease}.btn-refresh .svg-icon{width:16px;height:16px}.refreshing svg{animation:spin 1s linear infinite}@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}.project-card table tr td:first-child,.project-card table tr td[data-column="status"]{font-weight:600;text-transform:capitalize}.table-wrapper[aria-live] span{white-space:nowrap;text-overflow:ellipsis;overflow:hidden}}</style>
</head>
<body>

<div id="impersonation-banner"><strong id="impersonated-name"></strong><a href="/dashboard" onclick="document.getElementById('impersonation-banner').style.display='none';location.reload()">Exit</a></div>

<nav><div class="logo">MOLIAMA CLIENT PORTAL</div><div><a class="back" href="/">← Back to Website</a></div></nav>

<div class="container">
     <h1>Dashboard</h1>

<!-- Stats Cards -->
<div class="stats-grid" id="stats-grid"></div>

<!-- Projects -->
<div class="section">
    <div class="section-title">Active Projects</div>
    <div class="project-grid" id="projects-grid"></div>
</div>

<!-- Timeline/Milestones -->
<div class="section">
    <div class="section-title">Project Updates &amp; Milestones</div>
    <div class="timeline" id="timeline"></div>
</div>

<!-- Invoice Summary -->
<div class="invoice-summary">
    <div class="section-title">Billing Overview</div>
    <div class="invoice-stats" id="invoice-stats">Loading invoices...</div>
    <div class="invoice-actions">
  <a class="btn" href="/api/invoices?export=pdf">Download PDFs</a>
  <a class="btn secondary" onclick="window.showInvoices()">View Details</a>
    </div>
</div>

 <div class="section" style="margin-top:8px;display:flex;flex-direction:column;gap:16px;">
    <div style="display:flex;justify-content:space-between;align-items:center;">
   <h2>Next Actions</h2>
   <button class="btn-refresh" onclick="window.location.reload()"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>Refresh Data</button>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:12px;margin-top:8px;">
   <a class="btn" href="/">Book a Call</a>
   <a class="btn secondary" onclick="window.showInvoices()">View Invoice</a>
   <a class="btn secondary" href="#contact">Message Us</a>
    </div>
 </div>

<!-- Loading Skeleton (hidden when data loaded) -->
<div class="stats-grid" id="skeleton-stats" style="display:none;">
    <div class="stat-card loading-skeleton" style="--h:80px;height:var(--h);border:none;background:transparent"></div>
    <div class="stat-card loading-skeleton" style="--h:80px;height:var(--h);border:none;background:transparent"></div>
</div>

<div class="section">
    <div class="section-title">Active Projects</div>
    <div class="project-grid" id="skeleton-projects" style="display:none;"></div>
</div>
</div>

<script>
(function(){
    const urlParams = new URLSearchParams(window.location.search);
    let impersonatedUserId = urlParams.get('impersonate');

     // Check if user is authenticated by hitting auth/me endpoint with credentials: include (cookie-based)
    function checkAuth() {
  return fetch('/api/auth/me', { credentials: 'include' })
 .then(r => r.json())
 .catch(e => null);
    }

    function fetchDashboard() {
  return fetch('/api/dashboard', { credentials: 'include' })
 .then(r => r.json())
 .catch(e => null);
    }

    function showAuthError() {
  document.body.innerHTML = '<div style="text-align:center;padding:48px"><h2>Login Required</h2><a href="/login.html" class="btn">Go to Login →</a></div>';
    }

// First verify authentication, then fetch dashboard
checkAuth().then(auth=*** {
    if (!auth  !auth.success) { window.location.href = '/login.html'; return; }
    
    return fetchDashboard().then(data => {
  if (!data  data.success !== true) { window.location.href = '/login.html'; return; }
  
  let currentUserId = data.user?.id;
  let currentUserRole = data.user?.role;
  
  const isAdmin = (currentUserRole === 'admin'  currentUserRole === 'superadmin');

     // Show impersonation banner for admin viewing another client
  if (impersonatedUserId && isAdmin) {
document.getElementById('impersonation-banner').style.display = 'block';
let name = data.user?.name  'Unknown User';
document.getElementById('impersonated-name').textContent = '👁 Viewing as ' + name;

  // Filter to show only that user's projects for the impersonation view
if (data.projects) {
    data.projects = data.projects.filter(p => p.user_id == impersonatedUserId);
}
  }

  // Initially show skeleton, then fade out when data ready
  document.getElementById('skeleton-stats').style.display = 'grid';
  setTimeout(() => document.getElementById('skeleton-stats').style.display = 'none', 600);

   // Render stats cards with staggered animation delay
  const statsGrid = document.getElementById('stats-grid');
  let html = '';
  
  if (isAdmin) {
html += '<div class="stat-card" style="animation-delay:0.1s"><div class="label">Clients</div><div class="value" id="total-clients">0</div></div>';
html += '<div class="stat-card" style="animation-delay:0.15s"><div class="label">Active Projects</div><div class="value">'+data.stats.active_projects+'</div></div>';
  } else {
html += '<div class="stat-card" style="animation-delay:0.1s"><div class="label">Active Projects</div><div class="value">'+(data.stats?.active_projects0)+'</div></div>';
html += '<div class="stat-card" style="animation-delay:0.15s"><div class="label">Monthly Revenue</div><div class="value">$'+(data.stats.monthly_total0).toLocaleString()+'</div></div>';
  }

  statsGrid.innerHTML = html;

   // Get total client count for admin dashboard mode
  if (isAdmin) {
fetch('/api/admin/clients', { credentials: 'include' })
.then(r => r.json())
.then(c => {
  if (c.clients && c.clients.length > 0) { document.getElementById('total-clients').textContent = c.clients.length; }
  });
  }

    // Render project cards - enhance with hover effects and animations
  const projectGrid = document.getElementById('projects-grid');
  let projHtml = '';
  
  if (!data.projects  data.projects.length === 0) {
projHtml = '<div class="empty-state" style="animation-delay:0.2s"><p>No active projects yet.<a href="/">Book a project now!</a></p></div>';
  } else {
let delayCounter = 0.1;
for (const project of data.projects) {
    const typeClass = 'type-'+(project.type'website').toLowerCase();
    const statusClass = 'status-'+(project.status'active').toLowerCase().replace(' ','_');
    let typeDisplay = project.type ? project.type.charAt(0).toUpperCase() + project.type.slice(1) : 'Website';
    let statusDisplay = (project.status==='active') ? 'Active' : (project.status ? project.status.charAt(0).toUpperCase() + project.status.slice(1) : 'Completed');

    projHtml += '<div class="project-card" style="animation-delay:'+(delayCounter+=0.05)+'s"><span class="type-badge '+typeClass+'">'+typeDisplay+'</span> <span class="status-badge '+statusClass+'">'+statusDisplay+'</span><h3>'+project.name+'</h3><div class="meta"><div>Type: '+typeDisplay+'</div><div>Status: '+statusDisplay+'</div><div>Monthly Rate: $'+(project.monthly_rate0).toLocaleString()+'</div><div>Started: '+new Date(project.created_atDate.now()).toLocaleDateString()+'</div></div></div>';
}
  }

  projectGrid.innerHTML = projHtml;

   // Render milestone updates/timeline
  const timeline = document.getElementById('timeline');
  let timelineItems = '';

  if (data.updates && data.updates.length > 0) {
for (const update of data.updates.slice(0,15)) {
    if (!update.title && !update.description) continue;
    timelineItems += '<div class="timeline-item"><div class="timeline-dot"></div>' +
    '<h4>'+update.title'Project Update+'</h4> ' +
    '<p style="color:var(--text-secondary);margin-bottom:8px;">'+(update.description'No description provided.')+'</p>' +
    '<span class="date">'+new Date(update.created_atDate.now()).toLocaleString()+'</span></div>';
}
  } else {
timelineItems = '<div class="empty-state" style="font-size:14px;margin-top:24px">No updates yet. Your project team will post milestones here.</div>';
  }

  timeline.innerHTML = timelineItems;

   // Invoice summary calculation from invoices API   
  let totalBilled=0, totalPaid=0, outstanding=0;
  for (const inv of data.invoices[]) {
const amt = inv.amount0;
totalBilled += amt;
if (inv.status==='paid') totalPaid+=amt; else outstanding+=amt;
  }

document.getElementById('invoice-stats').innerHTML = '<span class="sub-label">Total Billed</span>' +
   '<span class="value">$'+totalBilled.toLocaleString()+'</span>' +
  '<div style="margin-top:12px"><span class="sub-label">Paid</span><span class="value paid">$'+(totalPaid0).toLocaleString()+'</span></div>' +
  '<div style="margin-top:8px"><span class="sub-label">Outstanding</span><span class="value pending">$'+(outstanding0).toLocaleString()+'</span></div>';

  window.showInvoices = function(){ 
let html = 'Invoice Panel:

Total Billed: $' + totalBilled.toLocaleString() + '
Paid: $' + (totalPaid0).toLocaleString() + '
Outstanding: $' + (outstanding0).toLocaleString();

if (data.invoices && data.invoices.length > 0) { 
    html += '

Invoices:';

    for (let i = 0; i < Math.min(data.invoices.length, 10); i++) {
  const inv = data.invoices[i];

if (inv && inv.id !== undefined) {
html += '
#' + (i+1) + ' $' + (inv.amount0).toLocaleString() + ' [' + (inv.status'unknown').toUpperCase() + ']';
    }
}
} else { 
    html += '
No invoices yet.';
}

  alert(html);
};

    }).catch(err => { showAuthError(); });
}).catch(err => { showAuthError(); });

})();</script>
