<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Moliam</title>
    <style>
        :root {
            --bg-deep: #0B0E14;
            --bg-room: #1F2937;
            --border-room: #374151;
            --accent-blue: #3B82F6;
            --accent-purple: #8B5CF6;
            --accent-green: #10B981;
            --text-primary: #F9FAFB;
            --text-secondary: #9CA3AF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Impersonation Banner */
        .impersonation-banner {
            display: none;
            background: yellow;
            color: black;
            padding: 1rem;
            text-align: center;
            font-weight: bold;
            margin-bottom: 2rem;
            border-radius: 8px;
        }

        .impersonation-banner.active {
            display: block;
        }

        /* Glass Cards */
        .glass-card {
            background: linear-gradient(135deg, rgba(31, 41, 55, 0.7), rgba(11, 14, 20, 0.7));
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-room);
            border-radius: 14px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: var(--text-secondary);
        }

        /* Project Cards */
        .projects-section h2, .milestones-section h2, .invoices-section h2 {
            margin-bottom: 1rem;
            color: var(--accent-blue);
            font-size: 1.25rem;
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }

         .project-card {
            background: linear-gradient(135deg, rgba(31, 41, 55, 0.7), rgba(11, 14, 20, 0.7));
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-room);
            border-radius: 14px;
            padding: 1.5rem;
            transition: transform 0.2s, box-shadow 0.2s;
         }

        .project-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
        }

        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .project-name {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .badges {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 500;
            text-transform: uppercase;
        }

        .badge-type {
            background: var(--accent-blue);
            color: white;
        }

        .badge-status {
            background: var(--accent-green);
            color: white;
        }

        .project-info p {
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .project-label {
            color: var(--text-secondary);
        }

        .project-value {
            color: var(--text-primary);
            font-weight: 500;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: white;
        }

        .btn-secondary {
            background: rgba(55, 65, 81, 0.5);
            color: var(--text-primary);
            border: 1px solid var(--border-room);
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        /* Milestones Timeline */
        .timeline {
            position: relative;
            padding-left: 2rem;
            margin-top: 1rem;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 0.75rem;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--border-room);
        }

        .milestone-item {
            position: relative;
            padding-left: 1.5rem;
            margin-bottom: 1rem;
        }

        .milestone-item::before {
            content: '';
            position: absolute;
            left: -0.25rem;
            top: 0.375rem;
            width: 0.5rem;
            height: 0.5rem;
            background: var(--accent-green);
            border-radius: 50%;
        }

        .milestone-date {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-bottom: 0.25rem;
        }

        .milestone-title {
            color: var(--text-primary);
            font-weight: 500;
            font-size: 1rem;
        }

        /* Invoice Summary */
           .invoice-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
          }

          .invoice-card {
            background: rgba(31, 41, 55, 0.7);
            border-radius: 14px;
            padding: 1.25rem;
            text-align: center;
          }

          .invoice-label {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .invoice-value {
            color: var(--accent-green);
            font-size: 1.5rem;
            font-weight: 600;
        }

        /* Loading and Error States */
        .loading, .error {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }

        .error {
            color: #EF4444;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-secondary);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 0;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            .project-grid {
                grid-template-columns: 1fr;
            }

            .invoice-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Impersonation Banner -->
        <div id="impersonationBanner" class="impersonation-banner">
            👁 Viewing as <span id="viewingAsName"></span> — 
            <a href="/dashboard" style="color: #000; font-weight: bold;">Exit</a>
        </div>

        <header class="header">
            <h1>Your Dashboard</h1>
            <p>Manage your projects and track progress</p>
        </header>

        <!-- Projects Section -->
        <section id="projectsSection" class="glass-card projects-section">
            <h2>Your Projects</h2>
            <div id="projectContainer">
                <div class="loading">Loading projects...</div>
            </div>
            <div class="action-buttons">
                <a href="/" class="btn btn-primary">Book a Call</a>
                <button class="btn btn-secondary" onclick="window.location.href='/invoices'">View Invoice</button>
                <button class="btn btn-secondary" onclick="window.location.href='https://discord.com'">Message Us</button>
            </div>
        </section>

        <!-- Milestones Section -->
        <section id="milestonesSection" class="glass-card milestones-section">
            <h2>Milestones Timeline</h2>
            <div id="timelineContainer">
                <div class="loading">Loading milestones...</div>
            </div>
        </section>

        <!-- Invoices Section -->
        <section id="invoicesSection" class="glass-card invoices-section">
            <h2>Invoice Summary</h2>
            <div id="invoiceContainer">
                <div class="loading">Loading invoice data...</div>
            </div>
        </section>
    </div>

    <script>
        // Check for impersonate parameter
        const urlParams = new URLSearchParams(window.location.search);
        const impersonateId = urlParams.get('impersonate');

        if (impersonateId) {
            document.getElementById('impersonationBanner').classList.add('active');
            document.getElementById('viewingAsName').textContent = 'Loading...';
            
            // Fetch user name to display in banner
            fetch('/api/user', { credentials: 'include' })
                .then(res => res.json())
                .then(data => {
                    document.getElementById('viewingAsName').textContent = data.user?.name || `User ${impersonateId}`;
                });
        }

        // Check authentication and redirect if not logged in
        async function checkAuth() {
            try {
                const res = await fetch('/api/user', { credentials: 'include' });
                if (!res.ok) {
                    window.location.href = '/login';
                }
            } catch (err) {
                window.location.href = '/login';
            }
        }

        // Fetch dashboard data
        async function fetchDashboardData() {
            try {
                const res = await fetch('/api/dashboard', { 
                    credentials: 'include',
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                if (!res.ok) {
                    throw new Error('Failed to load dashboard data');
                }

                const data = await res.json();
                
                // Handle impersonation - use user_id from params if present
                const targetUserId = impersonateId;
                
                renderProjects(data.projects, targetUserId);
                renderMilestones(data.milestones);
                renderInvoices(data.invoices);

            } catch (err) {
                console.error('Dashboard error:', err);
                document.getElementById('projectContainer').innerHTML = 
                    '<div class="error">Failed to load dashboard data. Please refresh.</div>';
            }
        }

        // Render projects
        function renderProjects(projects, targetUserId) {
            const container = document.getElementById('projectContainer');

            if (!projects || projects.length === 0) {
                container.innerHTML = '<div class="empty-state">No active projects yet. <br><a href="/" class="btn btn-primary" style="margin-top: 1rem;">Book a Call</a></div>';
                return;
            }

            const projectCardHTML = projects.map(project => `
                <div class="project-card">
                    <div class="project-header">
                        <div>
                            <p class="project-name">${escapeHtml(project.name || 'Unnamed Project')}</p>
                            <div class="badges">
                                <span class="badge badge-type">${escapeHtml(project.type || 'website').toLowerCase()}</span>
                                <span class="badge badge-status">${escapeHtml(project.status || 'active').toLowerCase()}</span>
                            </div>
                        </div>
                    </div>
                    <div class="project-info">
                        <p><span class="project-label">Monthly Rate:</span> <span class="project-value">$${(project.monthly_rate || 0).toLocaleString()}</span></p>
                        <p><span class="project-label">Start Date:</span> <span class="project-value">${formatDate(project.start_date || project.created_at)}</span></p>
                    </div>
                </div>
            `).join('');

            container.innerHTML = `<div class="project-grid">${projectCardHTML}</div>`;
        }

        // Render milestones timeline
        function renderMilestones(milestones) {
            const container = document.getElementById('timelineContainer');

            if (!milestones || milestones.length === 0) {
                container.innerHTML = '<div class="empty-state">No milestones have been added yet.</div>';
                return;
            }

            const timelineHTML = milestones.map(milestone => `
                <div class="milestone-item">
                    <p class="milestone-date">${formatDate(milestone.created_at)}</p>
                    <p class="milestone-title">${escapeHtml(milestone.title || 'Untitled Milestone')}</p>
                    ${milestone.description ? `<p style="color: var(--text-secondary); font-size: 0.875rem; margin-top: 0.25rem;">${escapeHtml(milestone.description)}</p>` : ''}
                </div>
            `).join('');

            container.innerHTML = `<div class="timeline">${timelineHTML}</div>`;
        }

        // Render invoice summary
        function renderInvoices(invoices) {
            const container = document.getElementById('invoiceContainer');

            if (!invoices || invoices.length === 0) {
                container.innerHTML = '<div class="empty-state">No invoices generated yet.</div>';
                return;
            }

            // Calculate totals from invoice data
            let totalBilled = 0;
            let totalPaid = 0;
            let totalOutstanding = 0;

            const invoiceCardsHTML = invoices.map(invoice => {
                const billed = invoice.billed_amount || 0;
                const paid = invoice.paid_amount || 0;
                const outstanding = billed - paid;

                totalBilled += billed;
                totalPaid += paid;
                totalOutstanding += outstanding;

                return `
                    <div class="invoice-card">
                        <p class="invoice-label">${escapeHtml(invoice.name)}</p>
                        <p class="project-value">$${billed.toLocaleString()}</p>
                    </div>
                `;
            }).join('');

            container.innerHTML = `
                ${invoiceCardsHTML}
                <div class="invoice-grid">
                    <div class="invoice-card">
                        <p class="invoice-label">Total Billed</p>
                        <p class="invoice-value">$${totalBilled.toLocaleString()}</p>
                    </div>
                    <div class="invoice-card">
                        <p class="invoice-label">Amount Paid</p>
                        <p class="invoice-value" style="color: var(--accent-green);">$${totalPaid.toLocaleString()}</p>
                    </div>
                    <div class="invoice-card">
                        <p class="invoice-label">Outstanding</p>
                        <p class="invoice-value" style="color: #EF4444;">$${totalOutstanding.toLocaleString()}</p>
                    </div>
                </div>
            `;
        }

        // Utility functions
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'N/A';
            return new Date(dateStr).toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
        }

        // Initialize
        checkAuth().then(() => {
            fetchDashboardData();
        });
    </script>
</body>
</html>
