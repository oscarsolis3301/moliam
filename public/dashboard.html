<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | MOLIAMA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>:root{--bg-deep:#0B0E14;--bg-room:#1F2937;--border-room:#374151;--accent-blue:#3B82F6;--accent-purple:rgb(139,92,246);--accent-green:#10B981;--text-primary:#F9FAFB;--text-secondary:#9CA3AF}body{margin:0;padding:0;background:var(--bg-deep);font-family:'Inter',system-ui,sans-serif;color:var(--text-primary)}nav{height:56px;border-bottom:1px solid var(--border-room);display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:rgba(11,14,20,0.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);position:fixed;top:0;width:100%;z-index:100}.nav-wrapper{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;gap:24px}.logo{font-size:15px;font-weight:700;letter-spacing:0.1em;color:#fff}nav a{text-decoration:none;color:var(--text-secondary);font-size:13px}.back-btn{color:var(--accent-blue)}.container{max-width:1200px;margin:80px auto;padding:0 24px;display:grid;gap:36px}.section-title{font-size:18px;font-weight:500;color:var(--text-secondary);margin-bottom:16px}h1{font-size:36px;font-weight:700;margin-bottom:12px;color:var(--text-primary)}section{padding:0;animation:slideUp 0.4s ease-out forwards;opacity:0;transform:translateY(20px)}.@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}.card{background:linear-gradient(135deg,rgba(59,130,246,0.08),rgba(139,92,246,0.08));border:1px solid var(--border-room);border-radius:16px;padding:24px;transition:all 0.3s ease}.card:hover{box-shadow:0 8px 32px rgba(59,130,246,0.15);transform:translateY(-2px)}.project-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:24px;margin-bottom:20px}.project-card{padding:24px;background:linear-gradient(135deg,rgba(59,130,246,0.05),rgba(139,92,246,0.08));border:1px solid rgba(55, 65, 81, 0.5);border-radius:16px;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);animation:floatCard 6s ease-in-out infinite}.project-card:hover{box-shadow:0 12px 40px rgba(59, 130, 246, 0.18),0 0 20px rgba(139, 92, 246, 0.1);border-color:var(--accent-blue);transform:translateY(-4px) scale(1.01)}.@keyframes floatCard{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}#project-section{animation-delay:0ms}#milestones-section{animation-delay:150ms}#invoices-section{animation-delay:300ms}@media (max-width: 768px){.container{padding:24px;gap:24px}.project-grid{grid-template-columns:1fr;gap:16px}.project-card{padding:18px}.project-header h3{font-size:16px;margin-bottom:8px}.project-details{display:flex;flex-direction:column;gap:12px}.detail-row{flex-direction:row;align-items:center}.invoice-card{padding:14px;margin:4px 0}.invoice-label{font-size:11px}.project-actions{flex-direction:column;gap:8px}.btn-primary, .btn-secondary{width:100%;text-align:center}nav.nav-wrapper{padding:0 16px;gap:12px}#milestones-list{max-height:200px}}@media (max-width:480px){h1{font-size:28px}.project-card{border-width:0.5px;padding:14px}section{animation-duration:0.4s}}@media (max-width:768px) and (pointer:coarse){.btn-primary, .btn-secondary,a.btn{min-height:44px}.project-card{padding:16px}nav button, nav a{touch-action:manipulation}}</style>
</head>
<body>
<nav><div class="logo">MOLIAMA</div><a href="/" class="back-btn">← Back to Website</a></nav>
<div id="impersonation-banner"><div class="banner-content">👁 Viewing as <span id="viewing-as"></span> - <a id="exit-btn" href="/dashboard.html">Exit</a></div></div>
<div class="container">
<h1>Your Dashboard</h1>
<section id="project-section"><div class="loading">Loading projects...</div></section>
<section id="milestones-section" style="display:none"><h2>Milestones Timeline</h2><div id="milestones-list"></div></section>
<section id="invoices-section" style="display:none"><h2>Invoice Summary</h2><div class="invoice-summary" id="stats-bar"></div></section>
<script>const API_BASE='/';let token=localStorage.getItem('auth_token')||'';if(!token){window.location.href='/login.html'}const url=new URL(window.location);const isAdmin=localStorage.getItem('user_role')==='admin';</script>

<script>
const impersonateId=url.searchParams.get('impersonate');

async function fetchDashboard() {
  try {
    const params = {};
    if (impersonateId) params.impersonate = impersonateId;
    const res = await fetch(API_BASE + 'api/dashboard?' + new URLSearchParams(params), {
      headers: {'Accept': 'application/json'},
      credentials: 'include'
    });
    if (!res.ok) {
      if (res.status === 401 || res.status === 403) {
        window.location.href = '/login.html';
        return null;
      }
      const data = await res.json();
      return { success: data.success, data: data };
    }
    return await res.json();
  } catch (e) {
    console.error('Fetch error:', e);
    return { success: false, err: e.message };
  }
}

function showImpersonationBanner(client) {
  if (impersonateId && isAdmin) {
    const banner = document.getElementById('impersonation-banner');
    const viewingSpan = document.getElementById('viewing-as');
    banner.style.display = 'flex';
    viewingSpan.textContent = client?.name || 'Client';
    document.getElementById('exit-btn').href = window.location.pathname;
  }
}

function showModal(title, content) {
  return '<dialog style="background:var(--bg-room);color:var(--text-primary);padding:24px;border-radius:16px;border:1px solid var(--border-room)"><h3>' + title + '</h3>' + content + '</dialog>';
}

function showAlert(message, type = 'info') {
  const existingAlert = document.querySelector('.alert-toast');
  if (existingAlert) existingAlert.remove();
  const alert = document.createElement('div');
  alert.className = `alert-toast ${type}`;
  alert.textContent = message;
  alert.style.background = type === 'error' ? '#EF4444' : type === 'success' ? '#10B981' : '#3B82F6';
  document.body.appendChild(alert);
  requestAnimationFrame(() => alert.classList.add('show'));
  setTimeout(() => alert.remove(), 3000);
}

async function renderDashboard() {
  const result = await fetchDashboard();
  if (!result || !result.success) return null;

  const client = result.data.client;
  const projects = result.data.projects || [];
  const invoices = result.data.invoices || [];
  const updates = result.data.project_updates || [];

  showImpersonationBanner(client);

  // Project cards
  let html = '';
  if (!projects.length) {
    html = '<div class="empty-state"><h3>No active projects yet</h3><p>Ready to get started?</p></div>';
  } else {
    for (let p of projects) {
      const typeClass = p.type ? p.type.toLowerCase().replace(' ', '-') : 'website';
      html += `<div class="project-card">`;
      html += `<div class="project-header"><h3 class="project-name">${p.name || 'Project'}</h3>`;
      html += `<div><span class="type-badge type-${typeClass}">${p.type || 'Website'}</span>`;
      html += `<span class="status-badge status-${p.status==='active'?'active':'pending'}">${p.status==='active'?'Active':'Pending'}</span></div></div>`;
      html += `<div class="project-details">`;
      html += `<div class="detail-row"><span>Monthly Rate:</span><span>$${(parseFloat(p.monthly_rate)||0).toLocaleString()}</span></div>`;
      html += `<div class="detail-row"><span>Start Date:</span><span>${p.start_date?new Date(p.start_date).toLocaleDateString():'N/A'}</span></div>`;
      if (p.invoice_url && p.invoice_url !== '#') {
        html += `<div class="project-actions"><a href="${p.invoice_url}" class="btn btn-secondary">📄 View Invoice</a></div>`;
      }
      if (p.client_email) {
        html += `<div class="project-actions"><a href="mailto:${encodeURIComponent(p.client_email)}?subject=Message about ${encodeURIComponent(p.name||'project')}" class="btn btn-secondary">💬 Message Us</a></div>`;
      }
      html += `</div></div>`;
    }
    document.getElementById('project-section').innerHTML = html;
  }

  // Milestones
  const milestonesList = document.getElementById('milestones-list');
  if (updates.length > 0) {
    let ml = '';
    for (let m of updates.slice(0,5)) {
      ml += `<div class="milestone-item"><span>🚩</span><div><div style="font-weight:600">${m.description||'Update'}</div>`;
      ml += `<div style="font-size:12px;color:var(--text-secondary)">${new Date(m.created_at).toLocaleDateString()}</div></div></div>`;
    }
    milestonesList.innerHTML = ml;
    document.getElementById('milestones-section').style.display='block';
  } else {
    milestonesList.innerHTML = '<p style="font-size:13px;color:var(--text-secondary)">No recent milestones.</p>';
    document.getElementById('milestones-section').style.display='block';
  }

  // Invoice summary
  const totalBilled = invoices.reduce((sum, inv) => sum + (parseFloat(inv.amount)||0), 0);
  const totalPaid = invoices.reduce((sum, inv) => sum + (parseFloat(inv.paid_amount)||0), 0);
  const outstanding = totalBilled - totalPaid;
  const outstandingColor = outstanding > 0 ? '#F59E0B' : (outstanding < 0 ? '#EF4444' : 'var(--accent-blue)');

  const statusBar = document.getElementById('stats-bar');
  statusBar.innerHTML = `
    <div class="invoice-card"><div class="invoice-label">Total Billed</div><div>$${totalBilled.toLocaleString()}</div></div>
    <div class="invoice-card"><div class="invoice-label">Amount Paid</div><div style="color:var(--accent-green)">$${totalPaid.toLocaleString()}</div></div>
    <div class="invoice-card"><div class="invoice-label">Outstanding</div><div style="color:${outstandingColor}">$${Math.abs(outstanding).toLocaleString()}</div></div>
  `;
  document.getElementById('invoices-section').style.display='block';

  return result;
}

function initNavButtons() {
  const nav = document.querySelector('nav');
  const refreshBtn = document.createElement('button');
  refreshBtn.textContent = '🔄 Refresh';
  refreshBtn.className = 'btn-primary';
  refreshBtn.addEventListener('click', async () => await renderDashboard());
  refreshBtn.style.marginLeft='12px';

  const logoutBtn = document.createElement('a');
  logoutBtn.href='#';
  logoutBtn.textContent = '🚪 Logout';
  logoutBtn.className = 'btn-primary';
  logoutBtn.addEventListener('click', async (e) => { e.preventDefault(); await fetch('/api/auth/logout',{method:'POST'}); localStorage.clear(); window.location.href='/login.html'; });
  logoutBtn.style.marginLeft='12px';

  const printBtn = document.createElement('button');
  printBtn.textContent = '📄 Print';
  printBtn.className = 'btn-primary';
  printBtn.addEventListener('click', () => window.print());
  printBtn.style.marginLeft='12px';

  nav.appendChild(refreshBtn);
  nav.appendChild(logoutBtn);
  nav.appendChild(printBtn);
}

async function init() {
  const result = await renderDashboard();
  if (!result) return;

  // Admin controls
  async function renderAdminClients() {
    try {
      const res = await fetch(API_BASE + 'api/admin/clients', {
        headers: { 'Accept': 'application/json' },
        credentials: 'include'
      });
      
      if (!res.ok) return;
      const data = await res.json();
      const clients = data.clients || [];
      
      let html = '<table style="width:100%;margin-top:12px;"><thead><tr><th style="padding:8px;text-align:left;border-bottom:1px solid var(--border-room);font-size:12px;">Client</th><th style="padding:8px;text-align:left;border-bottom:1px solid var(--border-room);font-size:12px;">Email</th><th style="padding:8px;text-align:left;border-bottom:1px solid var(--border-room);font-size:12px;">Status</th><th style="padding:8px;text-align:left;border-bottom:1px solid var(--border-room);font-size:12px;">Actions</th></tr></thead><tbody>';
      
      for (let c of clients) {
        const statusClass = c.status === 'active' ? 'status-active' : 'status-inactive';
        html += '<tr>' +
          '<td style="padding:8px;border-bottom:1px solid var(--border-room);font-size:13px;">' + (c.name || 'Untitled') + '</td>' +
          '<td style="padding:8px;border-bottom:1px solid var(--border-room);color:var(--text-secondary);font-size:12px;">' + c.email + '</td>' +
          '<td style="padding:8px;border-bottom:1px solid var(--border-room);"><span class="' + statusClass + '" style="padding:3px 8px;border-radius:4px;font-size:10px;">' + (c.status === 'active' ? 'Active' : 'Inactive') + '</span></td>' +
          '<td style="padding:8px;border-bottom:1px solid var(--border-room);"><a href="/dashboard.html?impersonate=' + c.id + '" class="view-btn" style="font-size:11px;padding:3px 8px;background:rgba(59,130,246,0.1);color:var(--accent-blue);border-radius:4px;text-decoration:none;">View as</a></td>' +
          '</tr>';
      }
      
      html += '</tbody></table>';
      
      const existingTable = document.querySelector('.admin-clients-table');
      if (existingTable) {
        existingTable.innerHTML = html;
      } else {
        adminControls.children[0].innerHTML = html;
      }
    } catch (e) {
      console.error('Failed to fetch clients:', e);
    }
  }

  const adminControls = document.getElementById('admin-controls');
  if (isAdmin) {
    adminControls.style.display = 'flex';
    const viewAsBtn = document.createElement('button');
    viewAsBtn.textContent = '👁 View as Client';
    viewAsBtn.className = 'btn-primary';
    logoutBtn.insertBefore(viewAsBtn, logoutBtn.nextSibling);

    // Replace placeholder with actual client management table
    const clientTableWrapper = document.createElement('div');
    clientTableWrapper.className = 'admin-clients-table';
    renderAdminClients();
    adminControls.appendChild(clientTableWrapper);
  }

  showAlert('Dashboard loaded successfully.', 'success');
}

init().catch(e => console.error('Error:', e));
</script>
<style>
@media print{nav button{display:none}}
/* Mobile Responsive Improvements */
@media (max-width: 768px) { .container{padding:0 16px} h1{font-size:24px}.project-grid{grid-template-columns:1fr;gap:16px}.card{padding:16px}.invoice-card{flex-direction:column;gap:12px}.milestone-item{padding:12px}.nav-wrapper{padding:0 16px}.logo{font-size:14px} #impersonation-banner .banner-content{font-size:13px;padding:10px 16px}}
</style>
</body>
</html>
