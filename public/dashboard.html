<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Portal | MOLIAMA</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

:root{--bg-deep:#0B0E14;--bg-room:#1F2937;--border-room:#374151;--accent-blue:#3B82F6;--accent-purple:#8B5CF6;--accent-green:#10B981;--text-primary:#F9FAFB;--text-secondary: #9CA3AF;}

body{margin:0;padding:0;font-family:'Inter',system-ui,sans-serif;color:var(--text-primary);background:var(--bg-deep);padding-top:64px;opacity:0;transition:opacity 0.3s ease}
body.loaded{opacity:1}

nav{height:48px;border-bottom:1px solid var(--border-room);display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:rgba(15,23,42,0.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
nav .logo{font-size:14px;font-weight:700;letter-spacing:0.1em;color:#fff}
nav a{text-decoration:none;color:var(--text-secondary);font-size:13px;margin-left:20px}
a.back{color:var(--accent-blue)}

.container{max-width:1200px;margin:40px auto;padding:0 24px;display:grid;gap:32px}

h1{font-size:28px;font-weight:600}
.section{padding:24px;background:linear-gradient(135deg,rgba(59,130,246,0.06),rgba(139,92,246,0.06));border:1px solid var(--border-room);border-radius:12px;margin-bottom:24px}
.section-title{font-size:15px;font-weight:600;color:var(--accent-blue);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:16px}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{text-align:center;padding:20px;background:linear-gradient(135deg,var(--bg-room),rgba(31,41,55,0.7));border:1px solid var(--border-room);border-radius:12px;transition:all 0.2s ease}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(59,130,246,0.15)}
.stat-card .label{font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-secondary);margin-bottom:8px}
.stat-card .value{font-size:24px;font-weight:700;color:var(--accent-green)}

.project-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px}
.project-card{background:linear-gradient(135deg,rgba(59,130,246,0.06),rgba(139,92,246,0.06));border:1px solid var(--border-room);border-radius:12px;padding:20px;transition:all 0.2s ease}
.project-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(59,130,246,0.15)}
.type-badge,.status-badge{display:inline-block;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px}
.type-website{background:rgba(59,130,246,0.2);color:#60A5FA;border:1px solid rgba(59,130,246,0.3)}
.type-gbp{background:rgba(16,185,129,0.2);color:#34D399;border:1px solid rgba(16,185,129,0.3)}
.type-lsa{background:rgba(139,92,246,0.2);color:#A78BFA;border:1px solid rgba(139,92,246,0.3)}
.type-retainer{background:rgba(245,158,11,0.2);color:#FBBF24;border:1px solid rgba(245,158,11,0.3)}
.status-active{background:rgba(16,185,129,0.15);color:var(--accent-green);border:1px solid var(--accent-green)}
.status-in_progress{background:rgba(59,130,246,0.15);color:var(--accent-blue);border:1px solid #60A5FA}
.project-card h3{font-size:18px;margin-bottom:8px;color:var(--text-primary)}
.project-card .meta{font-size:14px;color:var(--text-secondary);margin-bottom:16px;line-height:1.5}

.timeline{position:relative;padding-left:24px;border-left:2px solid var(--border-room);margin-top:20px}
.timeline-item{position:relative;padding:16px 0;margin-left:32px;border-left:none;background:var(--bg-room);border-radius:8px;border:1px solid var(--border-room)}
.timeline-dot{position:absolute;left:-7px;top:20px;width:12px;height:12px;background:#3B82F6;border-radius:50%;box-shadow:0 0 0 4px rgba(59,130,246,0.3)}
.timeline-item h4{font-size:16px;color:var(--text-primary);margin-bottom:4px}
.timeline-item p{color:var(--text-secondary);line-height:1.5;margin-bottom:8px}
.timeline-item .date{font-size:13px;color:var(--text-secondary)}

.invoice-summary{background:linear-gradient(135deg,var(--bg-room),rgba(31,41,55,0.7));border:1px solid var(--border-room);border-radius:12px;padding:24px}
.invoice-stats{text-align:center;padding:20px;background:var(--bg-room);border:1px solid var(--border-room);border-radius:10px;margin-bottom:16px}
.invoice-stats .stat{font-size:32px;font-weight:700;color:var(--accent-green)}
.invoice-stats .label{font-size:14px;color:var(--text-secondary);margin-bottom:8px;display:block}
.invoice-actions{display:flex;flex-wrap:wrap;gap:12px}

.btn,.btn.secondary{display:inline-block;padding:12px 24px;border-radius:8px;text-decoration:none;font-weight:600;transition:all 0.2s;background:transparent;border:1px solid var(--border-room);color:#fff;cursor:pointer;margin-right:8px}
.btn:hover,.btn.secondary:hover{transform:translateY(-2px)}
.btn:hover{box-shadow:0 4px 12px rgba(59,130,246,0.3);background:linear-gradient(135deg,var(--accent-blue),var(--accent-purple))}
.btn.secondary:hover{border-color:#3B82F6;color:var(--text-primary)}

.empty-state{padding:48px;text-align:center;color:var(--text-secondary);background:var(--bg-room);border-radius:12px;border:1px dashed var(--border-room)}
.empty-state p{margin-bottom:12px}
.empty-state a{color:var(--accent-blue);font-weight:600;text-decoration:none}
.empty-state a:hover{text-decoration:underline}

#impersonation-banner{background:#FFED00;color:#000;padding:12px;position:sticky;top:48px;z-index:99;text-align:center;font-weight:600;display:flex;align-items:center;justify-content:center;gap:12px}
#impersonation-banner a{color:#000;font-weight:700;margin-left:8px;text-decoration:underline}

@media(max-width:768px){nav{padding:0 16px}.container{margin:24px auto;padding:0 16px}.stats-grid{grid-template-columns:1fr;gap:12px}.project-grid{grid-template-columns:1fr;gap:16px}.section{padding:16px;margin-bottom:16px}.stat-card{padding:16px}.invoice-summary{text-align:left;padding:16px}.btn,.btn.secondary{width:100%;margin-right:0}}
@media(max-width:480px){h1{font-size:22px}.project-card{padding:16px}}

</style>
</head>
<body>

<div id="impersonation-banner"><strong id="impersonated-name"></strong><a href="/dashboard" onclick="document.getElementById('impersonation-banner').style.display='none';location.reload()">Exit</a></div>

<nav><div class="logo">MOLIAMA | CLIENT PORTAL</div><div><a class="back" href="/">← Back to Website</a></div></nav>

<div class="container">
    <h1>Dashboard</h1>

    <!-- Stats Cards -->
    <div class="stats-grid" id="stats-grid"></div>

    <!-- Projects -->
    <div class="section">
        <div class="section-title">Active Projects</div>
        <div class="project-grid" id="projects-grid"></div>
    </div>

    <!-- Timeline/Milestones -->
    <div class="section">
        <div class="section-title">Project Updates & Milestones</div>
        <div class="timeline" id="timeline"></div>
    </div>

    <!-- Invoice Summary -->
    <div class="invoice-summary">
        <div class="section-title">Billing Overview</div>
        <div class="invoice-stats" id="invoice-stats">Loading invoices...</div>
        <div class="invoice-actions">
            <a class="btn" href="/api/invoices?export=pdf">Download PDFs</a>
            <a class="btn secondary" onclick="window.renderInvoiceModal()">View Details</a>
        </div>
    </div>

    <!-- Action Buttons -->
    <div class="section">
        <h2>Next Actions</h2>
        <div style="display:flex;flex-wrap:wrap;gap:12px;margin-top:16px;">
            <a class="btn" href="/">Book a Call</a>
            <a class="btn secondary" onclick="window.renderInvoiceModal()">View Invoice</a>
            <a class="btn secondary" href="#contact">Message Us</a>
        </div>
    </div>
</div>

<script>
(function() {
document.body.classList.add('loaded');

const urlParams = new URLSearchParams(window.location.search);

async function checkAuth(token) {
    try {
        const res = await fetch('/api/auth/status', {
            method: 'HEAD',
            headers: { 'X-Auth-Token': token }
        });
        return res.ok;
    } catch (e) {
        return false;
    }
}

async function fetchDashboard(token) {
    const data = await fetch('/api/dashboard', {
        method: 'GET',
        headers: { 'X-Auth-Token': token },
        credentials: 'include'
    }).then(r => r.json());

     
    return Promise.resolve(data);
}

(async function main() {
       // Get stored auth token from localStorage instead of cookie extraction
    const token=localStorage.getItem('authToken');

    if (!token) {
        window.location.href = '/login.html'; 
        return;
       }

        // Check if user is still authenticated
     async function checkAuth(token) {
         try {
             const res = await fetch('/api/auth/status', { method: 'HEAD' });
             return res.ok;
            } catch (e) { return false; }
        } 
     const isAuthenticated=await checkAuth(token);

    if (!isAuthenticated) {
        localStorage.removeItem('authToken');
        window.location.href = '/login.html';
        return;
      }

    let impersonatedUserId = urlParams.get('impersonate');
     
     // Fetch dashboard data
    const data = await fetchDashboard(token);
    
    if (!data.success) {
        localStorage.removeItem('authToken');
        window.location.href = '/login.html'; 
        return;
    }

    let currentUserId = data.user?.id;
    let currentUserRole = data.user?.role;
    let isAdmin = (currentUserRole === 'admin' || currentUserRole === 'superadmin');

    // Show impersonation banner for admin viewing another client
    if (impersonatedUserId && isAdmin) {
        document.getElementById('impersonation-banner').style.display = 'block';
        const name = data.user?.name;
        let userName = data.user?.name || 'Unknown Client';
        if (impersonatedUserId != currentUserId) {
            userName = data.user?.name || 'Impersonated User';
        }
        document.getElementById('impersonated-name').textContent = '👁 Viewing as ' + userName;
    }

    // Render stats cards
    const statsGrid = document.getElementById('stats-grid');
    let html = '';
    
    if (isAdmin) {
        html += '<div class="stat-card"><div class="label">Clients</div><div class="value" id="total-clients">0</div></div>';
    }
    html += '<div class="stat-card"><div class="label">Active Projects</div><div class="value">' + (data.stats?.active_projects || 0) + '</div></div>';
    if (!isAdmin) {
        const monthly = data.stats.monthly_total || 0;
        html += '<div class="stat-card"><div class="label">Monthly Revenue</div><div class="value">$' + monthly.toLocaleString() + '</div></div>';
    }
    statsGrid.innerHTML = html;

    // Get total client count for admin dashboard mode - IMPROVED FIX (not just >0)    
    if (isAdmin) {
        fetch('/api/admin/clients', { credentials: 'include' }).then(r => r.json()).then(c => {
            if (c.clients && c.clients.length >= 0) { document.getElementById('total-clients').textContent = c.clients.length; }
        });
    }

    // Render project cards - FIXED CODE 
    const projectGrid = document.getElementById('projects-grid');
    let projHtml = '';
    const projectsArray = data.projects || [];
    
    if (projectsArray.length === 0) {
        projHtml = '<div class="empty-state"><p>No active projects yet. <a href="/">Book a project now!</a></p></div>';
    } else {
        for (let i = 0; i < projectsArray.length; i++) {
            const project = projectsArray[i];
            const typeClass = 'type-' + (project.type || '').toLowerCase();
            const statusClass = 'status-' + (project.status || '').toLowerCase().replace(' ','_');
            let typeDisplay = project.type ? project.type.charAt(0).toUpperCase() + project.type.slice(1) : 'Website';
            let statusDisplay = (project.status === 'active') ? 'Active' : (project.status ? project.status.charAt(0).toUpperCase() + project.status.slice(1) : 'Completed');

            projHtml += '<div class="project-card">' +
                '<span class="type-badge ' + typeClass + '">' + typeDisplay + '</span> ' +
                '<span class="status-badge ' + statusClass + '">' + statusDisplay + '</span> ' +
                '<h3>' + (project.name || project.id) + '</h3>' +
                '<div class="meta">' +
                '<div>Type: ' + typeDisplay + '</div>' +
                '<div>Status: ' + statusDisplay + '</div>' +
                '<div>Monthly Rate: $' + (project.monthly_rate || 0).toLocaleString() + '</div>' +
                '<div>Started: ' + new Date(project.created_at || Date.now()).toLocaleDateString() + '</div>' +
                '</div></div>';
        }
    }
    projectGrid.innerHTML = projHtml;

    // Render milestone updates/timeline - FIXED (no undefined error)
    const timeline = document.getElementById('timeline');
    let timelineItems = '';
    let updatesArray = data.updates || [];
    
    if (updatesArray.length === 0 || updatesArray[0] == null) {
        timelineItems = '<div class="empty-state" style="font-size:14px;margin-top:24px">No updates yet. Your project team will post milestones here.</div>';
    } else {
        for (let j = 0; j < Math.min(updatesArray.length, 15); j++) {
            const update = updatesArray[j];
            if (update && (update.title || update.description)) {
                timelineItems += '<div class="timeline-item"><div class="timeline-dot"></div>' +
                    '<h4>' + (update.title || 'Project Update') + '</h4> ' +
                    '<p>' + (update.description || 'No description provided.') + '</p>' +
                    '<span class="date">' + new Date(update.created_at || Date.now()).toLocaleString() + '</span></div>';
            }
        }
    }
    timeline.innerHTML = timelineItems;

    // Invoice summary calculation from invoices API - FIXED CODE
    let totalBilled = 0, totalPaid = 0, outstanding = 0;
    if (data.invoices && data.invoices.length > 0) {
        for (let k = 0; k < data.invoices.length; k++) {
            const inv = data.invoices[k];
            let amount = inv.amount || 0;
            totalBilled += amount;
            if (amount > 0 && inv.status !== 'paid') outstanding += amount;
        }
        for (let p = 0; p < data.invoices.length; p++) {
            const inv2 = data.invoices[p];
            let amount2 = inv2.amount || 0;
            if (inv2.status === 'paid') totalPaid += amount2;
        }
    }

    const invoiceStatsHTML = '<span class="label">Total Billed</span>' +
        '<span class="stat">$' + totalBilled.toLocaleString() + '</span>' +
        '<div style="margin-top:12px"><span class="label">Paid</span><span class="stat" style="color:#34D399">$' + (totalPaid || 0).toLocaleString() + '</span></div>' +
        '<div style="margin-top:8px"><span class="label">Outstanding</span><span class="stat" style="color:#F59E0B">$' + (outstanding || 0).toLocaleString() + '</span></div>';

    invoiceStats.innerHTML = invoiceStatsHTML;
    
    // Render Invoice Modal with better error handling and no null reference errors

window.renderInvoiceModal = function(){ 
    let html2 = 'Invoice Details:\n\nTotal Billed: $' + totalBilled.toLocaleString() + '\nPaid: $' + (totalPaid || 0).toLocaleString() + '\nOutstanding: $' + (outstanding || 0).toLocaleString();
    
// Display the invoices in alert for now - should be modal popup later  
    if (data.invoices && data.invoices.length > 0) { 
        html2 += '\\n\\nInvoices:'; 
        for (let q = 0; q < data.invoices.length && q < 10; q++) {
            const inv3 = data.invoices[q];
            if (inv3 !== null && inv3.id != undefined) { 
                html2 += '\\n\\n#' + (q+1) + ' $' + (inv3.amount || 0).toLocaleString() + ' [' + (inv3.status||'unspecified').toUpperCase() + ']';
            }
        }     
    } else { 
           html2 += '\\nNo invoices yet.'; 
    }       
    html2 = html2.replaceAll('\\n', '\n');
    alert(html2);
}; 

})();

</script>
</body>
</html>
