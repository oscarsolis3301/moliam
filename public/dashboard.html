<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOLIAMA — Client Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0B0E14;
  --bg-building: #111827;
  --bg-room: #1F2937;
  --border-room: #374151;
  --accent-blue: #3B82F6;
  --accent-purple: #8B5CF6;
  --accent-green: #10B981;
  --text-primary: #F9FAFB;
  --text-secondary: #9CA3AF;
  --text-dim: #6B7280;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg-deep);
  font-family: 'Inter', system-ui, sans-serif;
  color: var(--text-primary);
  line-height: 1.6;
}
a { color: var(--accent-blue); text-decoration: none; }
a:hover { text-decoration: underline; }
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 32px 16px;
}
header {
  margin-bottom: 48px;
  text-align: center;
}
header h1 { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
header p { color: var(--text-secondary); font-size: 15px; }

/* Impersonation Banner */
#impersonation-banner {
  display: none;
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(245, 158, 11, 0.15);
  border-bottom: 1px solid rgba(245, 158, 11, 0.4);
  padding: 12px 32px;
  color: var(--accent-amber);
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
#impersonation-banner.visible { display: flex; }
.banner-text { color: var(--text-primary); }
.btn-exit {
  background: none;
  border: 1px solid var(--border-room);
  padding: 4px 12px;
  font-size: 13px;
  cursor: pointer;
  color: var(--text-secondary);
}
.btn-exit:hover { border-color: var(--accent-amber); color: var(--accent-amber); }

/* Cards */
.card {
  background: var(--bg-room);
  border: 1px solid var(--border-room);
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 24px;
}
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}
.card-title { font-size: 18px; font-weight: 600; }
/* Type badge */
.badge {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  padding: 4px 8px;
  border-radius: 6px;
  border: 1px solid var(--border-room);
}
.badge.type { background: rgba(59, 130, 246, 0.15); color: var(--accent-blue); border-color: rgba(59, 130, 246, 0.3); }
.badge.status-completed { background: rgba(16, 185, 129, 0.15); color: var(--accent-green); border-color: rgba(16, 185, 129, 0.3); }
.badge.status-active { background: rgba(139, 92, 246, 0.15); color: var(--accent-purple); border-color: rgba(139, 92, 246, 0.3); }

/* Project Detail */
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
.detail-item label { color: var(--text-dim); font-size: 12px; text-transform: uppercase; display: block; margin-bottom: 4px; }
.detail-item .value { font-size: 15px; font-weight: 500; }

/* Invoice Summary */
.invoice-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 20px; }
.metric-box { background: rgba(31, 41, 55, 0.7); border: 1px solid var(--border-room); border-radius: 8px; padding: 16px; text-align: center; }
.metric-label { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }
.metric-value { font-size: 24px; font-weight: 700; }

/* Action Buttons */
actions-list { display: flex; gap: 12px; list-style: none; margin-top: 24px; flex-wrap: wrap; }
.action-btn {
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
  color: #fff !important;
  padding: 12px 20px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  text-align: center;
  transition: all 0.2s;
}
.action-btn:hover { opacity: 0.9; transform: translateY(-1px); }

/* Empty State */
.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--text-secondary);
}

/* Timeline */
.timeline-header { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
.milestone-item {
  padding: 16px;
  background: rgba(15, 23, 42, 0.5);
  border-left: 3px solid var(--accent-blue);
  border-radius: 8px 0 0 8px;
  margin-bottom: 12px;
}
.milestone-date { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
.milestone-text { font-size: 14px; }

/* Loading */
.loading { text-align: center; padding: 64px; color: var(--text-secondary); }

/* Mobile */
@media (max-width: 768px) {
  .container { padding: 20px 16px; }
  .detail-grid { grid-template-columns: 1fr; }
  .invoice-grid { grid-template-columns: 1fr; }
  actions-list { flex-direction: column; }
}
</style>
</head>
<body>

<noscript>Please enable JavaScript to view your dashboard.</noscript>

<div class="container" id="app">
  <header>
    <h1 id="page-title">Loading...</h1>
    <p id="page-subtitle">Your MOLIAMA Project Status</p>
  </header>

  <div id="content">
    <div class="loading">Loading your dashboard...</div>
  </div>

</div>

<script>
// ═══════════════════════════════════════
// SECTION: Configuration
// ═══════════════════════════════════
const API_BASE = '/api';

// ═══════════════════════════════════════
// SECTION: Utility Helpers
// ═══════════════════════════════════════
function formatCurrency(amount) {
  return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(amount);
}

function formatDate(isoDate) {
  if (!isoDate) return 'N/A';
  return new Date(isoDate).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
}

// ═══════════════════════════════════════
// SECTION: Routing & Auth Check
// ═══════════════════════════════════════
async function checkAuth() {
  try {
    const resp = await fetch(`${API_BASE}/auth/status`, { credentials: 'include' });
    if (!resp.ok) return null;
    const data = await resp.json();
    return data.user || null;
  } catch (err) {
    console.error('Auth check failed:', err);
    return null;
  }
}

// ═══════════════════════════════════════
// SECTION: Dashboard Renderer
// ═══════════════════════════════════════
function renderDashboard(user, data) {
  const contentEl = document.getElementById('content');
  const titleEl = document.getElementById('page-title');
  
  if (!user) {
    window.location.href = '/login';
    return;
  }

  const isImpersonated = !!new URLSearchParams(window.location.search).get('impersonate');
  if (isImpersonated) {
    const banner = createBanner(data.impersonation_user_name);
    contentEl.innerHTML = '';
    document.getElementById('app').appendChild(banner);
  }

  titleEl.textContent = data.user_name + (isImpersonated ? ' - Impersonating' : '');
  
  // Handle no projects or data error
  if (!data || !data.recent_projects || data.projects_count === 0) {
    contentEl.innerHTML = '<div class="empty-state"><p>No active projects yet.</p><ul actions-list><li><a href="/" class="action-btn">Book a Free Consultation</a></li></ul></div>';
    return;
  }

  const projectCards = data.recent_projects.map(p => `
      <div class="project-card">
        <div style="display:flex; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:12px;">
          <span class="badge type">${p.type || 'service'}</span>
          <span class="badge ${p.status === 'completed' ? 'status-completed' : 'status-active'}">${p.status || 'active'}</span>
        </div>
        <h3 style="margin-bottom:8px;">${p.project_name}</h3>
        <div class="detail-grid">
          ${p.monthly_value ? `<div class="detail-item"><label>Monthly Rate</label><div class="value">${formatCurrency(p.monthly_value)}</div></div>` : ''}
          <div class="detail-item"><label>Start Date</label><div class="value">${formatDate(p.start_date)}</div></div>
        </div>
      </div>`).join('');
  
  const html = `<div class="card">` +
    `<div class="card-header"><span class="card-title">Active Projects</span>${projectCards}</div></div>`;

  if (data.project_updates && data.project_updates.length > 0) {
    html += createMilestones(data.project_updates);
  }

  if (data.invoice_summary) {
    html += createInvoiceSummary(data.invoice_summary);
  }

  const actionsContainer = `
    <actions-list>
      ${!isImpersonated ? `<li><a href="/" class="action-btn">Book a Call</a></li>` : ''}
      <li><a href="/" class="action-btn">Message Us</a></li>
      <li><a href="/invoices" class="action-btn">View Invoices</a></li>
    </actions-list>
  `;

  contentEl.innerHTML = html + actionsContainer;
}

function createBanner(impersonationName) {
  const banner = document.createElement('div');
  banner.className = 'card';
  banner.style.marginBottom = '24px';
  banner.innerHTML = `
    <div style="display:flex; align-items:center; justify-content:space-between;">
      <span class="banner-text">👁 Viewing as ${impersonationName} — exit impersonation</span>
      <form method="post" action="${API_BASE}/auth/exit-impersonation"><button class="btn-exit">Exit</button></form>
    </div>
  `;
  return banner;
}

function createMilestones(updates) {
  let html = '<div class="card">\n<div class="timeline-header">Project Updates & Milestones</div>\n';
  
  for (const upd of updates) {
    const cardTitle = upd.card_title || '';
    const textContent = upd.text_content || `(Update on ${formatDate(upd.project_update_date)})`;
    html += `
      <div class="milestone-item">
        ${cardTitle ? `<div style="font-weight:600;margin-bottom:4px;">${cardTitle}</div>` : ''}
        <div class="milestone-date">${formatDate(upd.project_update_date)}</div>
        <div class="milestone-text">${textContent}</div>
      </div>
    `;
  }
  
  html += '</div>';
  return html;
}

function createInvoiceSummary(inv) {
  const billed = Number(inv.total_billed) || 0;
  const paid = Number(inv.total_paid) || 0;
  const outstanding = Math.max(0, billed - paid);
  
  return `
    <div class="card">
      <div class="card-header"><span class="card-title">Invoice Summary</span></div>
      <div class="invoice-grid">
        <div class="metric-box">
          <div class="metric-label">Total Billed</div>
          <div class="metric-value">${formatCurrency(billed)}</div>
        </div>
        <div class="metric-box">
          <div class="metric-label">Amount Paid</div>
          <div class="metric-value" style="color:var(--accent-green)">${formatCurrency(paid)}</div>
        </div>
        <div class="metric-box">
          <div class="metric-label">Outstanding Balance</div>
          <div class="metric-value" style="color:var(--accent-blue)">${formatCurrency(outstanding)}</div>
        </div>
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════
// SECTION: Dashboard Loader
// ═══════════════════════════════════════
async function loadDashboard() {
  const user = await checkAuth();
  
  if (!user) {
    window.location.href = '/login';
    return;
  }

  try {
    // Fetch dashboard data with credentials
    const resp = await fetch(`${API_BASE}/dashboard`, { credentials: 'include' });
    
    if (!resp.ok) {
      contentEl.innerHTML = '<div class="empty-state"><p>Invalid session. Please log in again.</p></div>';
      return;
    }

    const data = await resp.json();
    renderDashboard(user, data);
  } catch (err) {
    console.error('Failed to load dashboard:', err);
    document.getElementById('content').innerHTML = '<div class="empty-state"><p>Error loading dashboard</p></div>';
  }
}

// Start loader on page load
window.addEventListener('DOMContentLoaded', loadDashboard);
</script>
</body>
</html>
