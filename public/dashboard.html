<head>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>:root{--bg-deep:#0B0E14;--bg-room:#1F2937;--border-room:#374151;--accent-blue:#3B82F6;--accent-purple:rgb(139,92,246);--accent-green:#10B981;--text-primary:#F9FAFB;--text-secondary:#9CA3AF}skeletonShimmer{background:linear-gradient(90deg,var(--bg-room) 25%,var(--border-room) 50%,var(--bg-room) 75%);background-size:200% 100%;animation:skeletonPulse 1.5s ease-in-out infinite}@keyframes skeletonPulse{0%{background-position:200% 0}100%{background-position:-200% 0}}body{margin:0;padding:0;background:var(--bg-deep);font-family:'Inter',system-ui,sans-serif;color:var(--text-primary)}nav{height:56px;border-bottom:1px solid var(--border-room);display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:rgba(11,14,20,0.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);position:fixed;top:0;width:100%;z-index:100}.nav-wrapper{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;gap:24px}.logo{font-size:15px;font-weight:700;letter-spacing:0.1em;color:#fff}nav a{text-decoration:none;color:var(--text-secondary);font-size:13px}.back-btn{color:var(--accent-blue)}.container{max-width:1200px;margin:80px auto;padding:0 24px;display:grid;gap:36px}.section-title{font-size:18px;font-weight:500;color:var(--text-secondary);margin-bottom:16px}h1{font-size:36px;font-weight:700;margin-bottom:12px;color:var(--text-primary)}section{padding:0;animation:slideUp 0.4s ease-out forwards;opacity:0;transform:translateY(20px)}.@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
/* CARD GLASS EFFECTS - ENHANCED */
.card{background:linear-gradient(135deg,rgba(59,130,246,0.08),rgba(139,92,246,0.08));border:1px solid rgba(55,56,81,0.5);border-radius:16px;padding:24px;transition:all 0.4s cubic-bezier(0.4,0,0.2,1);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}.card:hover{box-shadow:0 8px 32px rgba(59,130,246,0.2);transform:translateY(-4px);border-color:rgba(59,130,246,0.3)}
/* ═══════════════════════════════════════════
   PROJECT CARD POLISH */
.project-card{background:linear-gradient(135deg,rgba(59,130,246,0.08),rgba(139,92,246,0.08));border:1px solid rgba(55,65,81,0.5);border-radius:16px;padding:24px;transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);position:relative;overflow:hidden}.project-card::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(59,130,246,0.15),transparent 70%);opacity:0;transition:opacity 0.4s}.project-card:hover::after{opacity:1}.project-card:hover{box-shadow:0 8px 40px rgba(59,130,246,0.2),inset 0 0 0 1px rgba(59,130,246,0.15);transform:translateY(-5px)}.project-card h3{letter-spacing:-0.01em}.project-name{background:linear-gradient(135deg,#3B82F6,#8B5CF6,-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-fill-color:transparent)}

/* TYPE BADGES */
.type-badge{display:inline-block;padding:6px 12px;border-radius:8px;font-size:11px;font-weight:700;transition:all 0.3s;cursor:pointer;border:1px solid transparent}.type-badge:hover{transform:scale(1.05);box-shadow:0 4px 12px rgba(59,130,246,0.2)}.type-website{background:rgba(59,130,246,0.1);color:#60A5FA;border-color:rgba(59,130,246,0.3)}.type-gbp{background:rgba(16,185,129,0.1);color:#34D399;border-color:rgba(16,185,129,0.3)}.type-lsa{background:rgba(139,92,246,0.1);color:#A78BFA;border-color:rgba(139,92,246,0.3)}.type-retainer{background:rgba(251,191,36,0.1);color:#FBBF24;border-color:rgba(251,191,36,0.3)}

/* STATUS BADGES */
.status-badge{display:inline-block;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);position:relative}.status-active{background:linear-gradient(135deg,rgba(16,185,129,0.15),rgba(16,185,129,0.05));color:var(--accent-green);border:1px solid rgba(16,185,129,0.3);box-shadow:inset 0 0 0 1px rgba(16,185,129,0.2)}.status-pending{background:linear-gradient(135deg,rgba(251,191,36,0.1),rgba(251,191,36,0.05));color:#FBBF24;border:1px solid rgba(251,191,36,0.3);box-shadow:inset 0 0 0 1px rgba(251,191,36,0.2)}.status-badge::before{content:'';position:absolute;top:-1px;bottom:-1px;left:-1px;right:-1px;border-radius:6px;padding:1px;background:linear-gradient(45deg,var(--accent-green),var(--accent-blue));opacity:0;transition:opacity 0.3s}.status-badge:hover::before{opacity:1}.status-badge:hover{box-shadow:0 0 12px rgba(16,185,129,0.3),inset 0 0 0 1px rgba(16,185,129,0.4);transform:scale(1.05)}

/* BUTTON HOVER EFFECTS */
.project-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:24px;margin-bottom:20px}.project-card{padding:24px;background:linear-gradient(135deg,rgba(59,130,246,0.05),rgba(139,92,246,0.08));border:1px solid rgba(55, 65, 81, 0.5);border-radius:16px;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}#project-section{ animation-delay:0ms }#milestones-section{animation-delay:150ms}#invoices-section{animation-delay:300ms}.progress-high{background:linear-gradient(90deg,var(--accent-green),#059669)}.progress-medium{background:linear-gradient(90deg,#F59E0B,#F59E0B)}.progress-low{background:linear-gradient(90deg,rgba(139,92,246,0.5),var(--accent-purple))}.progress-none{background:linear-gradient(90deg,rgba(156,163,175,0.3),#6B7280)}

#page-loading-spinner { display: none; text-align: center; padding: 48px; animation: fadeIn 0.3s ease; }
.spinner { border: 3px solid rgba(59,130,246,0.2); border-top-color: #3B82F6; width: 32px; height: 32px; border-radius: 50%; margin: 0 auto; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#error-state { display: none; text-align: center; padding: 48px; background: rgba(239,68,68,0.05); border: 1px solid rgba(239,68,68,0.3); border-radius: 12px; animation: slideIn 0.3s ease; }
#error-state h2 { color: #EF4444; margin-bottom: 12px; }
#error-state p { color: var(--text-secondary); margin-bottom: 16px; }
.loading { display: none; text-align: center; padding: 48px; animation: fadeIn 0.3s ease; }</style>

<body>
<nav role="navigation" aria-label="Main site navigation"><div class="logo" id="site-logo">MOLIAMA</div><a href="/" class="back-btn" aria-label="Navigate back to Moliam homepage">← Back to Website</a></nav>
<div id="impersonation-banner" role="alert" aria-live="polite"><div class="banner-content">👁 Viewing as <span id="viewing-as"></span> - <a id="exit-btn" href="/dashboard.html" aria-label="Exit impersonation mode and return to your own dashboard">Exit</a></div></div>
<div class="container" role="main" aria-label="User Dashboard">
<h1>Your Dashboard</h1>
<section id="project-section" aria-label="Your projects"><div class="loading">Loading projects...</div></section>
<section id="milestones-section" style="display:none" aria-label="Project milestones timeline"><h2>Milestones Timeline</h2><div id="milestones-list"></div></section>
<section id="invoices-section" style="display:none" aria-label="Invoice summary and billing status"><h2>Invoice Summary</h2><div class="invoice-summary" id="stats-bar"></div></section>

<!-- Progress loading state for better UX -->
<div class="loading" id="page-loading-spinner" style="display:none;text-align:center;padding:48px;">
  <div class="spinner" style="border:3px solid rgba(59,130,246,0.2);border-top-color:#3B82F6;width:32px;height:32px;border-radius:50%;margin:0 auto;"></div>
  <p style="margin-top:16px;color:var(--text-secondary);font-size:13px;">Loading dashboard data...</p>
</div>

<!-- Error state UI -->
<div id="error-state" class="error-state" style="display:none;text-align:center;padding:48px;background:rgba(239,68,68,0.05);border:1px solid rgba(239,68,68,0.3);border-radius:12px;">
  <h2 style="color:#EF4444;margin-bottom:12px;">Unable to Load Dashboard</h2>
  <p id="error-message" style="color:var(--text-secondary);margin-bottom:16px;"></p>
  <a href="/dashboard.html" class="btn-primary" style="display:inline-block;padding:10px 20px;background:var(--accent-blue);color:#fff;border:none;border-radius:8px;cursor:pointer;">Refresh Dashboard</a>
</div>
<script>
const API_BASE = '/';
</script>

<script>
const url = new URL(window.location);
const impersonateId = url.searchParams.get('impersonate');

async function fetchDashboard() {
  try {
    const params = {};
    if (impersonateId) params.impersonate = impersonateId;
    const res = await fetch(API_BASE + 'api/dashboard?' + new URLSearchParams(params), {
      headers: {'Accept': 'application/json'},
      credentials: 'include'
    });
    if (!res.ok) {
      if (res.status === 401 || res.status === 403) {
        window.location.href = '/login.html';
        return null;
      }
      const data = await res.json();
      return { success: data.success, data: data };
    }
    return await res.json();
  } catch (e) {
    console.error('Fetch error:', e);
    return { success: false, err: e.message };
  }
}

function showImpersonationBanner(client) {
  if (impersonateId) {
    const isAdmin = localStorage.getItem('user_role') === 'admin';
    if (isAdmin) {
      const banner = document.getElementById('impersonation-banner');
      const viewingSpan = document.getElementById('viewing-as');
      banner.style.display = 'flex';
      viewingSpan.textContent = client?.name || 'Client';
      document.getElementById('exit-btn').href = window.location.pathname;
    } else {
      // Non-admin trying to impersonate - redirect away
      delete params.impersonate;
    }
  }
}

function showModal(title, content) {
  return '<dialog style="background:var(--bg-room);color:var(--text-primary);padding:24px;border-radius:16px;border:1px solid var(--border-room)"><h3>' + title + '</h3>' + content + '</dialog>';
}

function showAlert(message, type = 'info', duration = 4000) {
  const existingAlert = document.querySelector('.alert-toast');
  if (existingAlert) existingAlert.remove();
  const alert = document.createElement('div');
  alert.className = `alert-toast ${type}`;
  alert.innerHTML = `<span>${message}</span><button class="alert-dismiss">&times;</button>`;
  alert.style.background = type === 'error' ? '#EF4444' : type === 'success' ? '#10B981' : '#3B82F6';
  
  const dismissBtn = alert.querySelector('.alert-dismiss');
  dismissBtn.onclick = () => {
    alert.classList.remove('show');
    setTimeout(() => alert.remove(), 200);
  };
  
  document.body.appendChild(alert);
  requestAnimationFrame(() => alert.classList.add('show'));
  setTimeout(() => alert.remove(), duration);
}

/* TOAST NOTIFICATIONS - Styled alert toasts with dismiss button */
.alert-toast{position:fixed;top:72px;right:24px;z-index:1000;padding:16px 20px;border-radius:10px;color:#fff;font-size:13px;font-weight:500;box-shadow:0 4px 24px rgba(0,0,0,0.3);border:1px solid var(--border-room);animation:toastSlideIn 0.3s cubic-bezier(0.4,0,0.2,1);max-width:360px;overflow-wrap:break-word}.@keyframes toastSlideIn{from{opacity:0;transform:translateX(48px)}to{opacity:1;transform:translateX(0)}}.alert-toast.show{opacity:1}.alert-toast button.alert-dismiss{position:absolute;top:50%;right:12px;transform:translateY(-50%);background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:0;margin:0;line-height:1;opacity:0.6;transition:opacity 0.2s ease}.alert-toast button.alert-dismiss:hover{opacity:1}.alert-toast.info{background:#3B82F6}.alert-toast.success{background:#10B981}.alert-toast.error{background:#EF4444}@media(max-width:768px){.alert-toast{top:60px;right:16px;left:16px;max-width:none;padding:12px 16px;font-size:12px}}

async function renderDashboard() {
  const result = await fetchDashboard();
  if (!result || !result.success) return null;

  const client = result.data.client;
  const projects = result.data.projects || [];
  const invoices = result.data.invoices || [];
  const updates = result.data.project_updates || [];

  showImpersonationBanner(client);

  // Show skeleton loading for first render with better UX feedback
const projectSection = document.getElementById('project-section');
if (!projects.length && !updates.length && !invoices.length) {
    projectSection.innerHTML = '<div class="skeleton-card skeletonShimmer" style="height:180px;border-radius:16px;"></div>';
    projectSection.dataset.loading='true';
  } else {
    projectSection.dataset.loading='false';
    projectSection.classList.add('fade-in');
    // Project cards
    let html = '';
    if (!projects.length) {
      html = '<div class="empty-state"><h3>No active projects yet</h3><p>Ready to get started?</p></div>';
    } else {
      for (let p of projects) {
        const typeClass = p.type ? p.type.toLowerCase().replace(' ', '-') : 'website';
        html += `<div class="project-card fade-in" role="article" aria-label="Project card: ${p.name || 'Untitled'}">`;
        html += `<div class="project-header"><h3 class="project-name">${p.name || 'Project'}</h3>`;
        html += `<div><span class="type-badge type-${typeClass}" role="img" aria-label="${p.type || 'Website'} type badge">${p.type || 'Website'}</span>`;
        html += `<span class="status-badge status-${p.status==='active'?'active':'pending'}" role="img" aria-label="${p.status==='active'?'Active':'Pending'} status">${p.status==='active'?'Active':'Pending'}</span></div></div>`;
        html += `<div class="project-details">`;
        html += `<div class="detail-row"><span>Monthly Rate:</span><span>$${(parseFloat(p.monthly_rate)||0).toLocaleString()}</span></div>`;
        html += `<div class="detail-row"><span>Start Date:</span><span>${p.start_date?new Date(p.start_date).toLocaleDateString():'N/A'}</span></div>`;
        if (p.invoice_url && p.invoice_url !== '#') {
          html += `<div class="project-actions"><a href="${p.invoice_url}" class="btn btn-secondary">📄 View Invoice</a></div>`;
        }
        if (p.client_email) {
          html += `<div class="project-actions"><a href="mailto:${encodeURIComponent(p.client_email)}?subject=Message about ${encodeURIComponent(p.name||'project')}" class="btn btn-secondary">💬 Message Us</a></div>`;
        }
        html += `</div></div>`;
      }
      document.getElementById('project-section').innerHTML = html;
    }

     // Milestones with skeleton loading and progress visualization
    const milestonesList = document.getElementById('milestones-list');
    if (updates.length > 0) {
      let ml = '';
      for (let m of updates.slice(0,5)) {
   // Calculate progress - use completion_status if exists, otherwise show "N/A" instead of fake random
 const status = m.completion_status !== undefined && m.completion_status !== null ? m.completion_status : 0;
        const progressClass = status > 80 ? 'progress-high' : (status > 40 ? 'progress-medium' : (status > 0 ? 'progress-low' : 'progress-none'));

        if (status === 0 && (!m.completion_status || m.completion_status === null)) {
          // No completion_status available - show N/A state
          ml += `<div class="milestone-item fade-in">` +
             `<div style="display:flex;justify-content:space-between,align-items:center;margin-bottom:8px;">` +
               `<span style="font-size:18px;user-select:none">🚩</span>` +
               `<div style="flex:1;margin-left:12px;"` +
                 `style="background:var(--bg-room);border-radius:4px;height:6px;overflow:hidden;">` +
                 `<div class="${progressClass}" style="height:100%;width:0%;transition:all 0.5s ease">N/A —<span style="font-size:10px;color:var(--text-secondary)">No data</span></div></div></div>` +
               `<div style="font-size:12px;color:${status > 80 ? 'var(--accent-green)':'#F59E0B'};flex-shrink:0;margin-left:12px;">?</div></div>` +
               `<div>${m.description||'Update'}</div>` +
               `<div style="font-size:11px;color:var(--text-secondary)">Created ${new Date(m.created_at).toLocaleDateString()}</div></div>`;
        } else {
          // Has completion_status - show progress with visual indicators
          ml += `<div class="milestone-item fade-in">` +
             `<div style="display:flex;justify-content:space-between,align-items:center;margin-bottom:8px;">` +
               `<span style="font-size:18px;user-select:none">🚩</span>` +
               `<div style="flex:1;margin-left:12px;"` +
                 `style="background:var(--bg-room);border-radius:4px;height:6px;overflow:hidden;">` +
                 `<div class="${progressClass}" style="height:100%;width:${status}%;transition:all 0.5s ease">` +
                   `${status}% ${status > 70 ? '✓✅' : (status < 40 ? '⏳' : '')}</div></div></div>` +
               `<div style="font-size:12px;color:${status > 80 ? 'var(--accent-green)':'#F59E0B'};flex-shrink:0;margin-left:12px;">${status}%</div></div>` +
               `<div>${m.description||'Update'}</div>` +
               `<div style="font-size:11px;color:var(--text-secondary)">Created ${new Date(m.created_at).toLocaleDateString()}</div></div>`;
        }
      }
      milestonesList.innerHTML = ml;
      document.getElementById('milestones-section').style.display='block';
    } else {
      milestonesList.innerHTML = '<p style="font-size:13px;color:var(--text-secondary)">No recent milestones.</p>';
      document.getElementById('milestones-section').style.display='block';
    }

    // Invoice summary with slide-in effect
    const totalBilled = invoices.reduce((sum, inv) => sum + (parseFloat(inv.amount)||0), 0);
    const totalPaid = invoices.reduce((sum, inv) => sum + (parseFloat(inv.paid_amount)||0), 0);
    const outstanding = totalBilled - totalPaid;
    const accentGreen = '#10B981';
    const outstandingColor = outstanding > 0 ? '#F59E0B' : (outstanding < 0 ? '#EF4444' : 'var(--accent-blue)');

const statusBar = document.getElementById('stats-bar');
    
    // Get latest invoice actioned_at for display
    const lastPaidInvoice = invoices.find(inv => (parseFloat(inv.paid_amount)||0) > 0);
    const lastActionDate = lastPaidInvoice?.actioned_at ? new Date(lastPaidInvoice.actioned_at).toLocaleDateString() : null;
    
    statusBar.innerHTML = `
       <div class="invoice-card fade-in" style="animation-delay:100ms"><div class="invoice-label">Total Billed</div><div>$${totalBilled.toLocaleString()}</div></div>
       <div class="invoice-card fade-in" style="animation-delay:200ms"><div class="invoice-label">Amount Paid</div><div style="color:${accentGreen}">$${totalPaid.toLocaleString()}${lastActionDate ? '<br><span style="font-size:11px;color:var(--text-primary)">Last actioned: ' + lastActionDate + '</span>' : ''}</div></div>
       <div class="invoice-card fade-in" style="animation-delay:300ms"><div class="invoice-label">Outstanding</div><div style="color:${outstandingColor}">$${Math.abs(outstanding).toLocaleString()}</div></div>
    `;
    document.getElementById('invoices-section').style.display='block';

  return result;
}

function initNavButtons() {
  const nav = document.querySelector('nav');
  const refreshBtn = document.createElement('button');
  refreshBtn.textContent = '🔄 Refresh';
  refreshBtn.className = 'btn-primary';
  refreshBtn.addEventListener('click', async () => await renderDashboard());
  refreshBtn.style.marginLeft='12px';

  const logoutBtn = document.createElement('a');
  logoutBtn.href='#';
  logoutBtn.textContent = '🚪 Logout';
  logoutBtn.className = 'btn-primary';
  logoutBtn.addEventListener('click', async (e) => { e.preventDefault(); await fetch('/api/auth/logout',{method:'POST'}); localStorage.clear(); window.location.href='/login.html'; });
  logoutBtn.style.marginLeft='12px';

  const printBtn = document.createElement('button');
  printBtn.textContent = '📄 Print';
  printBtn.className = 'btn-primary';
  printBtn.addEventListener('click', () => window.print());
  printBtn.style.marginLeft='12px';

  nav.appendChild(refreshBtn);
  nav.appendChild(logoutBtn);
  nav.appendChild(printBtn);
}

async function init() {
  const result = await renderDashboard();
  if (!result) return;

  // Admin controls with search
  let allClientsData = [];
  const isAdmin = localStorage.getItem('user_role') === 'admin';

  async function renderAdminClients(searchTerm = '') {
    try {
      const res = await fetch(API_BASE + 'api/admin/clients', {
        headers: { 'Accept': 'application/json' },
        credentials: 'include'
      });
      
      if (!res.ok) return;
      const data = await res.json();
      allClientsData = (data.clients || []).map(c => ({...c, originalId: c.id}));
      
      // Filter by search term
      const filtered = searchTerm.trim() ? 
        allClientsData.filter(c => 
           (c.name || '').toLowerCase().includes(searchTerm.toLowerCase()) ||
           (c.email || '').toLowerCase().includes(searchTerm.toLowerCase())
         ) : 
        allClientsData;
      
      html += '<div style="display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;margin-bottom:12px;gap:12px;">';
      html += '<h3 style="font-size:14px;margin:0;">Client Management</h3>' +
          '<div style="display:flex;gap:8px;">' +
          '<input type="text" placeholder="Search clients..." class="client-search-input"' +
            'style="background:var(--bg-room);border:1px solid var(--border-room);border-radius:6px;padding:6px 12px;color:var(--text-primary);font-size:12px;width:180px;">' +
          '<select class="type-filter" style="background:var(--bg-room);border:1px solid var(--border-room);border-radius:6px;padding:6px 12px;color:var(--text-primary);font-size:12px;">' +
            '<option value="">All Types</option>' +
            '<option value="active">Active Clients</option>' +
            '<option value="inactive">Inactive Clients</option>' +
          '</select>' +
          '</div>' +
          '</div>';
      html += '<input type="search" placeholder="Search clients..." id="admin-search-input" class="admin-filter" style="width:200px;padding:6px 12px;margin-left:8px;" aria-label="Search for clients by name or email">';
      html += '</div>';
      html += '<table style="width:100%;margin-top:12px;"><thead><tr><th style="padding:8px;text-align:left;border-bottom:1px solid var(--border-room);font-size:12px;">Client</th><th style="padding:8px;text-align:left;border-bottom:1px solid var(--border-room);font-size:12px;">Email</th><th style="padding:8px;text-align:left;border-bottom:1px solid var(--border-room);font-size:12px;">Status</th><th style="padding:8px;text-align:left;border-bottom:1px solid var(--border-room);font-size:12px;">Actions</th></tr></thead><tbody>';
      
      if (filtered.length === 0 && allClientsData.length > 0) {
        html += '<tr><td colspan="4" style="padding:32px;text-align:center;color:var(--text-secondary);">No clients found matching "' + searchTerm + '"'+ '</td></tr>';
      } else {
        for (let c of filtered) {
          const statusClass = c.status === 'active' ? 'status-active' : 'status-inactive';
          html += '<tr>' +
              '<td style="padding:8px;border-bottom:1px solid var(--border-room);font-size:13px;">' + (c.name || 'Untitled') + '</td>' +
              '<td style="padding:8px;border-bottom:1px solid var(--border-room);color:var(--text-secondary);font-size:12px;">' + c.email + '</td>' +
              '<td style="padding:8px;border-bottom:1px solid var(--border-room);"><span class="' + statusClass + '" style="padding:3px 8px;border-radius:4px;font-size:10px;">' + (c.status === 'active' ? 'Active' : 'Inactive') + '</span></td>' +
               '<td style="padding:8px;border-bottom:1px solid var(--border-room);"><a href="/dashboard.html?impersonate=' + c.originalId + '" class="view-btn" style="font-size:11px;padding:3px 8px;background:rgba(59,130,246,0.1);color:var(--accent-blue);border-radius:4px;text-decoration:none;" aria-label="View dashboard as ' + (c.name || 'client') + '">View as</a></td>' +
               '</tr>';
        }
      }
      
      html += '</tbody></table>';
      
      const existingTable = document.querySelector('.admin-clients-table');
      if (existingTable) {
        existingTable.innerHTML = html;
        // Setup search event listener
        setTimeout(() => {
          const searchInput = document.getElementById('admin-search-input');
          if (searchInput) {
            searchInput.addEventListener('input', (e) => renderAdminClients(e.target.value));
          }
        }, 0);
      } else {
        console.warn('admin-controls container not found, appending table to nav');
        const tableWrapper = document.createElement('div');
        tableWrapper.className = 'admin-clients-table';
        tableWrapper.innerHTML = html;
        // Append after logout button
        const nav = document.querySelector('nav');
        if (nav) {
          const adminContainer = document.createElement('div');
          adminContainer.style.marginTop = '12px';
          adminContainer.appendChild(tableWrapper);
          nav.appendChild(adminContainer);
          setTimeout(() => {
            const searchInput = document.getElementById('admin-search-input');
            if (searchInput) {
              searchInput.addEventListener('input', (e) => renderAdminClients(e.target.value));
            }
          }, 0);
        }
      }
    } catch (e) {
      console.error('Failed to fetch clients:', e);
    }
  }

  const nav = document.querySelector('nav');
  if (isAdmin && nav) {
    // Find logout button and add admin controls after it
    const logoutBtn = nav.querySelector('.btn-primary:last-child');
    if (logoutBtn) {
      const viewAsBtn = document.createElement('button');
      viewAsBtn.textContent = '👁 View as Client';
      viewAsBtn.className = 'btn-primary';
      viewAsBtn.style.marginLeft = '12px';
      viewAsBtn.addEventListener('click', () => {
        window.location.href = '/admin.html';
      });
      nav.appendChild(viewAsBtn);

      // Replace placeholder with actual client management table
      const adminContainer = document.createElement('div');
      adminContainer.className = 'client-management-section';
      adminContainer.style.marginTop = '12px';
      
      const tableWrapper = document.createElement('div');
      tableWrapper.className = 'admin-clients-table';
      renderAdminClients();
      
      adminContainer.appendChild(tableWrapper);
      nav.insertBefore(adminContainer, logoutBtn.nextSibling);
    }
  }

  showAlert('Dashboard loaded successfully.', 'success');
}

// Initialize dashboard
init().catch(e => console.error('Error:', e));

</script>
