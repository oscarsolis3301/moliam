<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moliam Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #0B0E14;
      --bg-building: #111827;
      --bg-room: #1F2937;
      --bg-room-active: #263044;
      --glass-bg: rgba(17, 24, 39, 0.6);
      --accent-blue: #3B82F6;
      --accent-purple: #8B5CF6;
      --accent-green: #10B981;
      --accent-amber: #F59E0B;
      --accent-red: #EF4444;
      --accent-cyan: #06B6D4;
      --text-primary: #F9FAFB;
      --text-secondary: #9CA3AF;
      --text-dim: #6B7280;
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-highlight: rgba(255, 255, 255, 0.04);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-deep);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Top Bar */
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: rgba(11, 14, 20, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 1000;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .client-name {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .logout-link {
      color: var(--accent-blue);
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: opacity 0.3s;
    }

    .logout-link:hover {
      opacity: 0.8;
    }

    /* Main Content */
    .container {
      max-width: 1200px;
      margin: 96px auto 48px;
      padding: 0 24px;
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 24px;
      backdrop-filter: blur(10px);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .stat-card:hover {
      border-color: rgba(59, 130, 246, 0.3);
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.15);
      transform: translateY(-2px);
    }

    .stat-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
    }

    /* Two-column Layout */
    .dashboard-layout {
      display: grid;
      grid-template-columns: 1fr 40%;
      gap: 32px;
      margin-bottom: 32px;
    }

    @media (max-width: 968px) {
      .dashboard-layout {
        grid-template-columns: 1fr;
      }
      
      .activity-section,
      .messages-section {
        max-width: 100% !important;
      }
    }

    @media (max-width: 768px) {
      .top-bar {
        padding: 0 16px;
      }
      
      .container {
        padding: 0 16px;
      }
      
      .stats-grid {
        gap: 16px;
      }
      
      .dashboard-layout {
        gap: 24px;
      }
    }

    /* Activity Feed */
    .activity-section {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 32px 28px;
      max-width: 60%;
    }

    @media (max-width: 968px) {
      .activity-section {
        max-width: 100%;
      }
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
      color: var(--text-primary);
    }

    .activity-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .activity-item {
      padding: 16px;
      background: var(--bg-room);
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      transition: all 0.3s;
    }

    .activity-item:hover {
      background: var(--bg-room-active);
      border-color: rgba(59, 130, 246, 0.2);
    }

    .activity-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .agent-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent-blue);
    }

    .timestamp {
      font-size: 12px;
      color: var(--text-dim);
    }

    .activity-text {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    /* Messages */
    .messages-section {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 32px 28px;
      max-width: 40%;
    }

    @media (max-width: 968px) {
      .messages-section {
        max-width: 100%;
      }
    }

    .messages-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
      max-height: 300px;
      overflow-y: auto;
    }

    .message-bubble {
      padding: 12px 16px;
      background: var(--bg-room);
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      font-size: 14px;
      color: var(--text-secondary);
    }

    .message-input-area {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .message-input {
      flex: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 14px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      transition: all 0.3s;
    }

    .message-input:focus {
      outline: none;
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .message-input::placeholder {
      color: var(--text-dim);
    }

    .send-button {
      padding: 14px 24px;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      border: none;
      border-radius: 12px;
      color: white;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .send-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(59, 130, 246, 0.4);
    }

    /* CTA Button */
    .cta-section {
      text-align: center;
      margin-top: 48px;
      padding: 48px 0;
    }

    .book-cta {
      display: inline-block;
      padding: 16px 32px;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      color: white;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      border-radius: 12px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .book-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(59, 130, 246, 0.4);
    }

    /* Access Denied */
    .access-denied {
      text-align: center;
      padding: 96px 24px;
      display: none;
    }

    .access-denied h1 {
      font-size: clamp(40px, 6vw, 72px);
      font-weight: 900;
      margin-bottom: 24px;
      color: var(--accent-red);
    }

    .access-denied p {
      font-size: 18px;
      color: var(--text-secondary);
      margin-bottom: 32px;
    }

    /* Loading State */
    .loading {
      opacity: 0.6;
      pointer-events: none;
    }

    /* Message List Scrollbar */
    .messages-list::-webkit-scrollbar {
      width: 8px;
    }

    .messages-list::-webkit-scrollbar-track {
      background: var(--bg-building);
      border-radius: 4px;
    }

    .messages-list::-webkit-scrollbar-thumb {
      background: var(--accent-blue);
      border-radius: 4px;
    }

    /* Responsive Adjustments */
    @media (max-width: 480px) {
      .stats-grid {
        grid-template-columns: 1fr;
      }
      
      .top-bar {
        flex-direction: column;
        height: auto;
        padding: 16px;
        gap: 12px;
      }
      
      .logo, .client-name, .logout-link {
        justify-self: center;
      }
    }
  </style>
</head>
<body>
  <!-- Top Bar -->
  <header class="top-bar">
    <div class="logo">Moliam Dashboard</div>
    <div class="client-name" id="clientName">Client Name</div>
    <a href="/" class="logout-link">Logout</a>
  </header>

  <!-- Main Content -->
  <main class="container">
    <!-- Stats Grid -->
    <section class="stats-grid" id="statsGrid">
      <div class="stat-card">
        <div class="stat-label">Total Leads</div>
        <div class="stat-value" id="totalLeads">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Active Campaigns</div>
        <div class="stat-value" id="activeCampaigns">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Google Rating</div>
        <div class="stat-value" id="googleRating">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Reviews</div>
        <div class="stat-value" id="reviewCount">-</div>
      </div>
    </section>

    <!-- Two-column Layout -->
    <div class="dashboard-layout">
      <!-- Activity Feed -->
      <section class="activity-section">
        <h2 class="section-title">Activity Feed</h2>
        <ul class="activity-list" id="activityList">
          <!-- Activity items populated dynamically -->
        </ul>
      </section>

      <!-- Messages -->
      <section class="messages-section">
        <h2 class="section-title">Messages</h2>
        <ul class="messages-list" id="messagesList">
          <!-- Messages populated dynamically -->
        </ul>
        <div class="message-input-area">
          <input 
            type="text" 
            class="message-input" 
            id="messageInput" 
            placeholder="Type a message..."
          >
          <button class="send-button" id="sendButton">Send</button>
        </div>
      </section>
    </div>

    <!-- CTA Section -->
    <section class="cta-section">
      <a href="https://calendly.com/visualark/demo" class="book-cta" target="_blank">Book a Call</a>
    </section>
  </main>

  <!-- Access Denied Page (hidden by default) -->
  <main class="access-denied" id="accessDenied">
    <h1>Access Denied</h1>
    <p>Invalid authentication token. Please contact your administrator.</p>
    <a href="/" class="book-cta">Return to Home</a>
  </main>

  <script>
    // Extract token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      document.getElementById('statsGrid').style.display = 'none';
      document.querySelector('.dashboard-layout').style.display = 'none';
      document.querySelector('.cta-section').style.display = 'none';
      document.getElementById('accessDenied').style.display = 'block';
      throw new Error('No token provided');
    }

    // Dashboard API base path (adjust ac...vity, ac...sages as per spec)
    const apiBase = `/api/dashboard?token=${encodeURIComponent(token)}&`;

    // Fetch dashboard stats
    async function fetchDashboardStats() {
      try {
        const res = await fetch(`${apiBase}action=stats`);
        if (res.status === 401) {
          showAccessDenied();
          return;
        }
        const data = await res.json();
        document.getElementById('totalLeads').textContent = data.totalLeads || '0';
        document.getElementById('activeCampaigns').textContent = data.activeCampaigns || '0';
        document.getElementById('googleRating').textContent = data.googleRating || 'N/A';
        document.getElementById('reviewCount').textContent = data.reviewCount || '0';
        document.getElementById('clientName').textContent = data.clientName || 'Client';
      } catch (err) {
        console.error('Error fetching stats:', err);
      }
    }

    // Fetch activity feed
    async function fetchActivity() {
      try {
        const res = await fetch(`${apiBase}action=activity`);
        if (res.status === 401) {
          showAccessDenied();
          return;
        }
        const data = await res.json();
        const activityList = document.getElementById('activityList');
        activityList.innerHTML = '';
        
        (data.activities || []).forEach(act => {
          const li = document.createElement('li');
          li.className = 'activity-item';
          li.innerHTML = `
            <div class="activity-header">
              <span class="agent-name">${act.agent || 'System'}</span>
              <span class="timestamp">${act.timestamp || 'N/A'}</span>
            </div>
            <div class="activity-text">${act.message || act.action || 'No details'}</div>
          `;
          activityList.appendChild(li);
        });
      } catch (err) {
        console.error('Error fetching activity:', err);
      }
    }

    // Fetch existing messages
    async function fetchMessages() {
      try {
        const res = await fetch(`${apiBase}action=messages`);
        if (res.status === 401) {
          showAccessDenied();
          return;
        }
        const data = await res.json();
        const messagesList = document.getElementById('messagesList');
        messagesList.innerHTML = '';
        
        // Show only recent 10 messages in the list UI
        (data.messages || []).slice(-10).forEach(msg => {
          const li = document.createElement('li');
          li.className = 'message-bubble';
          li.textContent = msg.content || msg.message || 'No message content';
          messagesList.appendChild(li);
        });
        
        // Auto-scroll to bottom
        messagesList.scrollTop = messagesList.scrollHeight;
      } catch (err) {
        console.error('Error fetching messages:', err);
      }
    }

    // Send new message
    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const message = input.value.trim();
      if (!message) return;

      try {
        const res = await fetch(`${apiBase}action=send_message`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message })
        });

        if (res.status === 401) {
          showAccessDenied();
          return;
        }

        const data = await res.json();
        if (data.success || data.error !== 'Unauthorized') {
          input.value = '';
          fetchMessages(); // Refresh list
          fetchActivity();  // Update activity feed
        } else {
          alert('Failed to send message');
        }
      } catch (err) {
        console.error('Error sending message:', err);
      }
    }

    function showAccessDenied() {
      document.getElementById('statsGrid').style.display = 'none';
      document.querySelector('.dashboard-layout').style.display = 'none';
      document.querySelector('.cta-section').style.display = 'none';
      document.getElementById('accessDenied').style.display = 'block';
    }

    // Auto-refresh every 30 seconds
    function autoRefresh() {
      fetchDashboardStats();
      fetchActivity();
      fetchMessages();
    }

    // Initial load
    if (token) {
      document.body.classList.remove('loading');
      autoRefresh();
      setInterval(autoRefresh, 30000); // Auto-refresh every 30 seconds
    }

    // Event listeners
    document.getElementById('sendButton').addEventListener('click', sendMessage);
    
    document.getElementById('messageInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        sendMessage();
      }
    });
  </script>
</body>
</html>
