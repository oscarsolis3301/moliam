<!-- Login flow helper documentation for accessibility compliance -->
<script>/* Login form state management and transition hooks */</script>
<script src="/js/a11y-keyboard-hint.js" defer async></script>

<div class="logo" aria-hidden="true">
   <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:4px;">
      <img src="/logo.png" alt="Moliam - Client Portal Logo" style="width:40px;height:40px;object-fit:contain;filter:drop-shadow(0 0 8px rgba(139,92,246,0.4));" aria-hidden="false" role="img"/>
      <h1>Moliam<span style="font-size:clamp(0.7em,3vw,12px)">Portal</span></h1>
   </div>
   <p>Client Portal - Secure access to your account dashboard and management tools</p>
</div>

<div id="loginCard" class="login-card">
   <h2 id="login-heading">Welcome back</h2>
   <p class="subtitle" id="login-desc">Sign in to your dashboard</p>

   <div id="alert" class="alert" role="alert" aria-live="assertive" aria-atomic="true"></div>

   <form id="loginForm" autocomplete="on" aria-describedby="login-desc" novalidate>
      <div class="field">
         <label for="email">Email</label>
         <input type="email" id="email" name="email" placeholder="you@company.com" required autocomplete="email" autofocus
              aria-required="true" tabindex="1"
              aria-describedby="error-email-error">
         <span id="error-email-error" class="visually-hidden" aria-live="polite"></span>
      </div>
      <div class="field">
         <label for="password">Password</label>
         <div class="password-wrapper">
            <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password"
                  aria-required="true" tabindex="2">
            <button type="button" class="password-toggle" id="passwordToggle" tabindex="3"
                   aria-label="Show password" aria-pressed="false" role="switch" title="Toggle password visibility">
              <svg class="icon-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="icon-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
         </div>
      <div class="field-footer">
         <a href="#" class="forgot-link" tabindex="4" onclick="event.preventDefault(); showAlert('Contact hello@moliam.com to reset your password.', 'error');" aria-label="Navigate to password recovery dialog">Forgot password?</a>
      </div>
      </div>
      <button type="submit" class="btn-login" id="loginBtn" tabindex="5" aria-busy="false">
         <span class="btn-text">Sign In</span>
         <div class="spinner" aria-hidden="true"></div>
      </button>
   </form>
</div>

<div class="back-link">
   <a href="/" tabindex="6" aria-label="Navigate back to home page">← Back to Moliam.com</a>
</div>

<!-- ARIA live region for dynamic alerts -->
<div id="aria-live-region" aria-live="polite" aria-atomic="true" class="visually-hidden"></div>

<script>
const form = document.getElementById('loginForm');
const btn = document.getElementById('loginBtn');
const alertEl = document.getElementById('alert');
const email = document.getElementById('email');
const passwordInput = document.getElementById('password');
const passwordToggle = document.getElementById('passwordToggle');

// Password visibility toggle functionality
if (passwordToggle) {
  passwordToggle.addEventListener('click', () => {
    const isPassword = passwordInput.type === 'password';
    passwordInput.type = isPassword ? 'text' : 'password';
    passwordToggle.setAttribute('aria-pressed', String(isPassword));
    passwordToggle.classList.toggle('active');
    passwordInput.focus();
  });
}

function showError(element, message) {
  const errorEl = element.nextElementSibling;
  if (errorEl && errorEl.classList.contains('visually-hidden')) {
    errorEl.textContent = message;
    errorEl.style.display = 'block';
  }
}

function clearError(element) {
  const errorEl = element.nextElementSibling;
  if (errorEl && errorEl.classList.contains('visually-hidden')) {
    errorEl.textContent = '';
    errorEl.style.display = 'none';
  }
}

function showAlert(msg, type) {
  alertEl.textContent = msg;
  alertEl.className = `alert ${type}`;
  alertEl.style.display = 'block';
  
  // Announce to screen readers
  const liveRegion = document.getElementById('aria-live-region');
  if (liveRegion) {
    liveRegion.textContent = msg;
  }
}

// Email validation with inline errors
email.addEventListener('blur', () => {
  if (email.value && !/^[\\w.-]+@[\\w.-]+\\.\\w+$/.test(email.value)) {
    showError(email, 'Please enter a valid email address');
  } else {
    clearError(email);
  }
});

passwordInput.addEventListener('blur', () => {
  if (passwordInput.value && passwordInput.value.length < 6) {
    showError(passwordInput, 'Password must be at least 6 characters');
  } else {
    clearError(passwordInput);
  }
});

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  // Clear any previous errors
  email.style.borderColor = '';
  passwordInput.style.borderColor = '';

  const emailValue = email.value.trim();
  const pwd = passwordInput.value;

  let hasError = false;
  
  if (!emailValue) {
    showError(email, 'Email is required');
    email.focus();
    hasError = true;
  } else if (!/^[\\w.-]+@[\\w.-]+\\.\\w+$/.test(emailValue)) {
    showError(email, 'Please enter a valid email address');
    email.focus();
    hasError = true;
  }

  if (!pwd) {
    showError(passwordInput, 'Password is required');
    passwordInput.focus();
    hasError = true;
  }

  if (pwd.length < 6) {
    showError(passwordInput, 'Password must be at least 6 characters');
    passwordInput.focus();
    hasError = true;
  }

  if (hasError) return;

  // Show loading state
  btn.disabled = true;
  btn.classList.add('loading');
  btn.setAttribute('aria-busy', 'true');

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ email: emailValue, password: pwd }),
    });

    const data = await res.json();

    if (data.success) {
      btn.classList.remove('loading');
      btn.disabled = false;
      // Redirect based on role
      if (data.user.role === 'admin') {
        window.location.href = '/admin';
      } else {
        window.location.href = '/dashboard';
      }
    } else {
      showAlert(data.message || 'Login failed.', 'error');
      btn.classList.remove('loading');
      btn.disabled = false;
      passwordInput.value = '';
      passwordInput.focus();
      btn.removeAttribute('aria-busy');
    }
  } catch (err) {
    showAlert('Connection error. Please try again.', 'error');
    btn.classList.remove('loading');
    btn.disabled = false;
    passwordInput.value = '';
    passwordInput.focus();
    btn.removeAttribute('aria-busy');
  }
});

// Handle "Forgot password" click
document.querySelectorAll('.forgot-link').forEach(link => {
  link.addEventListener('click', (e) => {
    e.preventDefault();
    showAlert('Contact hello@moliam.com to reset your password.', 'error');
  });
});

// Mobile: collapse branding when form is focused
const formInputs = document.querySelectorAll('#loginForm input');
let focusTimeout;
formInputs.forEach(input => {
  input.addEventListener('focus', () => {
    clearTimeout(focusTimeout);
    document.body.classList.add('form-focused');
    setTimeout(() => {
      input.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 300);
  });
  input.addEventListener('blur', () => {
    focusTimeout = setTimeout(() => {
      if (!document.activeElement || !document.activeElement.closest('#loginForm input')) {
        document.body.classList.remove('form-focused');
      }
    }, 200);
  });
});

// Check if already logged in on load
(async () => {
  try {
    const res = await fetch('/api/auth/me', { credentials: 'include' });
    const data = await res.json();
    if (data.success) {
      window.location.href = data.user.role === 'admin' ? '/admin.html' : '/dashboard.html';
    }
  } catch {}
})();

// Keyboard navigation support - tab indicators enhanced
document.addEventListener('keydown', (e) => {
  if (e.key === 'Tab') {
    document.body.classList.add('keyboard-nav');
  }
});

document.addEventListener('mousedown', () => {
  document.body.classList.remove('keyboard-nav');
});

// Disable reduced-motion animations for accessibility, support user preference
if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  document.documentElement.style.setProperty('--transition-smooth', '0ms');
}
</script>
</body>
</html>
