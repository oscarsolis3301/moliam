<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Moliam</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0B0E14;
  --bg-building: #111827;
  --bg-room: #1F2937;
  --accent-blue: #3B82F6;
  --accent-purple: #8B5CF6;
  --accent-green: #10B981;
  --accent-red: #EF4444;
  --text-primary: #F9FAFB;
  --text-secondary: #9CA3AF;
  --text-dim: #6B7280;
  --glass-bg: rgba(17, 24, 39, 0.8);
  --glass-border: rgba(255, 255, 255, 0.08);
  --radius-md: 12px;
  --radius-lg: 20px;
  --transition-smooth: 300ms cubic-bezier(0.4, 0, 0.2, 1);
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg-deep);
  font-family: 'Inter', system-ui, sans-serif;
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* Animated background */
.bg-grid {
  position: fixed; inset: 0; z-index: 0;
  background-image:
    radial-gradient(circle at 20% 50%, rgba(59,130,246,0.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(139,92,246,0.06) 0%, transparent 50%),
    radial-gradient(circle at 50% 80%, rgba(16,185,129,0.04) 0%, transparent 50%);
  animation: bgPulse 8s ease-in-out infinite alternate;
}
@keyframes bgPulse {
  0% { opacity: 0.6; }
  100% { opacity: 1; }
}

.login-container {
  position: relative; z-index: 1;
  width: 100%; max-width: 420px;
  padding: 0 24px;
}

.logo {
  text-align: center; margin-bottom: 40px;
}
.logo h1 {
  font-size: 2.4rem; font-weight: 800;
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.02em;
}
.logo p {
  color: var(--text-dim); font-size: 0.85rem; margin-top: 4px;
  letter-spacing: 0.1em; text-transform: uppercase;
}

.login-card {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  padding: 40px 32px;
  backdrop-filter: blur(20px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
}

.login-card h2 {
  font-size: 1.4rem; font-weight: 700; margin-bottom: 8px;
}
.login-card .subtitle {
  color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 28px;
}

.field { margin-bottom: 20px; }
.field label {
  display: block; font-size: 0.8rem; font-weight: 600;
  color: var(--text-secondary); margin-bottom: 8px;
  text-transform: uppercase; letter-spacing: 0.05em;
}
.field input {
  width: 100%; padding: 14px 16px;
  background: var(--bg-deep);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  font-family: inherit; font-size: 0.95rem;
  transition: border-color var(--transition-smooth), box-shadow var(--transition-smooth);
  outline: none;
}
.field input:focus {
  border-color: var(--accent-blue);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
}
.field input::placeholder { color: var(--text-dim); }

.btn-login {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
  border: none; border-radius: var(--radius-md);
  color: white; font-family: inherit;
  font-size: 1rem; font-weight: 600;
  cursor: pointer;
  transition: transform var(--transition-smooth), box-shadow var(--transition-smooth);
  position: relative; overflow: hidden;
}
.btn-login:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 24px rgba(59,130,246,0.3);
}
.btn-login:active { transform: translateY(0); }
.btn-login:disabled {
  opacity: 0.6; cursor: not-allowed; transform: none;
}

.btn-login .spinner {
  display: none;
  width: 20px; height: 20px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  margin: 0 auto;
}
.btn-login.loading .spinner { display: block; }
.btn-login.loading .btn-text { display: none; }
@keyframes spin { to { transform: rotate(360deg); } }

.alert {
  padding: 12px 16px;
  border-radius: var(--radius-md);
  font-size: 0.85rem;
  margin-bottom: 20px;
  display: none;
}
.alert.error {
  background: rgba(239,68,68,0.15);
  border: 1px solid rgba(239,68,68,0.3);
  color: #FCA5A5;
  display: block;
}
.alert.success {
  background: rgba(16,185,129,0.15);
  border: 1px solid rgba(16,185,129,0.3);
  color: #6EE7B7;
  display: block;
}

.back-link {
  text-align: center; margin-top: 24px;
}
.back-link a {
  color: var(--text-dim); text-decoration: none; font-size: 0.85rem;
  transition: color var(--transition-smooth);
}
.back-link a:hover { color: var(--accent-blue); }
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="login-container">
  <div class="logo">
    <h1>Moliam</h1>
    <p>Client Portal</p>
  </div>

  <div class="login-card">
    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to your dashboard</p>

    <div id="alert" class="alert"></div>

    <form id="loginForm" autocomplete="on">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@company.com" required autocomplete="email" autofocus>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login" id="loginBtn">
        <span class="btn-text">Sign In</span>
        <div class="spinner"></div>
      </button>
    </form>
  </div>

  <div class="back-link">
    <a href="/">← Back to Moliam.com</a>
  </div>
</div>

<script>
const form = document.getElementById('loginForm');
const btn = document.getElementById('loginBtn');
const alert = document.getElementById('alert');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  alert.className = 'alert';
  alert.style.display = 'none';

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!email || !password) {
    showAlert('Please fill in all fields.', 'error');
    return;
  }

  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ email, password }),
    });

    const data = await res.json();

    if (data.success) {
      showAlert('Signing in...', 'success');
      // Redirect based on role
      if (data.user.role === 'admin') {
        window.location.href = '/admin';
      } else {
        window.location.href = '/dashboard';
      }
    } else {
      showAlert(data.message || 'Login failed.', 'error');
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  } catch (err) {
    showAlert('Connection error. Please try again.', 'error');
    btn.classList.remove('loading');
    btn.disabled = false;
  }
});

function showAlert(msg, type) {
  alert.textContent = msg;
  alert.className = `alert ${type}`;
  alert.style.display = 'block';
}

// If already logged in, redirect
(async () => {
  try {
    const res = await fetch('/api/auth/me', { credentials: 'include' });
    const data = await res.json();
    if (data.success) {
      window.location.href = data.user.role === 'admin' ? '/admin' : '/dashboard';
    }
  } catch {}
})();
</script>
</body>
</html>
