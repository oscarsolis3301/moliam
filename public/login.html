<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Moliam</title>
<meta name="description" content="Sign in to the Moliam Client Portal">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0B0E14;
  --bg-building: #111827;
  --bg-room: #1F2937;
  --accent-blue: #3B82F6;
  --accent-purple: #8B5CF6;
  --accent-green: #10B981;
  --accent-red: #EF4444;
  --text-primary: #F9FAFB;
  --text-secondary: #9CA3AF;
  --text-dim: #6B7280;
  --glass-bg: rgba(17, 24, 39, 0.8);
  --glass-border: rgba(255, 255, 255, 0.08);
  --radius-md: 12px;
  --radius-lg: 20px;
  --transition-smooth: 300ms cubic-bezier(0.4, 0, 0.2, 1);
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg-deep);
  font-family: 'Inter', system-ui, sans-serif;
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* Animated gradient background */
.bg-grid {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(circle at 20% 50%, rgba(59,130,246,0.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(139,92,246,0.06) 0%, transparent 50%),
    radial-gradient(circle at 50% 80%, rgba(16,185,129,0.04) 0%, transparent 50%);
  animation: bgPulse 8s ease-in-out infinite alternate;
}
.bg-gradient-anim {
  position: fixed; inset: 0; z-index: 0;
  background: linear-gradient(
    135deg,
    rgba(59,130,246,0.07) 0%,
    rgba(139,92,246,0.05) 25%,
    rgba(16,185,129,0.04) 50%,
    rgba(139,92,246,0.06) 75%,
    rgba(59,130,246,0.08) 100%
  );
  background-size: 400% 400%;
  animation: gradientShift 15s ease infinite;
}
@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
@keyframes bgPulse {
  0% { opacity: 0.6; }
  100% { opacity: 1; }
}

.login-container {
  position: relative; z-index: 1;
  width: 100%; max-width: 420px;
  padding: 0 24px;
}

.logo {
  text-align: center; margin-bottom: 40px;
}
.logo h1 {
  font-size: 2.4rem; font-weight: 800;
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.02em;
}
.logo p {
  color: var(--text-dim); font-size: 0.85rem; margin-top: 4px;
  letter-spacing: 0.1em; text-transform: uppercase;
}

.login-card {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  padding: 40px 32px;
  backdrop-filter: blur(20px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
}

.login-card h2 {
  font-size: 1.4rem; font-weight: 700; margin-bottom: 8px;
}
.login-card .subtitle {
  color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 28px;
}

.field { margin-bottom: 20px; }
.field label {
  display: block; font-size: 0.8rem; font-weight: 600;
  color: var(--text-secondary); margin-bottom: 8px;
  text-transform: uppercase; letter-spacing: 0.05em;
}
.field input {
  width: 100%; padding: 14px 16px;
  background: var(--bg-deep);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  font-family: inherit; font-size: 0.95rem;
  transition: border-color var(--transition-smooth), box-shadow var(--transition-smooth);
  outline: none;
}
.field input:focus {
  border-color: var(--accent-blue);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
}
.field input::placeholder { color: var(--text-dim); }

/* Password field wrapper */
.password-wrapper {
  position: relative;
}
.password-wrapper input {
  padding-right: 48px;
}
.password-toggle {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  padding: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  transition: color var(--transition-smooth);
}
.password-toggle:hover,
.password-toggle:focus-visible {
  color: var(--text-secondary);
}
.password-toggle:focus-visible {
  outline: 2px solid var(--accent-blue);
  outline-offset: 2px;
}
.password-toggle svg {
  width: 20px;
  height: 20px;
}
.password-toggle .icon-hide { display: none; }
.password-toggle.active .icon-show { display: none; }
.password-toggle.active .icon-hide { display: block; }

/* Forgot password link */
.field-footer {
  display: flex;
  justify-content: flex-end;
  margin-top: 8px;
  margin-bottom: 4px;
}
.forgot-link {
  color: var(--text-dim);
  text-decoration: none;
  font-size: 0.8rem;
  transition: color var(--transition-smooth);
}
.forgot-link:hover,
.forgot-link:focus-visible {
  color: var(--accent-blue);
}
.forgot-link:focus-visible {
  outline: 2px solid var(--accent-blue);
  outline-offset: 2px;
  border-radius: 2px;
}

.btn-login {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
  border: none; border-radius: var(--radius-md);
  color: white; font-family: inherit;
  font-size: 1rem; font-weight: 600;
  cursor: pointer;
  transition: transform var(--transition-smooth), box-shadow var(--transition-smooth);
  position: relative; overflow: hidden;
}
.btn-login:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 24px rgba(59,130,246,0.3);
}
.btn-login:focus-visible {
  outline: 2px solid var(--accent-blue);
  outline-offset: 2px;
  box-shadow: 0 8px 24px rgba(59,130,246,0.3);
}
.btn-login:active { transform: translateY(0); }
.btn-login:disabled {
  opacity: 0.6; cursor: not-allowed; transform: none;
}

.btn-login .spinner {
  display: none;
  width: 20px; height: 20px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  margin: 0 auto;
}
.btn-login.loading .spinner { display: block; }
.btn-login.loading .btn-text { display: none; }
@keyframes spin { to { transform: rotate(360deg); } }

.alert {
  padding: 12px 16px;
  border-radius: var(--radius-md);
  font-size: 0.85rem;
  margin-bottom: 20px;
  display: none;
}
.alert.error {
  background: rgba(239,68,68,0.15);
  border: 1px solid rgba(239,68,68,0.3);
  color: #FCA5A5;
  display: block;
}
.alert.success {
  background: rgba(16,185,129,0.15);
  border: 1px solid rgba(16,185,129,0.3);
  color: #6EE7B7;
  display: block;
}

.back-link {
  text-align: center; margin-top: 24px;
}
.back-link a {
  color: var(--text-dim); text-decoration: none; font-size: 0.85rem;
  transition: color var(--transition-smooth);
}
.back-link a:hover { color: var(--accent-blue); }
.back-link a:focus-visible {
  color: var(--accent-blue);
  outline: 2px solid var(--accent-blue);
  outline-offset: 2px;
  border-radius: 2px;
}

/* Skip link for keyboard users */
.skip-link {
  position: absolute;
  top: -100px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--accent-blue);
  color: white;
  padding: 8px 16px;
  border-radius: var(--radius-md);
  z-index: 100;
  font-size: 0.85rem;
  text-decoration: none;
  transition: top var(--transition-smooth);
}
.skip-link:focus {
  top: 16px;
}
</style>
</head>
<body>
<a href="#loginForm" class="skip-link">Skip to login form</a>
<div class="bg-grid" aria-hidden="true"></div>
<div class="bg-gradient-anim" aria-hidden="true"></div>

<main class="login-container" role="main">
  <div class="logo" aria-hidden="true">
    <img src="/logo.png" alt="" style="width:56px;height:56px;object-fit:contain;margin:0 auto 12px;display:block;filter:drop-shadow(0 0 12px rgba(139,92,246,0.4));">
    <h1>Moliam</h1>
    <p>Client Portal</p>
  </div>

  <div class="login-card" role="region" aria-labelledby="login-heading">
    <h2 id="login-heading">Welcome back</h2>
    <p class="subtitle" id="login-desc">Sign in to your dashboard</p>

    <div id="alert" class="alert" role="alert" aria-live="assertive" aria-atomic="true"></div>

    <form id="loginForm" autocomplete="on" aria-describedby="login-desc" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@company.com" required autocomplete="email" autofocus
               aria-required="true" tabindex="1"
               aria-describedby="email-error">
        <span id="email-error" class="visually-hidden" aria-live="polite"></span>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password"
                 aria-required="true" tabindex="2">
          <button type="button" class="password-toggle" id="passwordToggle" tabindex="3"
                  aria-label="Show password" aria-pressed="false">
            <svg class="icon-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg class="icon-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <div class="field-footer">
          <a href="#" class="forgot-link" tabindex="4" onclick="event.preventDefault(); showAlert('Password reset is not yet available. Please contact support.', 'error');">Forgot password?</a>
        </div>
      </div>
      <button type="submit" class="btn-login" id="loginBtn" tabindex="5">
        <span class="btn-text">Sign In</span>
        <div class="spinner" aria-hidden="true"></div>
      </button>
    </form>
  </div>

  <div class="back-link">
    <a href="/" tabindex="6">← Back to Moliam.com</a>
  </div>
</main>

<script>
const form = document.getElementById('loginForm');
const btn = document.getElementById('loginBtn');
const alertEl = document.getElementById('alert');
const passwordInput = document.getElementById('password');
const passwordToggle = document.getElementById('passwordToggle');

// Password show/hide toggle
passwordToggle.addEventListener('click', () => {
  const isPassword = passwordInput.type === 'password';
  passwordInput.type = isPassword ? 'text' : 'password';
  passwordToggle.classList.toggle('active', isPassword);
  passwordToggle.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
  passwordToggle.setAttribute('aria-pressed', isPassword ? 'true' : 'false');
  passwordInput.focus();
});

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  alertEl.className = 'alert';
  alertEl.style.display = 'none';
  alertEl.textContent = '';

  const email = document.getElementById('email').value.trim();
  const password = passwordInput.value;

  if (!email || !password) {
    showAlert('Please fill in all fields.', 'error');
    if (!email) document.getElementById('email').focus();
    else passwordInput.focus();
    return;
  }

  btn.classList.add('loading');
  btn.disabled = true;
  btn.setAttribute('aria-busy', 'true');

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ email, password }),
    });

    const data = await res.json();

    if (data.success) {
      showAlert('Signing in...', 'success');
      // Redirect based on role
      if (data.user.role === 'admin') {
        window.location.href = '/admin';
      } else {
        window.location.href = '/dashboard';
      }
    } else {
      showAlert(data.message || 'Login failed.', 'error');
      btn.classList.remove('loading');
      btn.disabled = false;
      btn.removeAttribute('aria-busy');
      passwordInput.focus();
    }
  } catch (err) {
    showAlert('Connection error. Please try again.', 'error');
    btn.classList.remove('loading');
    btn.disabled = false;
    btn.removeAttribute('aria-busy');
  }
});

function showAlert(msg, type) {
  alertEl.textContent = msg;
  alertEl.className = `alert ${type}`;
  alertEl.style.display = 'block';
}

// If already logged in, redirect
(async () => {
  try {
    const res = await fetch('/api/auth/me', { credentials: 'include' });
    const data = await res.json();
    if (data.success) {
      window.location.href = data.user.role === 'admin' ? '/admin' : '/dashboard';
    }
  } catch {}
})();
</script>
</body>
</html>
