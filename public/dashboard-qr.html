<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>3D Holographic QR Dashboard | Moliam</title>
   <meta name="description" content="Generate QR codes with our futuristic 3D holographic interface. Enter any URL or text and instantly create scannable QR codes.">
   <link rel="canonical" href="https://moliam.com/dashboard-qr">
   <style>
     /* Base Reset & Variables */
     * { margin: 0; padding: 0; box-sizing: border-box; }
  
    :root {
      --color-bg: #0B0E14;
      --color-surface: rgba(30, 34, 46, 0.7);
      --color-surface-hover: rgba(30, 34, 46, 0.9);
      --color-border: rgba(255, 255, 255, 0.08);
      --color-text: #EAECEF;
      --color-text-muted: #818389;
      --color-primary: #3D7AFF;
      --color-primary-hover: #5A8EFF;
      --color-secondary: #7C65FF;
      --color-secondary-hover: #9580FF;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
     }
  
     body {
       font-family: var(--font-sans);
       background: var(--color-bg);
       color: var(--color-text);
       min-height: 100vh;
       display: flex;
       align-items: center;
       justify-content: center;
       padding: 2rem;
       overflow-x: hidden;
     }
  
      /* 3D Perspective Container */
     .container {
       max-width: 700px;
       margin: 0 auto;
       text-align: center;
     }
  
      h1 {
        font-size: clamp(2rem, 6vw, 3.5rem);
        font-weight: 700;
        margin-bottom: 2rem;
        background: linear-gradient(90deg, var(--color-primary), var(--color-secondary));
       -webkit-background-clip: text;
       -webkit-text-fill-color: transparent;
       background-clip: text;
       letter-spacing: -1px;
       transform: translateZ(30px);
     }
  
      /* 3D Holographic Card */
     .holo-card {
       background: var(--color-surface);
       backdrop-filter: blur(12px);
       border: 1px solid var(--color-border);
       border-radius: 20px;
       padding: clamp(2rem, 5vw, 3rem);
       margin: 0 auto;
       max-width: 550px;
       position: relative;
       transform-style: preserve-3d;
       perspective: 1200px;
       box-shadow: 
         0 8px 32px rgba(61, 122, 255, 0.15),
         0 4px 16px rgba(124, 101, 255, 0.1),
         inset 0 1px 0 rgba(255, 255, 255, 0.1);
       transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
     }
  
      .holo-card:hover {
        transform: translateY(-8px) rotateX(2deg) rotateY(-2deg);
        box-shadow: 
          0 16px 48px rgba(61, 122, 255, 0.2),
          0 12px 32px rgba(124, 101, 255, 0.15),
          inset 0 1px 0 rgba(255, 255, 255, 0.15);
       }
  
      /* QR Input Form */
     .qr-form {
       margin-bottom: 1.5rem;
       transform: translateZ(20px);
     }
  
      label {
        display: block;
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--color-text-muted);
        margin-bottom: 0.8rem;
        text-align: left;
       }
  
      .qr-input {
        width: 100%;
        padding: clamp(0.9rem, 2vw, 1.1rem);
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--color-border);
        border-radius: 12px;
        color: var(--color-text);
        font-size: clamp(1rem, 1.4vw, 1.1rem);
        transition: all 0.3s ease;
       }
  
      .qr-input:focus {
        outline: none;
        border-color: var(--color-primary);
        box-shadow: 
          0 0 0 4px rgba(61, 122, 255, 0.15),
          0 8px 24px rgba(61, 122, 255, 0.2);
       }
  
      .qr-input::placeholder {
        color: var(--color-text-muted);
       }
  
      /* Generate Button - Glow/Pulse Animation */
     .generate-btn {
        background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
        color: white;
        padding: clamp(1rem, 2vw, 1.3rem) 2.5rem;
        border: none;
        border-radius: 16px;
        font-size: clamp(1rem, 1.4vw, 1.1rem);
        font-weight: 700;
        cursor: pointer;
        margin-top: clamp(1rem, 2vw, 1.5rem);
        transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        box-shadow: 
          0 4px 16px rgba(61, 122, 255, 0.3),
          0 2px 8px rgba(124, 101, 255, 0.2);
        position: relative;
        overflow: hidden;
       }
  
      .generate-btn:hover {
        transform: translateY(-3px) scale(1.03);
        box-shadow: 
          0 12px 36px rgba(61, 122, 255, 0.45),
          0 8px 24px rgba(124, 101, 255, 0.3);
       }
  
      .generate-btn:active {
        transform: translateY(-1px) scale(1.01);
       }
  
       /* Glow pulse animation on hover */
      .generate-btn::after {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(61, 122, 255, 0.3) 0%, transparent 70%);
        opacity: 0;
        transition: opacity 0.4s ease;
       }
  
      .generate-btn:hover::after {
        opacity: 1;
       }
  
      /* QR Output Canvas - 3D Holographic Effect */
     .qr-output {
       margin-top: clamp(2rem, 4vw, 3rem);
       padding: clamp(1.5rem, 3vw, 2.5rem);
       background: rgba(61, 122, 255, 0.08);
       border: 1px solid var(--color-border);
       border-radius: 16px;
       transform-style: preserve-3d;
       perspective: 1000px;
       min-height: 280px;
       display: flex;
       align-items: center;
       justify-content: center;
       flex-direction: column;
       gap: clamp(1rem, 2vw, 1.5rem);
       transform: translateZ(40px);
       transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
     }
  
      .qr-placeholder {
        text-align: center;
        color: var(--color-text-muted);
       }
  
      .qr-placeholder p {
        font-size: clamp(1rem, 1.4vw, 1.1rem);
        margin-bottom: 0.5rem;
       }
  
      .qr-placeholder small {
        font-size: 0.85rem;
        opacity: 0.7;
       }
  
      /* Canvas for QR Code Rendering */
     canvas {
       border: 2px solid var(--color-border);
       border-radius: 16px;
       background: white;
       box-shadow: 
         0 8px 32px rgba(0, 0, 0, 0.3),
         0 4px 16px rgba(61, 122, 255, 0.2);
       max-width: 100%;
       height: auto;
       transform: rotateX(8deg) scale(0.95);
       transition: all 0.4s ease;
     }
  
      canvas:hover {
        transform: rotateX(0deg) scale(1);
       }
  
      /* Download Button */
     .download-btn {
       background: transparent;
       color: var(--color-text);
       border: 1px solid var(--color-border);
       padding: clamp(0.8rem, 1.5vw, 1rem) 2rem;
       border-radius: 12px;
       font-size: 0.9rem;
       font-weight: 600;
       cursor: pointer;
       transition: all 0.3s ease;
       display: inline-flex;
       align-items: center;
       gap: 0.8rem;
       text-decoration: none;
      }
  
      .download-btn:hover {
        background: var(--color-surface-hover);
        border-color: rgba(255, 255, 255, 0.15);
        transform: translateY(-2px);
       }
  
       /* Subtle holographic particle effect */
     .holo-particles {
       position: absolute;
       top: 0;
       left: 0;
       right: 0;
       bottom: 0;
       pointer-events: none;
       opacity: 0.15;
       background: 
         radial-gradient(circle at 20% 80%, rgba(61, 122, 255, 0.3), transparent 40%),
         radial-gradient(circle at 80% 20%, rgba(124, 101, 255, 0.3), transparent 40%);
       animation: float 12s ease-in-out infinite;
     }
  
      @keyframes float {
       0%, 100% { opacity: 0.15; transform: translateY(0); }
       50% { opacity: 0.25; transform: translateY(-10px); }
     }
  
      /* Error/Success Messages */
     .message {
       padding: clamp(0.8rem, 1.5vw, 1rem) 1.3rem;
       border-radius: 12px;
       margin-top: 1rem;
       font-size: 0.9rem;
       display: none;
     }
  
      .message.error {
        background: rgba(239, 69, 101, 0.15);
        border: 1px solid rgba(239, 69, 101, 0.3);
        color: #EF4565;
        display: block;
       }
  
      .message.success {
        background: rgba(6, 182, 212, 0.15);
        border: 1px solid rgba(6, 182, 212, 0.3);
        color: #06B6D4;
        display: block;
       }
  
      /* Accessibility - Skip Link */
     .skip-link {
       position: absolute;
       top: -40px;
       left: 0;
       background: var(--color-primary);
       color: white;
       padding: 8px 16px;
       text-decoration: none;
       font-weight: 600;
       z-index: 9999;
       border-radius: 0 0 8px 0;
     }
  
      .skip-link:focus {
        top: 0;
        outline: 3px solid var(--color-secondary);
        outline-offset: 2px;
       }
  
      /* Focus States */
     *:focus-visible {
       outline: 3px solid var(--color-primary);
       outline-offset: 2px;
     }
  
      .qr-input:focus, .generate-btn:focus, .download-btn:focus {
        box-shadow: 
          0 0 0 6px rgba(61, 122, 255, 0.15),
          0 8px 24px rgba(61, 122, 255, 0.2);
       }
  
      /* Reduced Motion Support */
     @media (prefers-reduced-motion: reduce) {
        holo-card { transition: none; animation: none; }
       canvas { transition: none; }
       .generate-btn::after { transition: none; }
     }
  
      /* Mobile Responsive */
     @media (max-width: 768px) {
        body { padding: 1rem; font-size: 14px; }
    
       holo-card { padding: clamp(1.5rem, 4vw, 2rem); border-radius: 16px; }
    
       .qr-output { padding: clamp(1rem, 3vw, 1.5rem); min-height: 240px; }
    
       canvas { max-width: 90%; }
     }
  
      /* High Contrast Mode */
     @media (prefers-contrast: more) {
        holo-card { border-color: rgba(255, 255, 255, 0.15); }
       .qr-input { border-color: rgba(255, 255, 255, 0.2); }
     }
   </style>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
  
     <div class="container">
        <h1>3D Holographic QR Generator</h1>
       <p style="color: var(--color-text-muted); margin-bottom: 2rem;">Enter any URL or text to generate a scannable QR code with our futuristic holographic interface.</p>
     </div>
  
      <div class="holo-card">
        <!-- Background particle effect -->
       <div class="holo-particles"></div>
    
         <form id="qrForm" class="qr-form">
           <label for="qrInput">Enter URL or text to generate QR</label>
           <input type="text" id="qrInput" class="qr-input" 
                  placeholder="https://example.com or Any text you want..." 
                  required>
          <button type="submit" class="generate-btn">
            ✨ Generate QR Code
          </button>
         </form>
    
       <div class="qr-output" id="qrOutput">
         <div class="qr-placeholder">
           <p>Your QR code will appear here</p>
           <small>Enter text and click "Generate"</small>
         </div>
       </div>
    
      <div class="message" id="message"></div>
     </div>
  
      <!-- Embed Canvas for QR Generation -->
     <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
     <script>
        const form = document.getElementById('qrForm');
       const qrInput = document.getElementById('qrInput');
       const qrOutput = document.getElementById('qrOutput');
       const message = document.getElementById('message');
  
         // Generate QR Code Function
      function generateQR(text, container) {
        try {
          // Validate input
          if (!text || text.trim().length === 0) {
            throw new Error('Please enter some text or URL');
           }
  
          // Clear previous output
          container.innerHTML = '';
  
          // Create QR Code with QRious library
          const qr = new QRious({
            element: container,
            value: text.trim(),
            size: 260,
            level: 'H',
            foregroundColor: '#0B0E14',
            backgroundColor: '#FFFFFF'
          });
  
          // Show success message
          showMessage('QR code generated successfully! You can download it now.', 'success');
         } catch (error) {
           container.innerHTML = '';
          showMessage(error.message || 'Failed to generate QR code. Please try again.', 'error');
         }
     }
  
        // Show message helper
      function showMessage(text, type) {
       message.textContent = text;
       message.className = `message ${type}`;
       setTimeout(() => {
         message.classList.remove('error', 'success');
         message.textContent = '';
        }, 5000);
     }
  
       // Form submission handler
      form.addEventListener('submit', function(e) {
        e.preventDefault();
       const text = qrInput.value;
      
       // Create canvas for QR output
       qrOutput.innerHTML = '<canvas id="qrCanvas"></canvas>';
       const canvas = document.getElementById('qrCanvas');
      
       generateQR(text, canvas);
      });
  
        // Download function (triggered by click)
      document.querySelector('.download-btn')?.addEventListener('click', function(e) {
        e.preventDefault();
       const canvas = document.querySelector('canvas');
       if (canvas) {
         const link = document.createElement('a');
         link.download = 'moliam-qr-code.png';
         link.href = canvas.toDataURL('image/png');
         link.click();
         showMessage('QR code downloaded successfully!', 'success');
        }
     });
    </script>
</body>
</html>
