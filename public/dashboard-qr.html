<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moliam Dashboard - 3D QR Code</title>
     <link rel="stylesheet" href="dashboard.css">
     <style>
         :root {
             --bg-dark: #0B0E14;
             --text-main: #F9FAFB;
             --text-muted: #818389;
             --primary-cyan: rgba(6, 182, 212, 0.2);
             --primary-purple: rgba(139, 92, 246, 0.2);
             --primary-pink: rgba(236, 72, 153, 0.2);
             --border-color: rgba(255, 255, 255, 0.08);
         }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
         }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            text-align: center;
         }

       h1 {
           font-size: clamp(1.5rem, 4vw, 2.25rem);
           margin-bottom: 3rem;
           background: linear-gradient(90deg, var(--primary-cyan), var(--primary-purple), var(--primary-pink));
           -webkit-background-clip: text;
           -webkit-text-fill-color: transparent;
           letter-spacing: 1px;
         }

         /* 3D QR Card */
         .qr-container {
            perspective: 1000px;
            margin-bottom: 2rem;
         }

         .qr-card {
            background: rgba(30, 34, 46, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            transform-style: preserve-3d;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            transition: transform 0.1s ease-out;
         }

         .qr-card-inner {
            position: relative;
            width: 100%;
            min-height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
         }

         /* QR Code Base */
         .qr-code {
            background: white;
            padding: 20px;
            position: relative;
            z-index: 1;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
         }

         .qr-code canvas {
            display: block;
         }

         /* Iridescent Overlay */
         .qr-card-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                calc(var(--angle) * 1deg),
                var(--primary-cyan),
                var(--primary-purple),
                var(--primary-pink)
             );
            mix-blend-mode: overlay;
            opacity: 0.35;
            pointer-events: none;
            z-index: 2;
            transition: background-position 0.1s linear, opacity 0.3s ease;
         }

         /* Shine/Reflection Effect */
         .qr-card-shine {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(
                circle at var(--shine-x, 50%) var(--shine-y, 50%),
                rgba(255, 255, 255, 0.18) 0%,
                rgba(255, 255, 255, 0.08) 30%,
                transparent 70%
             );
            pointer-events: none;
            z-index: 3;
            transition: background-position 0.1s linear;
         }

         /* Moving Shadow */
         .qr-card::before {
            content: '';
            position: absolute;
            top: -20px;
            left: -20px;
            right: -20px;
            bottom: -20px;
            background: radial-gradient(
                circle at var(--shadow-x, 50%) var(--shadow-y, 50%),
                rgba(6, 182, 212, 0.3),
                transparent 40%
             );
            filter: blur(30px);
            z-index: 0;
            transition: background-position 0.1s linear;
         }

         /* Info Section */
         .qr-info {
            margin-top: 2rem;
            padding: 1.5rem;
            background: rgba(30, 34, 46, 0.5);
            border-radius: 12px;
            border: 1px solid var(--border-color);
         }

         .scan-text {
            font-size: 1.25rem;
            color: var(--text-main);
            margin-bottom: 1.5rem;
         }

         .buttons-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
         }

         .btn-qr {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
         }

         .btn-qr-primary {
            background: linear-gradient(135deg, #3D7AFF, #7C65FF);
            color: white;
            box-shadow: 0 4px 12px rgba(61, 122, 255, 0.3);
         }

         .btn-qr-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(61, 122, 255, 0.4);
         }

         .btn-qr-secondary {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
         }

         .btn-qr-secondary:hover:not(:disabled) {
            background: rgba(30, 34, 46, 0.85);
            border-color: rgba(255, 255, 255, 0.15);
         }

         /* Responsive */
        @media (max-width: 768px) {
             .container {
                padding: 1rem;
             }

             .qr-card {
                padding: 24px 16px;
             }

            .buttons-group {
                flex-direction: column;
                align-items: stretch;
             }

             .btn-qr {
                width: 100%;
             }
         }

       @media (max-width: 480px) {
           .qr-card {
              padding: 16px 12px;
           }

          h1 {
              font-size: 1.5rem;
           }

          .scan-text {
              font-size: 1.1rem;
           }
         }
     </style>
</head>
<body>
    <div class="container">
        <h1>Client QR Hub</h1>

         <div class="qr-container">
             <div class="qr-card" id="qrCard">
                 <div class="qr-card-inner">
                     <div class="qr-card-overlay" id="overlay"></div>
                     <div class="qr-card-shine" id="shine"></div>
                     <div class="qr-code" id="qrCanvasHolder">
                         <canvas width="280" height="280"></canvas>
                     </div>
                 </div>
             </div>
         </div>

         <div class="qr-info">
             <p class="scan-text" id="scanText">Scan to visit your business</p>
             <div class="buttons-group">
                 <button class="btn btn-qr-primary" id="downloadBtn" onclick="downloadQR()">
                     <span>⬇️ Download QR Code</span>
                 </button>
                 <button class="btn btn-qr-secondary" id="printBtn" onclick="printQR()">
                     <span>🖨️ Print QR Code</span>
                 </button>
             </div>
         </div>
     </div>

     <!-- QR Library: QRious (lightweight, no build tools needed) -->
     <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
     <script>
         // Client data (can be passed as URL params or fetched)
        const clientInfo = {
             businessName: getQueryParameter('name') || 'Your Business',
            targetUrl: getQueryParameter('url') || window.location.origin + '/'
         };

         let currentQR = null;

         // Initialize on load
        document.addEventListener('DOMContentLoaded', () => {
            updateClientInfo();
            generateQR(clientInfo.targetUrl);
            setup3DEffects();
         });

        function getQueryParameter(param) {
             const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
         }

        function updateClientInfo() {
            document.getElementById('scanText').textContent = 
                 `Scan to visit ${clientInfo.businessName}`;
         }

        function generateQR(data) {
             const canvas = document.querySelector('.qr-code canvas');
             
            currentQR = new QRious({
                element: canvas,
                 text: data,
                 width: 280,
                 margin: 2,
                 colorDark: '#0B0E14',
              colorLight: '#F9FAFB'
            });

           // Center the QR code visually
            canvas.style.margin = 'auto';
         }

        function setup3DEffects() {
             const card = document.getElementById('qrCard');
            const overlay = document.getElementById('overlay');
             const shine = document.getElementById('shine');

            let isDragging = false;
           let prevX = 0, prevY = 0;

             // Desktop: Mouse movement controls tilt and effects
            card.addEventListener('mousemove', (e) => {
               if (isDragging) return;
                
                const rect = card.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;

                const rotateX = -(e.clientY - centerY) / 30;
                const rotateY = (e.clientX - centerX) / 30;

              card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;

             // Update iridescent gradient angle based on cursor position
                const angle = Math.atan2(e.clientY - centerY, e.clientX - centerX) * (180 / Math.PI) + 90;
              overlay.style.setProperty('--angle', angle);

             // Track shine/shadow positions (normalized 0-100% for gradient)
                const scaleX = ((e.clientX - rect.left) / rect.width) * 100;
                 const scaleY = ((e.clientY - rect.top) / rect.height) * 100;

           shine.style.setProperty('--shine-x', scaleX + '%');
            shine.style.setProperty('--shine-y', scaleY + '%');

             const shadowX = 50 - (e.clientX - centerX) / 3;
            const shadowY = 50 - (e.clientY - centerY) / 3;
           overlay.style.background = buildIridescentGradient(
                   angle, 
                    shadowX + '%', 
                  shadowY + '%'
                );
         });

            card.addEventListener('mouseleave', () => {
                card.style.transform = 'rotateX(0deg) rotateY(0deg)';
            });

             // Touch/Mobile support
            card.addEventListener('touchstart', (e) => {
               isDragging = true;
               prevX = e.touches[0].clientX;
               prevY = e.touches[0].clientY;
            }, { passive: true });

           card.addEventListener('touchmove', (e) => {
                if (!isDragging) return;

                 const rect = card.getBoundingClientRect();
                  const centerX = rect.left + rect.width / 2;
                  const centerY = rect.top + rect.height / 2;

                  const deltaX = e.touches[0].clientX - prevX;
                  const deltaY = e.touches[0].clientY - prevY;

                  const rotateX = -(deltaY) / 10;
                  const rotateY = (deltaX) / 10;

             card.style.transform = `translateX(${deltaX/2}px) translateY(${deltaY/2}px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;

              prevX = e.touches[0].clientX;
               prevY = e.touches[0].clientY;

          }, { passive: true });

           card.addEventListener('touchend', () => {
             isDragging = false;
            card.style.transform = 'translateX(0) translateY(0) rotateX(0deg) rotateY(0deg)';
         }, { passive: true });

        // Center card on load for initial desktop positioning
    window.addEventListener('load', () => {
        document.getElementById('qrCard').style.transform = 'rotateX(0deg) rotateY(0deg)';
     });
 }

       function buildIridescentGradient(angle, x, y) {
           return `linear-gradient(
               ${angle}deg,
              rgba(6, 182, 212, 0.2),
             rgba(139, 92, 246, 0.2),
            rgba(236, 72, 153, 0.2)
           ),
         radial-gradient(
            circle at ${x} ${y},
              rgba(6, 182, 212, 0.4),
             transparent 60%
          )`;
       }

      function downloadQR() {
          if (!currentQR) return;

         const dataUrl = currentQR.toDataURL('image/png', 1.0);
         const link = document.createElement('a');
         link.download = `moliam-qr-${Date.now()}.png`;
         link.href = dataUrl;
         link.click();
      }

     function printQR() {
           if (!currentQR) return;

          const printWindow = window.open('', '_blank');
         printWindow.document.write(`
             <!DOCTYPE html>
              <html>
              <head>
                  <title>Moliam QR Code</title>
                   <style>
                     body {
                        display: flex;
                       justify-content: center;
                      align-items: center;
                       min-height: 100vh;
                      margin: 0;
                      background: #0B0E14;
                      color: #F9FAFB;
                      font-family: 'Inter', sans-serif;
                    }
                   .print-container {
                       text-align: center;
                     }
                  h2 {
                      margin-bottom: 2rem;
                   }
                  </style>
               </head>
               <body>
                   <div class="print-container">
                       <h2>Moliam QR Code</h2>
                       <img src="${currentQR.toDataURL('image/png')}" alt="QR Code" />
                   </div>
                    <script>window.print();<\/script>
                </body>
              </html>
         `);
       printWindow.document.close();
     }
     </script>
</body>
</html>
