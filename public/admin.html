<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard | MOLIAMA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg-deep:#0B0E14;--bg-room:#1F2937;--border-room:#374151;--accent-blue:#3B82F6;--accent-purple:#8B5CF6;--accent-green:#10B981;--text-primary:#F9FAFB;--text-secondary:#9CA3AF}
body{margin:0;padding:0;background:var(--bg-deep);font-family:'Inter',system-ui,sans-serif;color:var(--text-primary);padding-top:56px;}
nav{height:56px;border-bottom:1px solid var(--border-room);display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:rgba(11,14,20,0.8);backdrop-filter:blur(12px);position:fixed;top:0;width:100%;z-index:100;}
nav.logo{font-size:15px;font-weight:700;letter-spacing:0.1em;color:#fff;}
nav a{text-decoration:none;color:var(--text-secondary);font-size:13px;margin-left:20px;}
a.back-btn{color:var(--accent-blue);}
.container{max-width:1400px;margin:56px auto;padding:0 24px;display:grid;gap:36px;}
h1{font-size:32px;font-weight:600;margin-bottom:8px;}
h2{font-size:18px;font-weight:500,color:var(--text-secondary);margin-bottom:16px;}
section{padding:0;}

/* STATS BAR */
.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:24px;}
.stat-card{text-align:center;padding:24px;background:linear-gradient(135deg,rgba(59,130,246,0.05),rgba(139,92,246,0.05));border:1px solid var(--border-room);border-radius:12px;}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-secondary);margin-bottom:8px;}
.stat-value{font-size:28px;font-weight:700;color:var(--accent-blue);}
.stat-change{font-size:12px;margin-top:4px;}
.positive{color:var(--accent-green);}
.negative{color:#EF4444;}

/* CLIENT TABLE */
.table-container{background:linear-gradient(135deg,rgba(59,130,246,0.05),rgba(139,92,246,0.05));border:1px solid var(--border-room);border-radius:16px;overflow:hidden;}
.table-header{padding:20px 24px;border-bottom:1px solid var(--border-room);display:flex;justify-content:space-between;align-items:center;}
table{width:100%;border-collapse:collapse;}
th,td{padding:16px;text-align:left;border-bottom:1px solid var(--border-room);}
th{background:rgba(59,130,246,0.08);font-weight:600;color:var(--text-primary);}
tr:hover td{background:rgba(59,130,246,0.05);}

/* CLIENT DETAILS */
.client-name{font-size:15px;font-weight:600;color:var(--text-primary);margin-bottom:4px;}
.client-email{font-size:13px;color:var(--text-secondary);}

/* BADGES */
.status-badge{display:inline-block;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;}
.status-active{background:rgba(16,185,129,0.1);color:var(--accent-green);border:1px solid rgba(16,185,129,0.3);}
.status-inactive{background:rgba(239,68,68,0.1);color:#EF4444;border:1px solid rgba(239,68,68,0.3);}

/* BUTTONS */
a.view-btn{display:inline-block;padding:6px 14px;border-radius:6px;text-decoration:none;background:rgba(59,130,246,0.1);color:var(--accent-blue);border:1px solid rgba(59,130,246,0.3);font-size:12px;margin-right:8px;transition:all 0.2s;}a.view-btn:hover{background:rgba(59,130,246,0.2);transform:translateY(-1px);}
.search-input{background:var(--bg-room);border:1px solid var(--border-room);border-radius:8px;padding:8px 16px;color:var(--text-primary);font-size:13px;width:240px;}

.loading{padding:48px;text-align:center;color:var(--text-secondary);}
.empty-state{padding:48px;text-align:center;color:var(--text-secondary);background:var(--bg-room);border-radius:12px;border:1px dashed var(--border-room);}

/* ADMIN BANNER */
#impersonation-banner{background:#FFED00;color:#000000;padding:12px;position:sticky;top:56px;z-index:99;text-align:center;font-weight:600;display:none;border-bottom:1px solid #000;}

/* MOBILE */
@media(max-width:768px){container{margin:48px auto;padding:0 16px;}h1{font-size:24px;}.stats-bar{grid-template-columns:1fr;gap:12px;}nav{padding:0 16px;}table{display:block;overflow-x:auto;}th,td{padding:12px;font-size:13px;}a.view-btn{margin-bottom:8px;display:inline-block;margin-right:0;}}
</style>
<script async src="dist/admin.js"></script>
<link rel="icon" href="/favicon.ico">
</head>
<body>

<nav><div class="logo">MOLIAMA <span style="font-size:11px;color:var(--accent-blue);margin-left:8px;opacity:.6">(ADMIN)</span></div><a href="/" class="back-btn">← Back to Website</a></nav>

<div id="impersonation-banner"><strong id="impersonated-name"></strong> | <a href="/admin.html" style="color:#000;">✕ Exit</a></div>

<div class="container">
<h1>Admin Dashboard</h1>
<p style="color:var(--text-secondary);margin-bottom:24px;">Overview of all clients and platform metrics</p>

    <section class="stats-bar">
      <div class="stat-card"><div class="stat-label">Total Clients</div><div class="stat-value" id="total-clients">—</div></div>
      <div class="stat-card"><div class="stat-label">Active Projects</div><div class="stat-value" id="active-projects">—</div></div>
      <div class="stat-card"><div class="stat-label">Monthly Recurring Revenue</div><div class="stat-value" id="mrr">$0</div></div>
    </section>

<section class="table-container">
<div class="table-header"><h3>All Clients</h3><input type="text" class="search-input" placeholder="🔍 Search by name or email"></div>
<div id="clients-table-wrapper"><div class="loading">Loading clients...</div></div>
</section>

</div>
</body>
</html>
