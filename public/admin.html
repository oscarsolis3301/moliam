<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Moliam</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0B0E14;
  --bg-building: #111827;
  --bg-room: #1F2937;
  --accent-blue: #3B82F6;
  --accent-purple: #8B5CF6;
  --accent-green: #10B981;
  --accent-amber: #F59E0B;
  --accent-red: #EF4444;
  --accent-cyan: #06B6D4;
  --text-primary: #F9FAFB;
  --text-secondary: #9CA3AF;
  --text-dim: #6B7280;
  --glass-bg: rgba(17, 24, 39, 0.6);
  --glass-border: rgba(255, 255, 255, 0.08);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 20px;
  --transition-smooth: 300ms cubic-bezier(0.4, 0, 0.2, 1);
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg-deep);
  font-family: 'Inter', system-ui, sans-serif;
  color: var(--text-primary);
  min-height: 100vh;
}

/* ═══ NAV ═══ */
.topnav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 32px;
  background: var(--glass-bg);
  border-bottom: 1px solid var(--glass-border);
  backdrop-filter: blur(20px);
  position: sticky; top: 0; z-index: 100;
}
.topnav .brand {
  font-size: 1.3rem; font-weight: 800;
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.topnav .nav-links { display: flex; gap: 4px; }
.topnav .nav-link {
  padding: 8px 16px; border-radius: var(--radius-sm);
  color: var(--text-secondary); text-decoration: none;
  font-size: 0.85rem; font-weight: 500;
  transition: all var(--transition-smooth);
}
.topnav .nav-link:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
.topnav .nav-link.active { color: var(--accent-blue); background: rgba(59,130,246,0.1); }
.topnav .user-area { display: flex; align-items: center; gap: 12px; }
.btn-logout {
  padding: 8px 16px;
  background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3);
  border-radius: var(--radius-sm); color: #FCA5A5;
  font-family: inherit; font-size: 0.8rem; font-weight: 500;
  cursor: pointer; transition: all var(--transition-smooth);
}
.btn-logout:hover { background: rgba(239,68,68,0.25); color: white; }

/* ═══ LAYOUT ═══ */
.main { max-width: 1280px; margin: 0 auto; padding: 32px 24px; }

/* ═══ TABS ═══ */
.tabs {
  display: flex; gap: 4px; margin-bottom: 32px;
  border-bottom: 1px solid var(--glass-border);
  padding-bottom: 0; flex-wrap: wrap;
}
.tab-btn {
  padding: 12px 20px;
  background: none; border: none; border-bottom: 2px solid transparent;
  color: var(--text-dim); font-family: inherit;
  font-size: 0.9rem; font-weight: 500;
  cursor: pointer; transition: all var(--transition-smooth);
  white-space: nowrap;
}
.tab-btn:hover { color: var(--text-secondary); }
.tab-btn.active {
  color: var(--accent-blue);
  border-bottom-color: var(--accent-blue);
}

.tab-panel { display: none; animation: fadeIn 0.3s ease; }
.tab-panel.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

/* ═══ STAT CARDS WITH TRENDS ═══ */
.stats-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px; margin-bottom: 32px;
}
.stat-card {
  background: var(--glass-bg); border: 1px solid var(--glass-border);
  border-radius: var(--radius-md); padding: 20px;
  backdrop-filter: blur(10px);
  transition: all var(--transition-smooth);
}
.stat-card:hover { border-color: rgba(255,255,255,0.15); transform: translateY(-2px); }
.stat-card .stat-header { display: flex; justify-content: space-between; align-items: flex-start; }
.stat-card .stat-label {
  font-size: 0.7rem; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 6px;
}
.stat-card .stat-value { font-size: 1.6rem; font-weight: 800; }
.stat-value.blue { color: var(--accent-blue); }
.stat-value.green { color: var(--accent-green); }
.stat-value.purple { color: var(--accent-purple); }
.stat-value.amber { color: var(--accent-amber); }
.stat-trend {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 0.72rem; font-weight: 600; padding: 3px 8px;
  border-radius: 100px; margin-top: 8px;
}
.stat-trend.up { background: rgba(16,185,129,0.15); color: #6EE7B7; }
.stat-trend.down { background: rgba(239,68,68,0.15); color: #FCA5A5; }
.stat-trend.neutral { background: rgba(107,114,128,0.15); color: var(--text-dim); }
.stat-icon {
  width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
}
.stat-icon.blue-bg { background: rgba(59,130,246,0.15); }
.stat-icon.green-bg { background: rgba(16,185,129,0.15); }
.stat-icon.purple-bg { background: rgba(139,92,246,0.15); }
.stat-icon.amber-bg { background: rgba(245,158,11,0.15); }

/* ═══ CHART ═══ */
.chart-container {
  background: var(--glass-bg); border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg); padding: 24px;
  backdrop-filter: blur(10px); margin-bottom: 24px;
}
.chart-container h3 { font-size: 1rem; font-weight: 700; margin-bottom: 20px; }
.chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.chart-header h3 { margin-bottom: 0; }
.chart-legend { display: flex; gap: 16px; }
.chart-legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--text-secondary); }
.chart-legend-dot { width: 8px; height: 8px; border-radius: 50%; }

.bar-chart {
  display: flex; align-items: flex-end; gap: 8px; height: 180px;
  padding: 0 4px; border-bottom: 1px solid var(--glass-border);
  position: relative;
}
.bar-chart-gridlines {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  justify-content: space-between; pointer-events: none;
}
.bar-chart-gridline {
  border-bottom: 1px dashed rgba(255,255,255,0.04); width: 100%;
  position: relative;
}
.bar-chart-gridline::before {
  content: attr(data-val); position: absolute; left: -4px; top: -8px;
  font-size: 0.6rem; color: var(--text-dim); transform: translateX(-100%);
}
.bar-group {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
  position: relative; z-index: 1;
}
.bar-stack { display: flex; gap: 3px; align-items: flex-end; width: 100%; justify-content: center; }
.bar {
  width: 14px; border-radius: 4px 4px 0 0;
  transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative; cursor: pointer; min-height: 2px;
}
.bar:hover { filter: brightness(1.3); }
.bar .bar-tooltip {
  display: none; position: absolute; bottom: calc(100% + 8px); left: 50%;
  transform: translateX(-50%); background: var(--bg-deep); border: 1px solid var(--glass-border);
  padding: 6px 10px; border-radius: 6px; font-size: 0.7rem; white-space: nowrap;
  z-index: 10; pointer-events: none; color: var(--text-primary);
}
.bar:hover .bar-tooltip { display: block; }
.bar.revenue { background: linear-gradient(to top, var(--accent-blue), var(--accent-purple)); }
.bar.setup { background: linear-gradient(to top, var(--accent-green), var(--accent-cyan)); }
.bar-label {
  font-size: 0.65rem; color: var(--text-dim); margin-top: 8px;
  text-align: center;
}

/* ═══ MINI CHART (sparkline) ═══ */
.mini-chart { display: flex; align-items: flex-end; gap: 2px; height: 32px; }
.mini-bar {
  flex: 1; border-radius: 2px; min-height: 3px;
  background: rgba(59,130,246,0.4);
  transition: all var(--transition-smooth);
}

/* ═══ TABLE ═══ */
.table-wrap {
  background: var(--glass-bg); border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg); overflow: hidden;
  backdrop-filter: blur(10px);
}
.table-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 20px 24px; border-bottom: 1px solid var(--glass-border);
  flex-wrap: wrap; gap: 12px;
}
.table-header h3 { font-size: 1rem; font-weight: 700; }
.table-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

/* Search / Filter */
.search-bar {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg-deep); border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-sm); padding: 0 12px;
  transition: border-color var(--transition-smooth);
}
.search-bar:focus-within { border-color: var(--accent-blue); box-shadow: 0 0 0 2px rgba(59,130,246,0.12); }
.search-bar svg { color: var(--text-dim); flex-shrink: 0; }
.search-bar input {
  background: none; border: none; color: var(--text-primary);
  font-family: inherit; font-size: 0.85rem; padding: 10px 0;
  outline: none; width: 200px;
}
.search-bar input::placeholder { color: var(--text-dim); }
.filter-select {
  padding: 10px 12px; background: var(--bg-deep);
  border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-sm);
  color: var(--text-secondary); font-family: inherit; font-size: 0.8rem;
  cursor: pointer; outline: none;
  transition: border-color var(--transition-smooth);
}
.filter-select:focus { border-color: var(--accent-blue); }
.filter-select option { background: var(--bg-deep); }

table {
  width: 100%; border-collapse: collapse;
}
th {
  text-align: left; padding: 12px 24px;
  font-size: 0.7rem; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text-dim);
  border-bottom: 1px solid var(--glass-border);
  font-weight: 600; white-space: nowrap;
}
th.sortable { cursor: pointer; user-select: none; }
th.sortable:hover { color: var(--text-secondary); }
th .sort-icon { font-size: 0.6rem; margin-left: 4px; opacity: 0.5; }
td {
  padding: 14px 24px; border-bottom: 1px solid rgba(255,255,255,0.03);
  font-size: 0.85rem;
}
tr:hover td { background: rgba(255,255,255,0.02); }
tr.selected td { background: rgba(59,130,246,0.08); }
.client-name { font-weight: 600; }
.client-company { color: var(--text-secondary); font-size: 0.8rem; }
.client-email { color: var(--text-dim); font-size: 0.8rem; }

/* Checkbox */
.checkbox-cell { width: 48px; text-align: center; }
input[type="checkbox"] {
  width: 16px; height: 16px; accent-color: var(--accent-blue);
  cursor: pointer;
}

/* Expandable row */
.client-row { cursor: pointer; transition: background var(--transition-smooth); }
.client-row .expand-icon {
  display: inline-block; transition: transform var(--transition-smooth);
  font-size: 0.7rem; color: var(--text-dim); margin-right: 6px;
}
.client-row.expanded .expand-icon { transform: rotate(90deg); }
.client-detail-row td { padding: 0; background: rgba(0,0,0,0.2); }
.client-detail-row.hidden { display: none; }
.client-detail-content {
  padding: 16px 24px 20px 72px;
  animation: slideDown 0.25s ease;
}
@keyframes slideDown { from { opacity: 0; max-height: 0; } to { opacity: 1; max-height: 500px; } }
.detail-projects-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}
.detail-project-card {
  background: var(--bg-deep); border: 1px solid var(--glass-border);
  border-radius: var(--radius-md); padding: 16px;
}
.detail-project-card .dp-header {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
}
.detail-project-card .dp-name { font-weight: 600; font-size: 0.9rem; }
.detail-project-card .dp-type {
  font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.05em;
  padding: 3px 8px; border-radius: 100px; font-weight: 600;
  background: rgba(59,130,246,0.15); color: #93C5FD;
}
.detail-project-card .dp-meta { display: flex; gap: 16px; margin-top: 8px; }
.detail-project-card .dp-meta span { font-size: 0.78rem; color: var(--text-secondary); }
.detail-project-card .dp-meta strong { color: var(--text-primary); }

/* Inline status dropdown */
.status-dropdown {
  padding: 4px 8px; background: transparent; border: 1px solid transparent;
  border-radius: 6px; font-family: inherit; font-size: 0.72rem;
  font-weight: 600; cursor: pointer; outline: none;
  transition: all var(--transition-smooth);
  text-transform: uppercase; letter-spacing: 0.03em;
  -webkit-appearance: none; appearance: none;
}
.status-dropdown:hover { border-color: rgba(255,255,255,0.15); }
.status-dropdown:focus { border-color: var(--accent-blue); background: var(--bg-deep); }
.status-dropdown option { background: var(--bg-deep); text-transform: none; }
.status-dropdown.status-active,
.status-dropdown.status-in_progress { background: rgba(16,185,129,0.15); color: #6EE7B7; }
.status-dropdown.status-onboarding { background: rgba(59,130,246,0.15); color: #93C5FD; }
.status-dropdown.status-paused { background: rgba(245,158,11,0.15); color: #FCD34D; }
.status-dropdown.status-completed { background: rgba(139,92,246,0.15); color: #C4B5FD; }
.status-dropdown.status-review { background: rgba(6,182,212,0.15); color: #67E8F9; }

/* Bulk actions bar */
.bulk-bar {
  display: none; align-items: center; gap: 12px;
  padding: 12px 24px; background: rgba(59,130,246,0.08);
  border-bottom: 1px solid rgba(59,130,246,0.2);
  animation: fadeIn 0.2s ease;
}
.bulk-bar.visible { display: flex; }
.bulk-bar .bulk-count { font-size: 0.85rem; font-weight: 600; color: var(--accent-blue); }
.bulk-bar .bulk-actions { display: flex; gap: 8px; margin-left: auto; }

.badge {
  display: inline-block; padding: 3px 10px;
  border-radius: 100px; font-size: 0.7rem;
  font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
}
.badge-active { background: rgba(16,185,129,0.15); color: #6EE7B7; }
.badge-inactive { background: rgba(107,114,128,0.15); color: var(--text-dim); }

/* ═══ FORMS ═══ */
.form-card {
  background: var(--glass-bg); border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg); padding: 32px;
  backdrop-filter: blur(10px); max-width: 600px;
}
.form-card h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 24px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.form-row.full { grid-template-columns: 1fr; }
.form-group { display: flex; flex-direction: column; gap: 6px; position: relative; }
.form-group label {
  font-size: 0.75rem; text-transform: uppercase;
  letter-spacing: 0.05em; color: var(--text-dim); font-weight: 600;
}
.form-group input, .form-group select, .form-group textarea {
  padding: 12px 14px; background: var(--bg-deep);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-sm); color: var(--text-primary);
  font-family: inherit; font-size: 0.9rem;
  transition: border-color var(--transition-smooth);
  outline: none;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  border-color: var(--accent-blue);
  box-shadow: 0 0 0 2px rgba(59,130,246,0.12);
}
.form-group input.input-error, .form-group select.input-error {
  border-color: var(--accent-red);
  box-shadow: 0 0 0 2px rgba(239,68,68,0.12);
}
.form-group .field-error {
  font-size: 0.72rem; color: #FCA5A5; margin-top: 2px;
  display: none; align-items: center; gap: 4px;
}
.form-group .field-error.visible { display: flex; }
.form-group select { cursor: pointer; }
.form-group select option { background: var(--bg-deep); }
.form-group textarea { min-height: 80px; resize: vertical; }

.btn-primary {
  padding: 12px 24px;
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
  border: none; border-radius: var(--radius-sm);
  color: white; font-family: inherit;
  font-size: 0.9rem; font-weight: 600;
  cursor: pointer; transition: all var(--transition-smooth);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(59,130,246,0.3); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.btn-secondary {
  padding: 10px 18px;
  background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  color: var(--text-secondary); font-family: inherit;
  font-size: 0.8rem; font-weight: 500;
  cursor: pointer; transition: all var(--transition-smooth);
}
.btn-secondary:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }

.btn-sm {
  padding: 6px 14px; font-size: 0.75rem; border-radius: 6px;
  font-weight: 600; cursor: pointer; transition: all var(--transition-smooth);
  font-family: inherit;
}
.btn-export {
  background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.3);
  color: #6EE7B7;
}
.btn-export:hover { background: rgba(16,185,129,0.22); }
.btn-danger {
  background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3);
  color: #FCA5A5;
}
.btn-danger:hover { background: rgba(239,68,68,0.22); }

.form-actions { display: flex; gap: 12px; margin-top: 24px; }

.alert {
  padding: 12px 16px; border-radius: var(--radius-sm);
  font-size: 0.85rem; margin-bottom: 20px; display: none;
}
.alert.error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #FCA5A5; display: block; }
.alert.success { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); color: #6EE7B7; display: block; }

/* ═══ DASHBOARD GRID ═══ */
.dashboard-grid {
  display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 24px;
}
.dashboard-grid .full-width { grid-column: 1 / -1; }

/* Activity feed */
.activity-feed { max-height: 340px; overflow-y: auto; }
.activity-feed::-webkit-scrollbar { width: 4px; }
.activity-feed::-webkit-scrollbar-track { background: transparent; }
.activity-feed::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
.activity-item {
  display: flex; gap: 12px; padding: 12px 0;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.activity-item:last-child { border-bottom: none; }
.activity-dot {
  width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0;
}
.activity-text { font-size: 0.82rem; color: var(--text-secondary); line-height: 1.5; }
.activity-text strong { color: var(--text-primary); }
.activity-time { font-size: 0.7rem; color: var(--text-dim); margin-top: 2px; }

/* Revenue breakdown */
.revenue-breakdown { display: flex; flex-direction: column; gap: 12px; }
.rev-item { display: flex; justify-content: space-between; align-items: center; }
.rev-item-left { display: flex; align-items: center; gap: 10px; }
.rev-dot { width: 10px; height: 10px; border-radius: 3px; }
.rev-label { font-size: 0.82rem; color: var(--text-secondary); }
.rev-value { font-weight: 700; font-size: 0.9rem; }
.rev-bar-bg { height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; margin-top: 4px; }
.rev-bar-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }

/* Toast notification */
.toast {
  position: fixed; bottom: 24px; right: 24px; padding: 14px 20px;
  background: var(--bg-building); border: 1px solid var(--glass-border);
  border-radius: var(--radius-md); z-index: 200;
  transform: translateY(100px); opacity: 0;
  transition: all 0.3s ease; font-size: 0.85rem;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  display: flex; align-items: center; gap: 10px;
}
.toast.visible { transform: translateY(0); opacity: 1; }
.toast.toast-success { border-left: 3px solid var(--accent-green); }
.toast.toast-error { border-left: 3px solid var(--accent-red); }

/* ═══ LOADING ═══ */
.loading-state {
  display: flex; align-items: center; justify-content: center;
  padding: 80px; color: var(--text-dim); gap: 12px;
}
.loading-spin {
  width: 24px; height: 24px;
  border: 2px solid rgba(255,255,255,0.1); border-top-color: var(--accent-blue);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.empty-state { text-align: center; padding: 40px; color: var(--text-dim); }
.empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 8px; }

/* ═══ MOBILE ═══ */
@media (max-width: 768px) {
  .topnav { padding: 12px 16px; flex-wrap: wrap; gap: 8px; }
  .topnav .nav-links { width: 100%; justify-content: center; }
  .main { padding: 20px 16px; }
  .form-row { grid-template-columns: 1fr; }
  .table-wrap { overflow-x: auto; }
  table { min-width: 700px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .dashboard-grid { grid-template-columns: 1fr; }
  .search-bar input { width: 140px; }
  .client-detail-content { padding-left: 24px; }
  .table-actions { width: 100%; }
}

<script>
let clients = [];
let projects = [];
let dashData = null;
let selectedClients = new Set();
let expandedClients = new Set();
let clientSearchQuery = '';
let clientStatusFilter = 'all';

async function init() {
  try {
    const authRes = await fetch('/api/auth/me', { credentials: 'include' });
    const auth = await authRes.json();
    if (!auth.success || auth.user.role !== 'admin') {
      window.location.href = auth.success ? '/dashboard' : '/login';
      return;
    }
    document.getElementById('userGreeting').textContent = auth.user.name;

    const [dashRes, clientsRes, projectsRes] = await Promise.all([
      fetch('/api/dashboard', { credentials: 'include' }),
      fetch('/api/admin/clients', { credentials: 'include' }),
      fetch('/api/admin/projects', { credentials: 'include' }),
    ]);

    dashData = await dashRes.json();
    const cData = await clientsRes.json();
    const pData = await projectsRes.json();

    clients = cData.clients || [];
    projects = pData.projects || [];

    renderAdmin();
  } catch (err) {
    console.error(err);
    window.location.href = '/login';
  }
}

// ═══════════════════════════════════════
// PLACEHOLDER TREND DATA
// ═══════════════════════════════════════
function getMonthlyRevenueData() {
  const now = new Date();
  const months = [];
  for (let i = 11; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const label = d.toLocaleString('en', { month: 'short' });
    // Generate plausible growth curve
    const base = 1200 + (12 - i) * 320 + Math.floor(Math.random() * 400);
    const setup = Math.floor(Math.random() * 600);
    months.push({ label, recurring: base, setup, total: base + setup });
  }
  return months;
}

function getTrendData(current, label) {
  // Simulate a previous period value for comparison
  const prevMap = { 'clients': 0.82, 'projects': 0.75, 'revenue': 0.88, 'leads': 0.6 };
  const factor = prevMap[label] || 0.8;
  const previous = Math.round(current * factor);
  if (previous === 0) return { pct: current > 0 ? 100 : 0, dir: 'up' };
  const pct = Math.round(((current - previous) / previous) * 100);
  return { pct: Math.abs(pct), dir: pct >= 0 ? 'up' : 'down' };
}

function getProjectsForClient(clientId) {
  return projects.filter(p => p.user_id === clientId);
}

// ═══════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════

      <div style="font-size:0.8rem; color:var(--text-dim);">Last updated: ${new Date().toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' })}</div>

    <div class="stats-grid">
      <div class="stat-card">

      </div>
      <div class="stat-card">
        <div class="stat-header">
          <div>
            <div class="stat-label">Active Projects</div>
            <div class="stat-value green">${stats.active_projects || 0}</div>
            <div class="stat-trend ${tProjects.dir}">
              ${tProjects.dir === 'up' ? '↑' : '↓'} ${tProjects.pct}% vs last month
            </div>
          </div>
          <div class="stat-icon green-bg">📁</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-header">
          <div>
            <div class="stat-label">Monthly Revenue</div>
            <div class="stat-value purple">$${(stats.monthly_revenue || 0).toLocaleString()}</div>
            <div class="stat-trend ${tRevenue.dir}">
              ${tRevenue.dir === 'up' ? '↑' : '↓'} ${tRevenue.pct}% vs last month
            </div>
          </div>
          <div class="stat-icon purple-bg">💰</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-header">
          <div>
            <div class="stat-label">New Leads</div>
            <div class="stat-value amber">${stats.new_leads || 0}</div>
            <div class="stat-trend ${tLeads.dir}">
              ${tLeads.dir === 'up' ? '↑' : '↓'} ${tLeads.pct}% vs last month
            </div>
          </div>
          <div class="stat-icon amber-bg">🔥</div>
        </div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="overview">📊 Overview</button>
      <button class="tab-btn" data-tab="clients">👥 Clients</button>
      <button class="tab-btn" data-tab="projects">📁 Projects</button>
      <button class="tab-btn" data-tab="onboard">+ Onboard Client</button>
      <button class="tab-btn" data-tab="add-project">+ Add Project</button>

    <!-- Overview Tab -->
    <div class="tab-panel active" id="tab-overview">
      ${renderOverviewTab()}

    <!-- Clients Tab -->

      ${renderClientsTab()}
    </div>

    <!-- Projects Tab -->
    <div class="tab-panel" id="tab-projects">
      ${renderProjectsTab()}
    </div>

    <!-- Onboard Client Tab -->
    <div class="tab-panel" id="tab-onboard">
      ${renderOnboardTab()}
    </div>

    <!-- Add Project Tab -->
    <div class="tab-panel" id="tab-add-project">
      ${renderAddProjectTab()}
    </div>

    <!-- Add Update Tab -->
    <div class="tab-panel" id="tab-add-update">
      ${renderAddUpdateTab()}
    </div>
  `;

  bindTabSwitching();
  bindProjectTypeAutofill();
  setupOnboardForm();
  setupProjectForm();
  setupUpdateForm();
  bindClientTable();
  bindProjectStatusDropdowns();
  animateChartBars();
}

// ═══════════════════════════════════════
// OVERVIEW TAB (CHARTS + ACTIVITY)
// ═══════════════════════════════════════
function renderOverviewTab() {
  const monthlyData = getMonthlyRevenueData();
  const maxVal = Math.max(...monthlyData.map(m => m.total));
  const gridMax = Math.ceil(maxVal / 1000) * 1000;

  // Revenue by type
  const typeRevenue = { website: 0, gbp: 0, lsa: 0, retainer: 0 };
  projects.forEach(p => {
    if (p.status === 'active' || p.status === 'in_progress') {
      typeRevenue[p.type] = (typeRevenue[p.type] || 0) + (p.monthly_rate || 0);
    }
  });
  const totalRev = Object.values(typeRevenue).reduce((a, b) => a + b, 0) || 1;
  const typeColors = { website: '#3B82F6', gbp: '#10B981', lsa: '#F59E0B', retainer: '#8B5CF6' };
  const typeLabels = { website: 'Website', gbp: 'GBP', lsa: 'LSA', retainer: 'Retainer' };

  return `
    <div class="dashboard-grid">
      <!-- Revenue Chart -->
      <div class="chart-container">
        <div class="chart-header">
          <h3>Monthly Revenue Trend</h3>
          <div class="chart-legend">
            <div class="chart-legend-item"><div class="chart-legend-dot" style="background:var(--accent-blue);"></div> Recurring</div>
            <div class="chart-legend-item"><div class="chart-legend-dot" style="background:var(--accent-green);"></div> Setup Fees</div>
          </div>
        </div>
        <div style="position:relative; padding-left:40px;">
          <div class="bar-chart" id="revenueChart">
            <div class="bar-chart-gridlines">
              <div class="bar-chart-gridline" data-val="$${(gridMax/1000).toFixed(0)}k"></div>
              <div class="bar-chart-gridline" data-val="$${(gridMax*0.75/1000).toFixed(0)}k"></div>
              <div class="bar-chart-gridline" data-val="$${(gridMax*0.5/1000).toFixed(0)}k"></div>
              <div class="bar-chart-gridline" data-val="$${(gridMax*0.25/1000).toFixed(0)}k"></div>
              <div class="bar-chart-gridline" data-val="$0"></div>
            </div>
            ${monthlyData.map(m => {
              const recH = (m.recurring / gridMax) * 100;
              const setupH = (m.setup / gridMax) * 100;
              return `<div class="bar-group">
                <div class="bar-stack">
                  <div class="bar revenue" data-height="${recH}" style="height:0%;">
                    <div class="bar-tooltip">$${m.recurring.toLocaleString()} recurring</div>
                  </div>
                  <div class="bar setup" data-height="${setupH}" style="height:0%;">
                    <div class="bar-tooltip">$${m.setup.toLocaleString()} setup</div>
                  </div>
                </div>
                <div class="bar-label">${m.label}</div>
              </div>`;
            }).join('')}
          </div>
        </div>
      </div>

      <!-- Revenue Breakdown -->
      <div class="chart-container">
        <h3>Revenue by Service</h3>
        <div class="revenue-breakdown" style="margin-top:16px;">
          ${Object.entries(typeRevenue).map(([type, rev]) => `
            <div>
              <div class="rev-item">
                <div class="rev-item-left">
                  <div class="rev-dot" style="background:${typeColors[type]};"></div>
                  <span class="rev-label">${typeLabels[type]}</span>
                </div>
                <span class="rev-value" style="color:${typeColors[type]};">$${rev.toLocaleString()}/mo</span>
              </div>
              <div class="rev-bar-bg">
                <div class="rev-bar-fill" style="width:${(rev/totalRev*100).toFixed(1)}%; background:${typeColors[type]};"></div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>

      <!-- Recent Activity -->
      <div class="chart-container full-width">
        <h3>Recent Activity</h3>
        <div class="activity-feed" style="margin-top:12px;">
          ${generateActivityFeed()}
        </div>
      </div>
    </div>
  `;
}

function generateActivityFeed() {
  const activities = [];

  // Build activities from real data
  clients.forEach(c => {
    activities.push({
      text: `<strong>${esc(c.name)}</strong> was onboarded${c.company ? ' from <strong>' + esc(c.company) + '</strong>' : ''}`,
      time: c.created_at || null,
      color: 'var(--accent-blue)'
    });
  });
  projects.forEach(p => {
    activities.push({
      text: `Project <strong>${esc(p.name)}</strong> created for ${esc(p.client_name || 'client')}`,
      time: p.created_at || null,
      color: 'var(--accent-green)'
    });
  });

  // Sort by date descending, take latest 10
  activities.sort((a, b) => {
    if (!a.time && !b.time) return 0;
    if (!a.time) return 1;
    if (!b.time) return -1;
    return new Date(b.time) - new Date(a.time);
  });

  const recent = activities.slice(0, 10);
  if (recent.length === 0) {
    return '<div class="empty-state" style="padding:20px;"><p>No recent activity yet.</p></div>';
  }

  return recent.map(a => `
    <div class="activity-item">
      <div class="activity-dot" style="background:${a.color};"></div>
      <div>
        <div class="activity-text">${a.text}</div>
        <div class="activity-time">${a.time ? timeAgo(a.time) : 'Recently'}</div>
      </div>
    </div>
  `).join('');
}

// CLIENTS TAB
// ═══════════════════════════════════════
function renderClientsTab() {

    <div class="table-wrap">
      <div class="table-header">
        <h3>All Clients (${clients.length})</h3>
        <div class="table-actions">
          <div class="search-bar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input type="text" id="clientSearch" placeholder="Search clients..." value="${esc(clientSearchQuery)}">
          </div>
          <select class="filter-select" id="clientStatusFilter">
            <option value="all"${clientStatusFilter==='all'?' selected':''}>All Status</option>
            <option value="active"${clientStatusFilter==='active'?' selected':''}>Active</option>
            <option value="inactive"${clientStatusFilter==='inactive'?' selected':''}>Inactive</option>
          </select>
          <button class="btn-sm btn-export" onclick="exportClientsCSV()">⬇ Export CSV</button>
        </div>
      </div>
      <div class="bulk-bar" id="bulkBar">
        <span class="bulk-count" id="bulkCount">0 selected</span>

          <button class="btn-sm btn-secondary" onclick="bulkEmail()">📧 Email Selected</button>
          <button class="btn-sm btn-danger" onclick="bulkDeactivate()">⛔ Deactivate</button>
          <button class="btn-sm btn-secondary" onclick="clearSelection()">✕ Clear</button>
        </div>
      </div>
      ${clients.length > 0 ? `
        <div style="overflow-x:auto;">
        <table>
          <thead><tr>
            <th class="checkbox-cell"><input type="checkbox" id="selectAll" title="Select all"></th>
            <th></th>
            <th class="sortable" data-sort="name">Client <span class="sort-icon">↕</span></th>
            <th>Email</th>
            <th class="sortable" data-sort="projects">Projects <span class="sort-icon">↕</span></th>
            <th class="sortable" data-sort="revenue">Monthly Rev <span class="sort-icon">↕</span></th>
            <th>Status</th>
            <th>Last Login</th>
          </tr></thead>
          <tbody id="clientTableBody">
            ${renderClientRows(getFilteredClients())}
          </tbody>
        </table>
        </div>
      ` : `
        <div class="empty-state"><div class="empty-icon">👥</div><p>No clients yet. Onboard your first client!</p></div>
      `}
    </div>
  `;
}

function getFilteredClients() {
  let filtered = [...clients];
  if (clientSearchQuery) {
    const q = clientSearchQuery.toLowerCase();
    filtered = filtered.filter(c =>
      (c.name && c.name.toLowerCase().includes(q)) ||
      (c.company && c.company.toLowerCase().includes(q)) ||
      (c.email && c.email.toLowerCase().includes(q))
    );
  }
  if (clientStatusFilter !== 'all') {
    filtered = filtered.filter(c =>
      clientStatusFilter === 'active' ? c.is_active : !c.is_active
    );
  }
  return filtered;
}

function renderClientRows(clientList) {
  if (clientList.length === 0) {
    return '<tr><td colspan="8" style="text-align:center; padding:40px; color:var(--text-dim);">No clients match your search</td></tr>';
  }
  return clientList.map(c => {
    const isExpanded = expandedClients.has(c.id);
    const isSelected = selectedClients.has(c.id);
    const clientProjects = getProjectsForClient(c.id);
    return `
      <tr class="client-row ${isExpanded ? 'expanded' : ''} ${isSelected ? 'selected' : ''}" data-id="${c.id}">
        <td class="checkbox-cell" onclick="event.stopPropagation();">
          <input type="checkbox" class="client-checkbox" data-id="${c.id}" ${isSelected ? 'checked' : ''}>
        </td>
        <td style="width:24px;padding-right:0;">
          <span class="expand-icon">▶</span>
        </td>
        <td><span class="client-name">${esc(c.name)}</span>${c.company ? `<br><span class="client-company">${esc(c.company)}</span>` : ''}</td>
        <td class="client-email">${esc(c.email)}</td>
        <td>${c.project_count || 0}</td>
        <td style="font-weight:600;">$${(c.monthly_revenue || 0).toLocaleString()}</td>
        <td><span class="badge ${c.is_active ? 'badge-active' : 'badge-inactive'}">${c.is_active ? 'Active' : 'Inactive'}</span></td>
        <td style="color:var(--text-dim); font-size:0.8rem;">${c.last_login ? formatDate(c.last_login) : 'Never'}</td>
      </tr>
      <tr class="client-detail-row ${isExpanded ? '' : 'hidden'}" data-detail-id="${c.id}">
        <td colspan="8">
          <div class="client-detail-content">
            ${clientProjects.length > 0 ? `
              <div style="margin-bottom:8px; font-size:0.78rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.06em; font-weight:600;">
                Projects (${clientProjects.length})
              </div>
              <div class="detail-projects-grid">
                ${clientProjects.map(p => `
                  <div class="detail-project-card">
                    <div class="dp-header">
                      <span class="dp-name">${esc(p.name)}</span>
                      <span class="dp-type">${p.type}</span>
                    </div>
                    <div>
                      <select class="status-dropdown status-${p.status}" data-project-id="${p.id}" onchange="changeProjectStatus(this, ${p.id})">
                        <option value="onboarding" ${p.status==='onboarding'?'selected':''}>Onboarding</option>
                        <option value="in_progress" ${p.status==='in_progress'?'selected':''}>In Progress</option>
                        <option value="active" ${p.status==='active'?'selected':''}>Active</option>
                        <option value="paused" ${p.status==='paused'?'selected':''}>Paused</option>
                        <option value="completed" ${p.status==='completed'?'selected':''}>Completed</option>
                        <option value="review" ${p.status==='review'?'selected':''}>Review</option>
                      </select>
                    </div>
                    <div class="dp-meta">
                      <span>Setup: <strong>$${(p.setup_fee || 0).toLocaleString()}</strong></span>
                      <span>Monthly: <strong>$${(p.monthly_rate || 0).toLocaleString()}</strong></span>
                    </div>
                  </div>
                `).join('')}
              </div>
            ` : '<div style="color:var(--text-dim); font-size:0.85rem;">No projects yet for this client.</div>'}
          </div>
        </td>
      </tr>
    `;
  }).join('');
}

function bindTabSwitching() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

      btn.classList.add('active');
      document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
    });
  });
}

function bindClientTable() {
  // Search
  const searchInput = document.getElementById('clientSearch');
  if (searchInput) {
    searchInput.addEventListener('input', debounce(function() {
      clientSearchQuery = this.value;
      refreshClientTable();
    }, 250));
  }

  // Filter
  const filterSelect = document.getElementById('clientStatusFilter');
  if (filterSelect) {
    filterSelect.addEventListener('change', function() {
      clientStatusFilter = this.value;
      refreshClientTable();
    });
  }

  // Select all
  const selectAll = document.getElementById('selectAll');
  if (selectAll) {
    selectAll.addEventListener('change', function() {
      const filtered = getFilteredClients();
      if (this.checked) {
        filtered.forEach(c => selectedClients.add(c.id));
      } else {
        selectedClients.clear();
      }
      refreshClientTable();
    });
  }

  // Row click handlers (expand) and checkbox handlers
  bindRowEvents();
}

function bindRowEvents() {
  // Client row expand
  document.querySelectorAll('.client-row').forEach(row => {
    row.addEventListener('click', function(e) {
      if (e.target.type === 'checkbox' || e.target.closest('.checkbox-cell')) return;
      const id = parseInt(this.dataset.id);
      if (expandedClients.has(id)) expandedClients.delete(id);
      else expandedClients.add(id);

      this.classList.toggle('expanded');
      const detail = document.querySelector(`[data-detail-id="${id}"]`);
      if (detail) detail.classList.toggle('hidden');
    });
  });

  // Checkboxes
  document.querySelectorAll('.client-checkbox').forEach(cb => {
    cb.addEventListener('change', function() {
      const id = parseInt(this.dataset.id);
      if (this.checked) selectedClients.add(id);
      else selectedClients.delete(id);
      updateBulkBar();
      this.closest('tr').classList.toggle('selected', this.checked);
    });
  });
}

function refreshClientTable() {
  const tbody = document.getElementById('clientTableBody');
  if (!tbody) return;
  tbody.innerHTML = renderClientRows(getFilteredClients());
  bindRowEvents();
  bindProjectStatusDropdowns();
  updateBulkBar();
}

function updateBulkBar() {
  const bar = document.getElementById('bulkBar');
  const count = document.getElementById('bulkCount');
  if (!bar) return;
  if (selectedClients.size > 0) {
    bar.classList.add('visible');
    count.textContent = `${selectedClients.size} selected`;
  } else {
    bar.classList.remove('visible');
  }
}

function clearSelection() {
  selectedClients.clear();
  refreshClientTable();
}

async function changeProjectStatus(selectEl, projectId) {
  const newStatus = selectEl.value;
  // Update class for styling
  selectEl.className = `status-dropdown status-${newStatus}`;

  try {
    const res = await fetch(`/api/admin/projects/${projectId}`, {
      method: 'PATCH', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: newStatus }),
    });
    const data = await res.json();
    if (data.success) {
      // Update local data
      const proj = projects.find(p => p.id === projectId);
      if (proj) proj.status = newStatus;
      showToast(`Status updated to "${newStatus.replace('_',' ')}"`, 'success');
    } else {
      showToast(data.message || 'Failed to update status', 'error');
    }
  } catch (err) {
    showToast('Connection error updating status', 'error');
  }
}

// CSV EXPORT
// ═══════════════════════════════════════
function exportClientsCSV() {
  const headers = ['Name', 'Company', 'Email', 'Phone', 'Projects', 'Monthly Revenue', 'Status', 'Last Login'];
  const rows = clients.map(c => [
    c.name || '',
    c.company || '',
    c.email || '',
    c.phone || '',
    c.project_count || 0,
    c.monthly_revenue || 0,
    c.is_active ? 'Active' : 'Inactive',
    c.last_login ? formatDate(c.last_login) : 'Never'
  ]);

  let csv = headers.join(',') + '\n';
  rows.forEach(row => {
    csv += row.map(val => `"${String(val).replace(/"/g, '""')}"`).join(',') + '\n';
  });

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `moliam-clients-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`Exported ${clients.length} clients to CSV`, 'success');
}

// ═══════════════════════════════════════
// FORM VALIDATION + SUBMISSION
// ═══════════════════════════════════════
function validateField(input) {
  const rules = input.dataset.validate;
  if (!rules) return true;

  const errEl = document.getElementById(`err-${input.id}`);
  let valid = true;

  if (rules.includes('required') && !input.value.trim()) {
    valid = false;
    if (errEl) errEl.textContent = `⚠ ${input.dataset.label || 'This field'} is required`;
  }
  if (rules.includes('email') && input.value.trim()) {
    const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRe.test(input.value.trim())) {
      valid = false;
      if (errEl) errEl.textContent = '⚠ Enter a valid email address';
    }
  }
  if (rules.includes('phone') && input.value.trim()) {
    const digits = input.value.replace(/\D/g, '');
    if (digits.length < 7 || digits.length > 15) {
      valid = false;
      if (errEl) errEl.textContent = '⚠ Enter a valid phone number';
    }
  }
  const minMatch = rules.match(/minlength:(\d+)/);
  if (minMatch && input.value.trim().length < parseInt(minMatch[1])) {
    valid = false;
    if (errEl) errEl.textContent = `⚠ Must be at least ${minMatch[1]} characters`;
  }

  if (errEl) {
    errEl.classList.toggle('visible', !valid);
  }
  input.classList.toggle('input-error', !valid);
  return valid;
}

function validateForm(formEl) {
  const inputs = formEl.querySelectorAll('[data-validate]');
  let allValid = true;
  inputs.forEach(input => {
    if (!validateField(input)) allValid = false;
  });
  return allValid;
}

// Add real-time validation on blur
document.addEventListener('focusout', function(e) {
  if (e.target.dataset && e.target.dataset.validate) {
    validateField(e.target);
  }
});
document.addEventListener('input', function(e) {
  if (e.target.classList.contains('input-error')) {
    validateField(e.target);
  }
});

// ═══════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════
function showAlert(id, msg, type) {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = `<div class="alert ${type}">${esc(msg)}</div>`;
}
function clearAlert(id) {
  const el = document.getElementById(id);
  if (el) el.innerHTML = '';
}

function showToast(message, type = 'success') {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.className = `toast toast-${type} visible`;
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => {
    toast.classList.remove('visible');
  }, 3000);
}

function formatDate(d) {
  if (!d) return '';
  try { return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); } catch { return d; }
}

function timeAgo(dateStr) {
  try {
    const diff = Date.now() - new Date(dateStr).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'Just now';
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    const days = Math.floor(hrs / 24);
    if (days < 30) return `${days}d ago`;
    return formatDate(dateStr);
  } catch { return ''; }
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function debounce(fn, ms) {
  let timer;
  return function(...args) {
    clearTimeout(timer);
    timer = setTimeout(() => fn.apply(this, args), ms);
  };
}
