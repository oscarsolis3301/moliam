<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOLIAMA — Admin Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
--bg-deep: #0B0E14;
--bg-building: #111827;
--bg-room: #1F2937;
--border-room: #374151;
--accent-blue: #3B82F6;
--accent-purple: #8B5CF6;
--accent-green: #10B981;
--text-primary: #F9FAFB;
--text-secondary: #9CA3AF;
--text-dim: #6B7280;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg-deep);
  font-family: 'Inter', system-ui, sans-serif;
  color: var(--text-primary);
  line-height: 1.6;
}
a { color: var(--accent-blue); text-decoration: none; }
a:hover { text-decoration: underline; }

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 32px 16px;
}

/* Global Navigation */
.global-nav {
  background: linear-gradient(135deg, rgba(31,41,55,0.8), rgba(15,23,42,0.8));
  border-bottom: 1px solid var(--border-room);
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  backdrop-filter: blur(8px);
}
.nav-left {
  display: flex;
  align-items: center;
  gap: 16px;
}
.back-btn {
  color: var(--accent-blue);
  font-size: 14px;
  font-weight: 600;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
}
.back-btn:hover {
  text-decoration: underline;
  color: var(--accent-purple);
}
.brand {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: 0.05em;
}
.nav-right {
  display: flex;
  align-items: center;
  gap: 16px;
}
.user-menu {
  text-align: right;
}
.user-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
}
.user-role {
  font-size: 12px;
  color: var(--accent-green);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.logout-btn {
  background: none;
  border: 1px solid var(--border-room);
  color: var(--text-secondary);
  font-size: 13px;
  padding: 6px 12px;
  border-radius: 8px;
  cursor: pointer;
}
.logout-btn:hover {
  border-color: var(--accent-green);
  color: var(--accent-green);
}

header {
  margin-bottom: 40px;
  text-align: center;
}
header h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
header p { color: var(--text-secondary); font-size: 15px; }

/* Stats Bar */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}

.stat-card {
  background: linear-gradient(135deg, rgba(31,41,55,0.8), rgba(15,23,42,0.7));
  border: 1px solid var(--border-room);
  border-radius: 12px;
  padding: 24px;
  text-align: center;
  backdrop-filter: blur(10px) saturate(180%);
  transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
}

.stat-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 32px rgba(59, 130, 246, 0.25);
  border-color: rgba(59, 130, 246, 0.4);
}

.stat-number { font-size: 36px; font-weight: 700; color: var(--accent-blue); }
.stat-label { font-size: 13px; color: var(--text-secondary); margin-top: 8px; text-transform: uppercase; letter-spacing: 0.05em; }

/* Admin Table */
.table-container {
  background: linear-gradient(135deg, rgba(31,41,55,0.8), rgba(15,23,42,0.7));
  border: 1px solid var(--border-room);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 24px;
  backdrop-filter: blur(10px) saturate(180%);
  transition: transform 0.2s, box-shadow 0.2s;
}

.table-container:hover {
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
}

.client-table {
  width: 100%;
  border-collapse: collapse;
}

.client-table th {
  background: rgba(31, 41, 55, 0.8);
  padding: 16px;
  text-align: left;
  font-size: 12px;
  text-transform: uppercase;
  color: var(--text-secondary);
  letter-spacing: 0.05em;
}

.client-table td {
  padding: 16px;
  border-top: 1px solid var(--border-room);
  font-size: 14px;
  transition: background-color 0.15s ease;
}

.client-table tr:hover td {
  background: rgba(59, 130, 246, 0.05);
}

.client-name { font-weight: 600; color: var(--text-primary); }
.client-email { color: var(--text-secondary); font-size: 13px; }
.status-badge {
  font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border-room);
}

.action-btn {
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
  color: #fff !important;
  padding: 10px 16px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  text-align: center;
  display: inline-block;
  transition: opacity 0.2s;
}

.action-btn:hover { opacity: 0.9; }

/* Client Detail Panel */
.client-panel {
  margin-bottom: 32px;
}

.panel-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 24px;
}

.panel-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
.panel-actions { display: flex; gap: 12px; }

/* Timeline */
.timeline-header { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
.milestone-item {
  padding: 16px;
  background: rgba(15, 23, 42, 0.5);
  border-left: 3px solid var(--accent-blue);
  border-radius: 8px 0 0 8px;
  margin-bottom: 12px;
}

.milestone-date { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
.milestone-text { font-size: 14px; }

/* Loading & Skeleton States */
.loading { text-align: center; padding: 64px; color: var(--text-secondary); }

.skeleton {
  background: linear-gradient(90deg, rgba(31,41,55,0.7) 25%, rgba(55,65,81,0.7) 50%, rgba(31,41,55,0.7) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 8px;
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.skeleton-text { height: 16px; margin-bottom: 8px; width: 60%; }
.skeleton-stat { height: 36px; margin-bottom: 8px; }

.fade-in { animation: fadeIn 0.4s ease-out; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 768px) {
    .stats-bar { grid-template-columns: 1fr; gap: 12px; }
    .table-container { font-size: 13px; display: block; overflow-x: auto; white-space: nowrap; }
    .table-container td, .table-container th { padding: 12px 10px; }
         .action-btn { padding: 8px 12px; font-size: 12px; }
         .global-nav { padding: 12px 16px; position: relative; }
     .nav-left a.brand { font-size: 18px; color: var(--accent-blue); }
         .nav-left .back-btn { display: none; }
           .user-name { font-size: 13px; }
      .user-role { font-size: 11px; }
    .logout-btn { padding: 4px 10px; font-size: 12px; }

       /* Client table makes modal cards on mobile */
       .client-table { display: block; }
    .client-table td { white-space: normal !important; padding-bottom: 12px; border: none; border-radius: 8px; background: rgba(31,41,55,0.5); margin-bottom: 8px; }
      .client-name { margin-bottom: 4px; }
}

@media (min-width: 768px) and (max-width: 1024px) {
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .table-container { font-size: 13px; }
    .table-container th { font-size: 11px; padding: 12px 8px; }
       .table-container td { padding: 12px 8px; }
     .action-btn { padding: 8px 14px; font-size: 12px; }

.global-nav { padding: 14px 24px; }
.nav-left a.brand { font-size: 19px; }
}

@media (min-width: 1024px) {
    .admin-card:hover { transform: translateY(-3px); transition: transform 0.2s, box-shadow 0.2s; }
    .stat-card:hover { box-shadow: 0 8px 24px rgba(59,130,246,0.25); }

.global-nav { padding: 16px 32px; }
}
</style>
</head>
<body>
<noscript>Please enable JavaScript to view your admin dashboard.</noscript>

<div class="container" id="app">
   <!-- Global Navigation -->
   <nav class="global-nav">
     <div class="nav-left">
       <a href="/" class="brand">MOLIAMA Admin</a>
       <a href="/" class="back-btn">← Back to Home</a>
     </div>
     <div class="nav-right">
       <div class="user-menu" id="admin-user-nav">
         <div class="user-name">Loading...</div>
         <div class="user-role">Administrator Access</div>
       </div>
       <form method="post" action="/api/auth/logout">
         <button class="logout-btn">Log out</button>
       </form>
     </div>
   </nav>
  
  <header>
     <h1 id="page-title">Admin Dashboard</h1>
     <p id="page-subtitle">Manage clients and projects</p>
    </header>

  <div id="content">

<script>
// Update admin user nav UI
function updateAdminUserNav(user) {
  const userNavEl = document.getElementById('admin-user-nav');
  if (userNavEl && user) {
    userNavEl.innerHTML = `
       <div class="user-name">${user.first_name || user.name || 'Admin'}</div>
       <div class="user-role">Administrator Access</div>
     `;
  }
}

const API_BASE = '/api';

function formatCurrency(amount) {
  return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(amount);
}

function formatDate(isoDate) {
  if (!isoDate) return 'N/A';
  return new Date(isoDate).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
}

async function checkAuth() {
  try {
    const resp = await fetch(`${API_BASE}/auth/status`, { credentials: 'include' });
if (!resp.ok) return null;
    const data = await resp.json();
    return data.user || null;
  } catch (err) {
    console.error('Auth check failed:', err);
    return null;
  }
}

async function renderAdminDashboard(user, clientData, projects, options = {}) {
  const contentEl = document.getElementById('content');
  const clients = Array.isArray(clientData) ? clientData : [];
  
    // Stats calculation
  const totalClients = clients.length;
  const totalMRR = clients.reduce((sum, c) => sum + (Number(c.monthly_value) || 0), 0);
  const activeProjects = projects.length;
  
   let html = `

       <div class="stat-card">
         <div class="stat-number">${totalClients}</div>
         <div class="stat-label">Total Clients</div>
       </div>
       <div class="stat-card">
         <div class="stat-number">${formatCurrency(totalMRR)}</div>
         <div class="stat-label">Monthly Recurring Revenue</div>
       </div>
       <div class="stat-card">
         <div class="stat-number">${activeProjects}</div>
         <div class="stat-label">Active Projects</div>
       </div>
     </div>
   `;
  
   if (options.showSkeleton) {
    return html; // Skeleton already shown in init, just load data
  }
  
  let tableHtml = '<div class="table-container"><table class="client-table"><thead><tr>';
  tableHtml += '<th>Client Name</th><th>Email</th><th>Status</th><th>Actions</th></tr>';
  tableHtml += '</thead><tbody>';
  
  clients.forEach(client => {
    const fullName = client.first_name && client.last_name 
       ? `${client.first_name} ${client.last_name}`
       : (client.name || client.email);

    html += `
       <tr data-client-id="${client.id}">
         <td>
           <div class="client-name">${fullName}</div>
           <div class="client-email">${client.email}</div>
         </td>
         <td><span class="status-badge ${client.status === 'active' ? '' : ''}">${client.status || 'unknown'}</span></td>
         <td>
           <a href="/dashboard?impersonate=${client.id}" class="action-btn" onclick="return confirm('View dashboard as this client? Do not log out!')">View as Client</a>
         </td>
       </tr>`;
  });
  
  tableHtml += '</tbody></table></div>';
  html += tableHtml;

   // Project updates from all clients
  if (projects && projects.length > 0) {
    html += '<div class="card fade-in" style="margin-top:32px;"><div class="timeline-header">Recent Project Updates</div>' +
      projects.slice(0, 10).map(p => `
         <div class="milestone-item"><div class="milestone-date">${formatDate(p.project_update_date)}</div><div class="milestone-text">${p.text_content || 'Project update'}</div></div>
       `).join('') + '</div>';
  }

  contentEl.innerHTML = html;
}

// Skeleton loader for better UX
function showAdminSkeleton() {
  const contentEl = document.getElementById('content');
  contentEl.classList.add('fade-in');
  contentEl.innerHTML = `
     <div class="stats-bar">
         <div class="stat-card"><div class="skeleton-stat"></div></div>
         <div class="stat-card"><div class="skeleton-stat"></div></div>
         <div class="stat-card"><div class="skeleton-stat"></div></div>
       </div>`;
}

async function loadAdminDashboard() {
      // Show skeleton loading state first for better perceived performance
  showAdminSkeleton();
  
  const user = await checkAuth();
  
  if (!user) {
    window.location.href = '/login';
    return;
     }

       // Check if admin
  if (user.role !== 'admin') {
    document.getElementById('content').innerHTML = '<div class="empty-state">Access denied. Admin role required.</div>';
    return;
     }

  try {
    const [clientsRes, projectsRes] = await Promise.all([
      fetch(`${API_BASE}/admin/clients`, { credentials: 'include' }),
      fetch(`${API_BASE}/projects`, { credentials: 'include' })
     ]);

    const clients = await clientsRes.json();
    const projects = await projectsRes.json();

    updateAdminUserNav(user);
    renderAdminDashboard(user, clients.data || clients, Array.isArray(projects) ? projects : (projects?.data ? projects.data : []));

  } catch (err) {
    console.error('Failed to load admin dashboard:', err);
    document.getElementById('content').innerHTML = '<div class="empty-state">Error loading admin dashboard</div>';
  }
}

window.addEventListener('DOMContentLoaded', loadAdminDashboard);
</script>
</body>
</html>
