<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard | MOLIAMA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg-deep:#0B0E14;--bg-room:#1F2937;--border-room:#374151;--accent-blue:#3B82F6;--accent-purple:#8B5CF6;--accent-green:#10B981;--text-primary:#F9FAFB;--text-secondary:#9CA3AF}
body{margin:0;padding:0;background:var(--bg-deep);font-family:'Inter',system-ui,sans-serif;color:var(--text-primary);padding-top:56px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
nav{height:56px;border-bottom:1px solid var(--border-room);display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:rgba(11,14,20,0.8);backdrop-filter:blur(12px);position:fixed;top:0;width:100%;z-index:100;}
nav.logo{font-size:15px;font-weight:700;letter-spacing:0.1em;color:#fff;}
nav a{text-decoration:none;color:var(--text-secondary);font-size:13px;margin-left:20px;}
a.back-btn{color:var(--accent-blue);}
.container{max-width:1400px;margin:56px auto;padding:0 24px;display:grid;gap:36px;}
h1{font-size:32px;font-weight:600;margin-bottom:8px;}
h2{font-size:18px;font-weight:500,color:var(--text-secondary);margin-bottom:16px;}
section{padding:0;}

/* STATS BAR */
.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:24px;}
.stat-card{text-align:center;padding:24px;background:linear-gradient(135deg,rgba(59,130,246,0.05),rgba(139,92,246,0.05));border:1px solid var(--border-room);border-radius:12px;}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-secondary);margin-bottom:8px;}
.stat-value{font-size:28px;font-weight:700;color:var(--accent-blue);}
.positive{color:var(--accent-green);}

/* CLIENT TABLE */
.table-container{background:linear-gradient(135deg,rgba(59,130,246,0.05),rgba(139,92,246,0.05));border:1px solid var(--border-room);border-radius:16px;overflow:hidden;}
.table-header{padding:20px 24px;border-bottom:1px solid var(--border-room);display:flex;justify-content:space-between;align-items:center;}
table{width:100%;border-collapse:collapse;}
th,td{padding:16px;text-align:left;border-bottom:1px solid var(--border-room);}
th{background:rgba(59,130,246,0.08);font-weight:600;color:var(--text-primary);}
tr:hover td{background:rgba(59,130,246,0.05);}

/* CLIENT DETAILS */
.client-name{font-size:15px;font-weight:600;color:var(--text-primary);margin-bottom:4px;}
.client-email{font-size:13px;color:var(--text-secondary);}

/* BADGES */
.status-badge{display:inline-block;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;transition:all 0.2s;}
.status-active{background:rgba(16,185,129,0.1);color:var(--accent-green);border:1px solid rgba(16,185,129,0.3);}
.status-inactive{background:rgba(239,68,68,0.1);color:#EF4444;border:1px solid rgba(239,68,68,0.3);}

/* BUTTONS */
a.view-btn{display:inline-block;padding:6px 14px;border-radius:6px;text-decoration:none;background:rgba(59,130,246,0.1);color:var(--accent-blue);border:1px solid rgba(59,130,246,0.3);font-size:12px;margin-right:8px;transition:all 0.2s;}
a.view-btn:hover{background:rgba(59,130,246,0.2);transform:translateY(-1px);}
.search-input{background:var(--bg-room);border:1px solid var(--border-room);border-radius:8px;padding:8px 16px;color:var(--text-primary);font-size:13px;width:240px;}
.btn{padding:8px 16px;border-radius:6px;background:var(--accent-blue);color:#fff;border:none;cursor:pointer;font-size:13px;margin-right:8px;}
.btn:hover{background:#2563EB;}

/* HEADER BAR */
.header-bar{margin-bottom:24px;display:flex;justify-content:space-between;align-items:center;}
.load-more-btn{padding:10px 20px;background:var(--accent-green);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;margin-left:16px;transition:all 0.3s ease}.load-more-btn:hover{background:#059669;transform:translateY(-2px);box-shadow:0 4px 12px rgba(16,185,129,0.3)}

/* SKELETON LOADING STATES */
.skeleton-card{background:linear-gradient(90deg,var(--bg-room) 25%,var(--border-room) 50%,var(--bg-room) 75%);background-size:200% 100%;animation:skeletonPulseAdmin 1.5s ease-in-out infinite;border-radius:12px}.@keyframes skeletonPulseAdmin{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skeleton-bar{background:linear-gradient(90deg,rgba(59,130,246,0.1) 25%,rgba(139,92,246,0.1) 50%,rgba(59,130,246,0.1) 75%);background-size:200% 100%;animation:skeletonLoad 1.5s ease-in-out infinite;border-radius:8px;height:24px}.@keyframes skeletonLoad{0%{background-position:-200% 0}100%{background-position:200% 0}}

.EMPTY-STATE{padding:48px;text-align:center;color:var(--text-secondary);background:var(--bg-room);border-radius:12px;border:1px dashed var(--border-room)}.empty-state-message{font-size:14px;margin-bottom:16px}.empty-state-icon{font-size:32px;margin-bottom:12px;display:block}

/* ADMIN BANNER */
#impersonation-banner{background:#FFED00;color:#000000;padding:12px;position:sticky;top:56px;z-index:99;text-align:center;font-weight:700;display:none;border-bottom:2px solid #000;animation:bannerPulse 2s ease-in-out infinite;}@keyframes bannerPulse{0%,100%{box-shadow:none}50%{box-shadow:0 4px 16px rgba(255,237,0,0.5)}}

.section-title{font-size:13px;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-secondary);margin-bottom:12px;font-weight:600;}

/* MOBILE - CARD STACK LAYOUT */
@media(max-width:768px){container{margin:48px auto;padding:0 16px;}h1{font-size:24px;}stats-bar{grid-template-columns:1fr;gap:12px;}nav{padding:0 16px}.stats-card{text-align:center;padding:16px;border-radius:12px;background:linear-gradient(135deg,rgba(59,130,246,0.05),rgba(139,92,246,0.05));border:1px solid var(--border-room);}table{display:none;}/* Hide table on mobile */.client-card-stack{display:grid;gap:12px;}.client-card{background:var(--bg-room);border:1px solid var(--border-room);border-radius:12px;padding:16px;animation:slideIn 0.3s ease-out;}@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.client-header{display:grid;gap:4px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border-room);}.client-name-lg{font-size:15px;font-weight:600;color:var(--text-primary);}.client-email-lg{font-size:13px;color:var(--text-secondary);}.status-badge-lg{display:inline-block;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:600;margin-top:6px;}.client-actions-grid{display:grid;gap:8px;}a.client-btn{display:block;padding:10px;border-radius:6px;text-align:center;text-decoration:none;font-size:12px;transition:all 0.2s;}a.client-btn:first-child{background:rgba(59,130,246,0.1);color:var(--accent-blue);border:1px solid rgba(59,130,246,0.3);}.a.client-btn:last-child{background:rgba(139,92,246,0.1);color:var(--accent-purple);border:1px solid rgba(139,92,246,0.3);}client-projects-mobile{display:block;margin-top:12px;padding-top:12px;border-top:1px dashed var(--border-room);font-size:12px;color:var(--text-secondary);}}
/* Add glass effect to stats cards */
.stats-bar .stat-card{backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
/* Enhanced mobile for admin */
@media(max-width:768px){.stat-value{font-size:24px!important;}table{display:none;}.client-header{padding-bottom:16px;}.client-card{margin-bottom:4px;}a.client-btn{margin-bottom:4px;padding:12px 10px!important;font-size:12px!important;}}

</style>

<script>
const token = localStorage.getItem('token');</script><script>

// Redirect if not authenticated
if (!token) {
  window.location.href = '/login.html';
}

async function initAdminAuthCheck() {
      // If we're impersonating, verify admin permissions first
    const impersonateId = new URL(window.location).searchParams.get('impersonate');
    if (impersonateId) {
        const role = localStorage.getItem('user_role');
        if (role !== 'admin') {
            window.location.href = '/dashboard.html'; // Non-admins can't impersonate
         }
     }
}

initAdminAuthCheck();

const url = new URL(window.location);
const impersonateId = url.searchParams.get('impersonate');
const isAdmin = localStorage.getItem('user_role') === 'admin';

// Show impersonation banner if admin is impersonating
async function showImpersonationBanner(client) {
  if (impersonateId && isAdmin) {
    const banner = document.getElementById('impersonation-banner');
    const viewingSpan = document.getElementById('impersonated-name');
    banner.style.display = 'block';
    viewingSpan.textContent = client?.name || 'Client';
    
    const exitLink = document.querySelector('#impersonation-banner a');
    if (exitLink) exitLink.href = window.location.pathname;
   }
}

async function fetchAdminData() {
  try {
    const params = {};
    if (impersonateId) params.impersonate = impersonateId;
    
    const res = await fetch(API_BASE + 'api/admin/clients?' + new URLSearchParams(params), {
      headers: { 'Accept': 'application/json' },
      credentials: 'include'
     });
    
    if (!res.ok) throw new Error('Fetch failed');
    return await res.json();
   } catch (e) {
    console.error('Fetch error:', e);
    return { success: false };
  }
}

async function renderAdminDashboard() {
  const result = await fetchAdminData();
  
  if (!result.success) return;
  
  const client = result.client;
  const clients = result.clients || [];
  const projects = result.projects || [];
  
  // Show impersonation banner if needed
  await showImpersonationBanner(client);
  
  // Update stats bar
  document.getElementById('total-clients').textContent = clients.length.toLocaleString();
  const activeCount = projects.filter(p => p.status === 'active').length;
  document.getElementById('active-projects').textContent = activeCount.toLocaleString();
  const mrr = projects.reduce((sum, p) => sum + (parseFloat(p.monthly_rate) || 0), 0);
  document.getElementById('mrr').textContent = '$' + mrr.toLocaleString();
  
// Render clients - desktop table vs mobile card stack
if (clients && clients.length > 0) {
     // Desktop: table layout
    const isMobile = window.innerWidth <= 768;
    
    if (!isMobile) {
      let html = '<table><thead><tr><th>Name</th><th>Email</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
      
      for (let c of clients) {
        const statusClass = c.status === 'active' ? 'status-active' : 'status-inactive';
        const clientName = c.name || 'Untitled Client';
        
        html += '<tr>' +
            '<td class="client-name">' + clientName + '</td>' +
           `<td class="client-email">${c.email}</td>` +
           '<td><span class="' + statusClass + '">' + (c.status === 'active' ? 'Active' : 'Inactive') + '</span></td>' +
           '<td>';
         
        // Show projects count if any
        const userProjects = projects.filter(p => p.client_id == c.id);
        if (userProjects.length > 0) {
          html += '<div class="client-projects">' + 
                     '<span style="color:var(--text-primary);font-size:12px;">+ ' + userProjects.length + ' project(s)</span></div>';
         }
         
        // View as client button (redirect to dashboard with impersonate param)
        html += `<a href="/dashboard.html?impersonate=${c.id}" class="view-btn">View as Client</a>`;
        html += `<a href="mailto:${c.email}" class="view-btn" style="background:rgba(139,92,246,0.1);color:var(--accent-purple);border-color:rgba(139,92,246,0.3)">✉️ Email</a>`;
        html += '</td></tr>';
       }
       
      html += '</tbody></table>' ;
    } else {
        // Mobile: card stack layout
      let html = '<div class="client-card-stack">';
      
      for (let c of clients) {
        const statusClass = c.status === 'active' ? 'status-active' : 'status-inactive';
        const clientName = c.name || 'Untitled Client';
        
        html += '<div class="client-card">' +
           '<div class="client-header">' +
              '<div class="client-name-lg">' + clientName + '</div>' +
             `<div class="client-email-lg">${c.email}</div>` +
             `<span class="${statusClass} status-badge-lg">${c.status === 'active' ? 'Active' : 'Inactive'}</span>` +
           '</div>' +
           '<div class="client-actions-grid">' +
             `<a href="/dashboard.html?impersonate=${c.id}" class="client-btn">👁 View as ${clientName.split()[0]}</a>` +
             `<a href="mailto:${c.email}" class="client-btn">✉️ Email Client</a>` +
           '</div>' ;
           
           // Show projects mobile
        const userProjects = projects.filter(p => p.client_id == c.id);
        if (userProjects.length > 0) {
          html += `<div class="client-projects-mobile">+ ${userProjects.length} project(s)</div>`;
         }
         
        html += '</div>';
      }
      
      html += '</div>' ;
    }
  } else {
  html = '<div class="empty-state"><p>No clients found.</p></div>' ;
  }
  
document.getElementById('clients-table-wrapper').innerHTML = html;
}

// Initialize on load
document.addEventListener('DOMContentLoaded', () => {
  renderAdminDashboard().catch(e => console.error('Init error:', e));
});

async function handleRefreshDashboard() {
  const wrapper = document.getElementById('clients-table-wrapper');
  if (wrapper) {
    wrapper.innerHTML = '<div class="loading">Refreshing...</div>';
   }
  await renderAdminDashboard();
}

// Add refresh button to navbar if exists
const nav = document.querySelector('nav');
if (nav && isAdmin) {
  const refreshBtn = document.createElement('button');
  refreshBtn.textContent = '🔄 Refresh';
  refreshBtn.style.cssText = 'margin-left:12px;background:transparent;color:var(--accent-blue);border:1px solid var(--border-room);padding:6px 16px;border-radius:4px;font-size:13px;cursor:pointer;';
  refreshBtn.addEventListener('click', handleRefreshDashboard);
  nav.appendChild(refreshBtn);
}
</script>

<link rel="icon" href="/favicon.ico">
</head>
<body>

<nav><div class="logo">MOLIAMA <span style="font-size:11px;color:var(--accent-blue);margin-left:8px;opacity:.6">(ADMIN)</span></div><a href="/" class="back-btn">← Back to Website</a></nav>

<div id="impersonation-banner"><strong id="impersonated-name"></strong> | <a href="/admin.html" style="color:#000;">✕ Exit</a></div>

<div class="container">
   <h1>Admin Dashboard</h1>
   <p style="color:var(--text-secondary);margin-bottom:24px;">Overview of all clients and platform metrics</p>

   <section class="stats-bar">
     <div class="stat-card"><div class="stat-label">Total Clients</div><div class="stat-value" id="total-clients">—</div></div>
     <div class="stat-card"><div class="stat-label">Active Projects</div><div class="stat-value" id="active-projects">—</div></div>
     <div class="stat-card"><div class="stat-label">Monthly Recurring Revenue</div><div class="stat-value" id="mrr">$0</div></div>
   </section>

   <section class="table-container">
     <div class="table-header"><h3>All Clients</h3></div>
     <div id="clients-table-wrapper"><div class="loading">Loading clients...</div></div>
   </section>

</div>


</body>
</html>
