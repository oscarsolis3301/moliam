name = "moliam"
compatibility_date = "2024-12-01"
pages_build_output_dir = "./public"

[[d1_databases]]
binding = "MOLIAM_DB"
database_name = "moliam-db"
database_id = "c0f36156-312c-47c0-846f-249fd56ab8b6"

[assets]
