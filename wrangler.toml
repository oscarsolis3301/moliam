then = { path = "/dashboard.html", status = 200 }

[[redirects]]
for = "/admin"
then = { path = "/admin.html", status = 200 }

[[redirects]]
for = "/portfolio"
then = { path = "/portfolio.html", status = 200 }

[[redirects]]
for = "/book"
then = { path = "/book.html", status = 200 }

[[redirects]]
for = "/hq"
then = { path = "/hq.html", status = 200 }

[[redirects]]
for = "/portal"
then = { path = "/portal.html", status = 200 }
