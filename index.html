<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOLIAM AI Operations HQ</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0B0E14;
    --bg-building: #111827;
    --bg-room: #1F2937;
    --border-room: #374151;
    --accent-blue: #3B82F6;
    --accent-purple: #8B5CF6;
    --accent-green: #10B981;
    --accent-amber: #F59E0B;
    --accent-red: #EF4444;
    --accent-cyan: #06B6D4;
    --text-primary: #F9FAFB;
    --text-secondary: #9CA3AF;
    --text-dim: #6B7280;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg-deep);
    font-family: 'Inter', system-ui, sans-serif;
    overflow: hidden;
    color: var(--text-primary);
    width: 100vw; height: 100vh;
  }
  #hud {
    position: fixed; top: 0; left: 0; right: 0; height: 48px; z-index: 100;
    background: rgba(11,14,20,0.92); border-bottom: 1px solid var(--border-room);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; backdrop-filter: blur(8px);
  }
  #hud .left { display: flex; align-items: center; gap: 10px; }
  #hud .left .title { font-size: 14px; font-weight: 700; letter-spacing: 0.1em; color: var(--text-primary); }
  #hud .left .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-green); animation: pulse-dot 2s infinite; }
  @keyframes pulse-dot { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
  #hud .center { display: flex; gap: 32px; }
  .stat-block { text-align: center; }
  .stat-block .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-dim); }
  .stat-block .value { font-size: 18px; font-weight: 600; color: var(--text-primary); }
  .stat-block .value.red { color: var(--accent-red); }
  .stat-block .value.amber { color: var(--accent-amber); }
  #hud .right { display: flex; align-items: center; gap: 8px; }
  .speed-btn {
    background: transparent; border: 1px solid var(--border-room); color: var(--text-secondary);
    padding: 4px 10px; border-radius: 12px; font-size: 11px; cursor: pointer; font-family: inherit;
  }
  .speed-btn.active { background: var(--accent-blue); color: #fff; border-color: var(--accent-blue); }
  .speed-btn:hover { border-color: var(--text-secondary); }
  .fs-btn {
    background: transparent; border: 1px solid var(--border-room); color: var(--text-secondary);
    padding: 4px 8px; border-radius: 6px; cursor: pointer; font-size: 13px; font-family: inherit;
  }
  .fs-btn:hover { border-color: var(--text-secondary); }
  canvas { display: block; position: fixed; top: 48px; left: 0; }
  .popover {
    position: fixed; z-index: 200; width: 280px; background: #1F2937;
    border: 1px solid var(--border-room); border-radius: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5); padding: 16px; font-size: 12px;
    pointer-events: auto;
  }
  .popover .close-btn {
    position: absolute; top: 8px; right: 10px; background: none; border: none;
    color: var(--text-dim); cursor: pointer; font-size: 16px; font-family: inherit;
  }
  .popover .close-btn:hover { color: var(--text-primary); }
  .popover .bot-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .popover .info-row { display: flex; align-items: center; gap: 6px; margin: 4px 0; color: var(--text-secondary); }
  .popover .info-row .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .popover .log-entry { font-family: 'Inter', monospace; font-size: 10px; color: var(--text-dim); margin: 2px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .popover .log-entry .ts { color: var(--text-secondary); margin-right: 4px; }
  .popover h4 { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-dim); margin: 10px 0 4px; }
  #demo-badge {
    position: fixed; bottom: 12px; right: 16px; z-index: 100;
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--accent-amber); background: rgba(245,158,11,0.1);
    border: 1px solid rgba(245,158,11,0.3); border-radius: 4px; padding: 4px 8px;
  }
</style>
</head>
<body>
<div id="hud">
  <div class="left">
    <div class="status-dot"></div>
    <div class="title">MOLIAM HQ</div>
  </div>
  <div class="center">
    <div class="stat-block"><div class="label">Agents Online</div><div class="value" id="stat-agents">0</div></div>
    <div class="stat-block"><div class="label">Tasks Active</div><div class="value" id="stat-tasks">0</div></div>
    <div class="stat-block"><div class="label">Errors</div><div class="value" id="stat-errors">0</div></div>
    <div class="stat-block"><div class="label">Rate Limited</div><div class="value" id="stat-ratelimited">0</div></div>
  </div>
  <div class="right">
    <button class="speed-btn active" data-speed="1">1x</button>
    <button class="speed-btn" data-speed="2">2x</button>
    <button class="speed-btn" data-speed="5">5x</button>
    <button class="fs-btn" onclick="document.documentElement.requestFullscreen?.()">⛶</button>
  </div>
</div>
<canvas id="c"></canvas>
<div id="demo-badge">⚡ DEMO MODE</div>
<script>
// ═══════════════════════════════════════
// SECTION: Configuration & Constants
// ═══════════════════════════════════════
const COLORS = {
  bgDeep:'#0B0E14', bgBuilding:'#111827', bgRoom:'#1F2937', borderRoom:'#374151',
  accentBlue:'#3B82F6', accentPurple:'#8B5CF6', accentGreen:'#10B981',
  accentAmber:'#F59E0B', accentRed:'#EF4444', accentCyan:'#06B6D4',
  textPrimary:'#F9FAFB', textSecondary:'#9CA3AF', textDim:'#6B7280'
};
const ROOM_DEFS = [
  { id:'engineering', name:'ENGINEERING', floor:2, col:0, accent:COLORS.accentBlue },
  { id:'planning',    name:'PLANNING',    floor:2, col:1, accent:COLORS.accentPurple },
  { id:'comms',       name:'COMMS',       floor:2, col:2, accent:COLORS.accentGreen },
  { id:'data',        name:'DATA',        floor:1, col:0, accent:COLORS.accentAmber },
  { id:'error',       name:'ERROR ROOM',  floor:1, col:1, accent:COLORS.accentRed },
  { id:'ratelimit',   name:'RATE LIMIT LOUNGE', floor:1, col:2, accent:'#9A7B2A' },
];
const BOT_DEFS = [
  { id:'yagami', name:'Yagami', color:'#3B82F6' },
  { id:'ada',    name:'Ada',    color:'#8B5CF6' },
  { id:'soni',   name:'Soni',   color:'#10B981' },
  { id:'willow', name:'Willow', color:'#F59E0B' },
  { id:'reaper', name:'Reaper', color:'#EF4444' },
];
const STATUS_COLORS = {
  active:COLORS.accentGreen, thinking:COLORS.accentPurple, blocked:COLORS.accentRed,
  error:COLORS.accentRed, retrying:COLORS.accentAmber, rate_limited:COLORS.textDim, idle:'#374151'
};
let speedMultiplier = 1;
let now = 0;

// ═══════════════════════════════════════
// SECTION: Canvas Setup
// ═══════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, dpr;
let layout = { rooms: {}, corridor: {} };

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight - 48;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  recalcLayout();
}
function recalcLayout() {
  const margin = 20, gap = 8, corridorH = 40;
  const rw = (W - margin * 2 - gap * 2) / 3;
  const rh = (H - margin * 2 - corridorH) / 2;
  const corridorY = margin + rh;
  layout.corridor = { x: margin, y: corridorY, w: W - margin*2, h: corridorH, midY: corridorY + corridorH/2 };
  ROOM_DEFS.forEach(def => {
    const row = def.floor === 2 ? 0 : 1;
    const x = margin + def.col * (rw + gap);
    const y = row === 0 ? margin : margin + rh + corridorH;
    layout.rooms[def.id] = {
      x, y, w: rw, h: rh, def,
      seats: [
        { x: x + rw*0.2, y: y + rh*0.6 },
        { x: x + rw*0.4, y: y + rh*0.6 },
        { x: x + rw*0.6, y: y + rh*0.6 },
        { x: x + rw*0.8, y: y + rh*0.6 },
      ],
      doorX: x + rw/2,
      doorY: row === 0 ? y + rh : y,
    };
  });
}
window.addEventListener('resize', resize);
resize();

// ═══════════════════════════════════════
// SECTION: State Management
// ═══════════════════════════════════════
const state = {
  bots: {},
  orbs: [],
  orbPool: [],
  roomEffects: {},
  tasks: {},
  globalEvents: [],
};

BOT_DEFS.forEach(def => {
  const startRooms = ['engineering','planning','comms','data','engineering'];
  const rm = startRooms[BOT_DEFS.indexOf(def)];
  const seat = layout.rooms[rm].seats[BOT_DEFS.indexOf(def) % 4];
  state.bots[def.id] = {
    ...def, x: seat.x, y: seat.y, targetX: seat.x, targetY: seat.y,
    room: rm, prevRoom: rm, status: 'idle', task: null, events: [],
    walkPhase: 0, walkTimer: 0, moving: false, path: [],
    breathOffset: Math.random() * Math.PI * 2,
    rateLimitEnd: 0, dimmed: false,
  };
});

ROOM_DEFS.forEach(def => {
  state.roomEffects[def.id] = {
    terminalLines: Array.from({length:8}, () => Math.random()*0.6+0.2),
    terminalScroll: 0, barHeights: [0.3,0.5,0.7,0.4], barTargets: [0.3,0.5,0.7,0.4],
    stickyNotes: [{x:0.2,y:0.3,c:'#FFD700'},{x:0.5,y:0.2,c:'#FF69B4'},{x:0.7,y:0.35,c:'#87CEEB'}],
    stickyOpacity: 1, whiteboardGlow: 0, signalPulse: 0,
    chatLines: Array.from({length:6}, () => Math.random()*0.5+0.2),
    warningPulse: 0, cursorBlink: 0, dbCounter: 0, cooldowns: {},
    apiPackets: [], caution: 0, activeMonitor: -1,
  };
});

// Pre-allocate orb pool
for (let i = 0; i < 10; i++) {
  state.orbPool.push({ active: false, x:0, y:0, sx:0, sy:0, tx:0, ty:0, t:0, dur:600, trail:[] });
}

function getOrbFromPool() {
  let orb = state.orbPool.find(o => !o.active);
  if (!orb) { orb = state.orbPool[0]; }
  orb.active = true; orb.t = 0; orb.trail = [];
  return orb;
}

function addBotEvent(botId, type, desc) {
  const bot = state.bots[botId];
  if (!bot) return;
  const ts = new Date();
  const entry = { time: ts, type, desc, ts: ts.toTimeString().slice(0,8) };
  bot.events.unshift(entry);
  if (bot.events.length > 50) bot.events.length = 50;
  state.globalEvents.unshift({ ...entry, agent: botId });
  if (state.globalEvents.length > 100) state.globalEvents.length = 100;
}

// ═══════════════════════════════════════
// SECTION: Bot Movement & Pathfinding
// ═══════════════════════════════════════
function moveBot(botId, targetRoomId) {
  const bot = state.bots[botId];
  if (!bot || bot.room === targetRoomId) return;
  bot.prevRoom = bot.room;
  const fromRoom = layout.rooms[bot.room];
  const toRoom = layout.rooms[targetRoomId];
  bot.room = targetRoomId;
  // Build path: current pos -> door of current room -> corridor -> door of target room -> seat in target
  const seat = findOpenSeat(targetRoomId, botId);
  const path = [];
  // Step to current room door
  path.push({ x: fromRoom.doorX, y: fromRoom.doorY });
  // Into corridor
  path.push({ x: fromRoom.doorX, y: layout.corridor.midY });
  // Across corridor to target door X
  path.push({ x: toRoom.doorX, y: layout.corridor.midY });
  // To target room door
  path.push({ x: toRoom.doorX, y: toRoom.doorY });
  // To seat
  path.push({ x: seat.x, y: seat.y });
  bot.path = path;
  bot.moving = true;
}

function findOpenSeat(roomId, botId) {
  const room = layout.rooms[roomId];
  const occupied = Object.values(state.bots).filter(b => b.room === roomId && b.id !== botId);
  for (const seat of room.seats) {
    if (!occupied.some(b => Math.abs(b.targetX - seat.x) < 10 && Math.abs(b.targetY - seat.y) < 10)) {
      return seat;
    }
  }
  // If full, offset near door
  return { x: room.doorX + occupied.length * 8, y: room.doorY - 10 };
}

function updateBotMovement(bot, dt) {
  if (!bot.moving || bot.path.length === 0) return;
  const target = bot.path[0];
  const dx = target.x - bot.x;
  const dy = target.y - bot.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const speed = 120 * speedMultiplier;
  if (dist < speed * dt) {
    bot.x = target.x; bot.y = target.y;
    bot.path.shift();
    if (bot.path.length === 0) {
      bot.moving = false;
      bot.targetX = bot.x; bot.targetY = bot.y;
    }
  } else {
    bot.x += (dx/dist) * speed * dt;
    bot.y += (dy/dist) * speed * dt;
  }
  // Walk animation
  bot.walkTimer += dt;
  if (bot.walkTimer > 0.15) { bot.walkTimer = 0; bot.walkPhase = (bot.walkPhase + 1) % 2; }
}

// ═══════════════════════════════════════
// SECTION: Event Simulation Engine
// ═══════════════════════════════════════
const TASK_NAMES = ['Deploy v2.4','Refactor auth','Sync embeddings','Update docs','Build pipeline',
  'Parse logs','Index vectors','Train model','Optimize cache','Audit perms'];
const FILE_NAMES = ['main.ts','agent.py','router.rs','config.yaml','handler.go','index.js'];
const ENDPOINTS = ['/api/v1/chat','/api/v1/embed','/api/v1/search','/api/v1/deploy','/api/v1/status'];
const ERROR_MSGS = ['Timeout connecting to upstream','Rate exceeded on /embed','OOM in worker-3',
  'Schema validation failed','Connection reset by peer'];

const DEMO_SEQUENCE = [
  { type:'task_start', agent:'yagami', target_room:'planning', payload:{task_name:'Deploy v2.4'} },
  { type:'thinking', agent:'yagami', target_room:'planning', payload:{} },
  { type:'message_send', agent:'ada', target_room:'comms', payload:{recipient:'yagami'} },
  { type:'code_write', agent:'yagami', target_room:'engineering', payload:{file_name:'main.ts'} },
  { type:'db_operation', agent:'ada', target_room:'data', payload:{} },
  { type:'task_start', agent:'soni', target_room:'planning', payload:{task_name:'Sync embeddings'} },
  { type:'api_call', agent:'yagami', target_room:'engineering', payload:{endpoint:'/api/v1/deploy'} },
  { type:'thinking', agent:'soni', target_room:'planning', payload:{} },
  { type:'rate_limit_start', agent:'willow', target_room:'ratelimit', payload:{duration_ms:15000} },
  { type:'code_write', agent:'soni', target_room:'engineering', payload:{file_name:'agent.py'} },
  { type:'error', agent:'reaper', target_room:'error', payload:{error_message:'Connection reset by peer'} },
  { type:'message_send', agent:'soni', target_room:'comms', payload:{recipient:'ada'} },
  { type:'task_complete', agent:'yagami', target_room:'engineering', payload:{task_name:'Deploy v2.4'} },
  { type:'db_operation', agent:'soni', target_room:'data', payload:{} },
  { type:'rate_limit_end', agent:'willow', target_room:'engineering', payload:{} },
  { type:'task_start', agent:'ada', target_room:'planning', payload:{task_name:'Refactor auth'} },
  { type:'idle', agent:'reaper', target_room:'error', payload:{} },
  { type:'message_send', agent:'willow', target_room:'comms', payload:{recipient:'soni'} },
  { type:'api_call', agent:'ada', target_room:'engineering', payload:{endpoint:'/api/v1/chat'} },
  { type:'task_complete', agent:'soni', target_room:'data', payload:{task_name:'Sync embeddings'} },
];

class SimulatedEventSource {
  constructor() {
    this.demoIndex = 0;
    this.nextEventTime = 1500;
    this.elapsed = 0;
    this.handlers = [];
    this.inDemoLoop = true;
  }
  on(fn) { this.handlers.push(fn); }
  emit(evt) { this.handlers.forEach(fn => fn(evt)); }
  update(dt) {
    this.elapsed += dt * 1000 * speedMultiplier;
    if (this.elapsed >= this.nextEventTime) {
      this.elapsed = 0;
      this.nextEventTime = 2000 + Math.random() * 6000;
      if (this.inDemoLoop) {
        const template = DEMO_SEQUENCE[this.demoIndex];
        this.demoIndex++;
        if (this.demoIndex >= DEMO_SEQUENCE.length) { this.demoIndex = 0; }
        this.emit({ ...template, timestamp: Date.now() });
      } else {
        this.emitRandom();
      }
    }
  }
  emitRandom() {
    const types = ['task_start','code_write','api_call','db_operation','message_send','thinking','idle','error','rate_limit_start'];
    const type = types[Math.floor(Math.random()*types.length)];
    const agent = BOT_DEFS[Math.floor(Math.random()*BOT_DEFS.length)].id;
    const roomMap = { task_start:'planning', code_write:'engineering', api_call:'engineering',
      db_operation:'data', message_send:'comms', error:'error', rate_limit_start:'ratelimit',
      thinking:null, idle:null };
    const target_room = roomMap[type] || state.bots[agent]?.room || 'engineering';
    const payload = {};
    if (type === 'task_start') payload.task_name = TASK_NAMES[Math.floor(Math.random()*TASK_NAMES.length)];
    if (type === 'code_write') payload.file_name = FILE_NAMES[Math.floor(Math.random()*FILE_NAMES.length)];
    if (type === 'api_call') payload.endpoint = ENDPOINTS[Math.floor(Math.random()*ENDPOINTS.length)];
    if (type === 'error') payload.error_message = ERROR_MSGS[Math.floor(Math.random()*ERROR_MSGS.length)];
    if (type === 'message_send') {
      const others = BOT_DEFS.filter(b => b.id !== agent);
      payload.recipient = others[Math.floor(Math.random()*others.length)].id;
    }
    if (type === 'rate_limit_start') payload.duration_ms = 10000 + Math.random()*20000;
    this.emit({ type, agent, target_room, payload, timestamp: Date.now() });
  }
}
const eventSource = new SimulatedEventSource();

// ═══════════════════════════════════════
// SECTION: Event Handler (Event → Visual)
// ═══════════════════════════════════════
eventSource.on(evt => {
  const bot = state.bots[evt.agent];
  if (!bot) return;
  const effects = state.roomEffects;
  switch (evt.type) {
    case 'task_start':
      bot.status = 'active'; bot.task = evt.payload.task_name || 'Task';
      moveBot(evt.agent, evt.target_room);
      effects[evt.target_room].stickyNotes.push({
        x: 0.15 + Math.random()*0.6, y: 0.15 + Math.random()*0.3,
        c: ['#FFD700','#FF69B4','#87CEEB','#98FB98'][Math.floor(Math.random()*4)],
        born: now
      });
      addBotEvent(evt.agent, evt.type, `Started: ${bot.task}`);
      break;
    case 'task_complete':
      bot.status = 'idle'; bot.task = null; bot.completeMark = now;
      const sn = effects[bot.room].stickyNotes;
      if (sn.length > 3) sn.pop();
      addBotEvent(evt.agent, evt.type, `Completed task`);
      break;
    case 'code_write':
      bot.status = 'active'; bot.task = `Writing ${evt.payload.file_name || 'code'}`;
      moveBot(evt.agent, 'engineering');
      effects.engineering.activeMonitor = Math.floor(Math.random()*3);
      effects.engineering.cursorBlink = now;
      addBotEvent(evt.agent, evt.type, `Writing ${evt.payload.file_name}`);
      break;
    case 'api_call':
      bot.status = 'active'; bot.task = `API: ${evt.payload.endpoint || '/api'}`;
      moveBot(evt.agent, 'engineering');
      effects.engineering.apiPackets.push({ x: 0, t: now, dur: 1000 });
      addBotEvent(evt.agent, evt.type, `Called ${evt.payload.endpoint}`);
      break;
    case 'db_operation':
      bot.status = 'active'; bot.task = 'DB operation';
      moveBot(evt.agent, 'data');
      effects.data.barTargets = effects.data.barTargets.map(() => 0.2 + Math.random()*0.8);
      effects.data.dbCounter++;
      addBotEvent(evt.agent, evt.type, 'Database operation');
      break;
    case 'message_send':
      bot.status = 'active';
      moveBot(evt.agent, 'comms');
      effects.comms.signalPulse = now;
      if (evt.payload.recipient && state.bots[evt.payload.recipient]) {
        const recv = state.bots[evt.payload.recipient];
        const orb = getOrbFromPool();
        orb.sx = bot.x; orb.sy = bot.y - 20;
        orb.tx = recv.x; orb.ty = recv.y - 20;
        const sameRoom = bot.room === recv.room;
        orb.dur = sameRoom ? 300 : 600;
        orb.t = 0;
      }
      addBotEvent(evt.agent, evt.type, `Message → ${evt.payload.recipient}`);
      break;
    case 'error':
      bot.status = 'error'; bot.task = evt.payload.error_message || 'Error';
      moveBot(evt.agent, 'error');
      effects.error.warningPulse = now;
      addBotEvent(evt.agent, evt.type, evt.payload.error_message || 'Error occurred');
      break;
    case 'rate_limit_start':
      bot.status = 'rate_limited'; bot.dimmed = true;
      bot.rateLimitEnd = now + (evt.payload.duration_ms || 15000) / 1000;
      moveBot(evt.agent, 'ratelimit');
      addBotEvent(evt.agent, evt.type, 'Rate limited');
      break;
    case 'rate_limit_end':
      bot.status = 'active'; bot.dimmed = false;
      moveBot(evt.agent, bot.prevRoom || 'engineering');
      addBotEvent(evt.agent, evt.type, 'Rate limit cleared');
      break;
    case 'thinking':
      bot.status = 'thinking';
      addBotEvent(evt.agent, evt.type, 'Thinking...');
      break;
    case 'idle':
      bot.status = 'idle'; bot.task = null;
      addBotEvent(evt.agent, evt.type, 'Idle');
      break;
  }
});

// ═══════════════════════════════════════
// SECTION: Room Renderer
// ═══════════════════════════════════════
function drawBuilding() {
  // Building bg
  ctx.fillStyle = COLORS.bgBuilding;
  ctx.fillRect(layout.corridor.x - 4, 16, layout.corridor.w + 8, H - 32);
  // Corridor
  const c = layout.corridor;
  ctx.fillStyle = '#0D1117';
  ctx.fillRect(c.x, c.y, c.w, c.h);
  ctx.setLineDash([8, 6]);
  ctx.strokeStyle = '#2A2F3A';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(c.x + 10, c.midY); ctx.lineTo(c.x + c.w - 10, c.midY); ctx.stroke();
  ctx.setLineDash([]);
}

function drawRoom(roomId) {
  const r = layout.rooms[roomId];
  const ef = state.roomEffects[roomId];
  // Room bg
  ctx.fillStyle = COLORS.bgRoom;
  roundRect(ctx, r.x, r.y, r.w, r.h, 3);
  ctx.fill();
  // Border
  ctx.strokeStyle = COLORS.borderRoom;
  ctx.lineWidth = 1;
  roundRect(ctx, r.x, r.y, r.w, r.h, 3);
  ctx.stroke();
  // Accent top line
  ctx.strokeStyle = r.def.accent;
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(r.x + 3, r.y); ctx.lineTo(r.x + r.w - 3, r.y); ctx.stroke();
  ctx.lineWidth = 1;
  // Room title
  ctx.font = '13px Inter, system-ui';
  ctx.fillStyle = COLORS.textSecondary;
  ctx.textAlign = 'center';
  ctx.letterSpacing = '0.08em';
  ctx.fillText(r.def.name, r.x + r.w/2, r.y + 18);
  ctx.letterSpacing = '0em';
  // Interior details
  const pad = 12;
  switch (roomId) {
    case 'engineering': drawEngineering(r, ef, pad); break;
    case 'planning': drawPlanning(r, ef, pad); break;
    case 'comms': drawComms(r, ef, pad); break;
    case 'data': drawData(r, ef, pad); break;
    case 'error': drawErrorRoom(r, ef, pad); break;
    case 'ratelimit': drawRateLimit(r, ef, pad); break;
  }
}

function drawEngineering(r, ef, pad) {
  // Monitors
  for (let i = 0; i < 3; i++) {
    const mx = r.x + pad + i * (r.w - pad*2) / 3;
    const my = r.y + 28;
    const mw = Math.min(24, (r.w - pad*3) / 4);
    const mh = 16;
    ctx.fillStyle = '#0F1623';
    ctx.fillRect(mx, my, mw, mh);
    ctx.strokeStyle = i === ef.activeMonitor ? COLORS.accentBlue : '#2A3444';
    ctx.strokeRect(mx, my, mw, mh);
    // Blinking cursor on active monitor
    if (i === ef.activeMonitor && ef.cursorBlink > 0) {
      if (Math.floor(now * 2) % 2 === 0) {
        ctx.fillStyle = COLORS.accentBlue;
        ctx.fillRect(mx + mw - 6, my + mh - 5, 1, 4);
      }
    }
  }
  // Terminal
  const tx = r.x + pad;
  const ty = r.y + r.h - 36;
  const tw = r.w - pad*2;
  const th = 24;
  ctx.fillStyle = '#0A0F18';
  ctx.fillRect(tx, ty, tw, th);
  ctx.strokeStyle = '#1A2A1A';
  ctx.strokeRect(tx, ty, tw, th);
  // Scrolling lines
  ef.terminalScroll = (ef.terminalScroll + 0.3) % 20;
  for (let i = 0; i < 6; i++) {
    const ly = ty + 3 + i * 3.5 - (ef.terminalScroll % 3.5);
    if (ly > ty && ly < ty + th - 2) {
      ctx.fillStyle = `rgba(16,185,129,${0.3 + ef.terminalLines[i%8]*0.4})`;
      ctx.fillRect(tx + 3, ly, tw * ef.terminalLines[i%8] * 0.7, 1);
    }
  }
  // API packets
  ef.apiPackets = ef.apiPackets.filter(p => now - p.t < p.dur / 1000);
  ef.apiPackets.forEach(p => {
    const progress = (now - p.t) / (p.dur / 1000);
    const px = r.x + r.w * progress;
    ctx.strokeStyle = `rgba(59,130,246,${1 - progress})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(px, r.y + r.h / 2);
    ctx.lineTo(px + 15, r.y + r.h / 2);
    ctx.stroke();
    ctx.lineWidth = 1;
  });
}

function drawPlanning(r, ef, pad) {
  // Whiteboard
  const wx = r.x + pad;
  const wy = r.y + 26;
  const ww = r.w - pad*2;
  const wh = r.h * 0.3;
  ctx.fillStyle = `rgba(255,255,255,${0.06 + ef.whiteboardGlow * 0.04})`;
  ctx.fillRect(wx, wy, ww, wh);
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.strokeRect(wx, wy, ww, wh);
  // Glow
  if (ef.whiteboardGlow > 0) {
    ctx.shadowColor = COLORS.accentPurple;
    ctx.shadowBlur = 8 * ef.whiteboardGlow;
    ctx.strokeRect(wx, wy, ww, wh);
    ctx.shadowBlur = 0;
  }
  // Sticky notes
  ef.stickyNotes.forEach(s => {
    const sx = wx + s.x * ww;
    const sy = wy + s.y * wh;
    let opacity = 1;
    if (s.born && now - s.born < 0.2) opacity = (now - s.born) / 0.2;
    ctx.globalAlpha = opacity * 0.8;
    ctx.fillStyle = s.c;
    ctx.fillRect(sx, sy, 7, 7);
    ctx.globalAlpha = 1;
  });
  ef.whiteboardGlow *= 0.97;
}

function drawComms(r, ef, pad) {
  // Antenna
  const ax = r.x + r.w / 2;
  const ay = r.y + 26;
  ctx.strokeStyle = COLORS.accentGreen;
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(ax, ay + 12); ctx.lineTo(ax, ay); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ax - 8, ay + 12); ctx.lineTo(ax, ay); ctx.lineTo(ax + 8, ay + 12); ctx.stroke();
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(ax, ay, 3, 0, Math.PI * 2); ctx.fillStyle = COLORS.accentGreen; ctx.fill();
  // Signal waves
  const signalActive = ef.signalPulse > 0 && now - ef.signalPulse < 2;
  const basePulse = Math.sin(now * 2) * 0.3 + 0.5;
  for (let i = 1; i <= 3; i++) {
    const op = signalActive ? (0.6 - i * 0.15) : (basePulse * 0.2 - i * 0.04);
    if (op > 0) {
      ctx.strokeStyle = `rgba(16,185,129,${op})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(ax, ay, 8 + i * 7, -Math.PI * 0.6, -Math.PI * 0.4);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(ax, ay, 8 + i * 7, Math.PI * 0.4, Math.PI * 0.6);
      ctx.stroke();
    }
  }
  // Chat log
  const tx = r.x + pad;
  const ty = r.y + r.h - 36;
  const tw = r.w - pad*2;
  const th = 24;
  ctx.fillStyle = '#0A1812';
  ctx.fillRect(tx, ty, tw, th);
  for (let i = 0; i < 5; i++) {
    const ly = ty + 3 + i * 4;
    if (ly < ty + th - 2) {
      ctx.fillStyle = `rgba(16,185,129,${0.2 + ef.chatLines[i%6]*0.3})`;
      ctx.fillRect(tx + 3, ly, tw * ef.chatLines[i%6] * 0.6, 1);
    }
  }
}

function drawData(r, ef, pad) {
  // Bar chart
  const bx = r.x + pad + 10;
  const by = r.y + r.h - 14;
  const bw = (r.w - pad*2 - 30) / 4;
  const maxH = r.h * 0.45;
  for (let i = 0; i < 4; i++) {
    ef.barHeights[i] += (ef.barTargets[i] - ef.barHeights[i]) * 0.03;
    const bh = ef.barHeights[i] * maxH;
    ctx.fillStyle = `rgba(245,158,11,${0.5 + ef.barHeights[i]*0.5})`;
    ctx.fillRect(bx + i * (bw + 4), by - bh, bw, bh);
  }
  // DB icon
  const dx = r.x + r.w - pad - 16;
  const dy = r.y + 30;
  ctx.fillStyle = COLORS.accentAmber;
  ctx.beginPath(); ctx.ellipse(dx + 8, dy, 8, 4, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(245,158,11,0.6)';
  ctx.fillRect(dx, dy, 16, 14);
  ctx.fillStyle = COLORS.accentAmber;
  ctx.beginPath(); ctx.ellipse(dx + 8, dy + 14, 8, 4, 0, 0, Math.PI * 2); ctx.fill();
  // Counter
  ctx.font = '9px Inter';
  ctx.fillStyle = COLORS.textDim;
  ctx.textAlign = 'center';
  ctx.fillText(`${ef.dbCounter}`, dx + 8, dy + 26);
}

function drawErrorRoom(r, ef, pad) {
  // Caution stripes
  const stripeY = r.y + r.h - 10;
  ctx.save();
  ctx.beginPath();
  ctx.rect(r.x + 2, stripeY, r.w - 4, 8);
  ctx.clip();
  for (let i = -4; i < r.w / 4 + 4; i++) {
    const sx = r.x + i * 8 + (now * 10 % 8);
    ctx.fillStyle = i % 2 === 0 ? 'rgba(239,68,68,0.3)' : 'rgba(20,20,30,0.3)';
    ctx.save();
    ctx.translate(sx, stripeY);
    ctx.transform(1, 0, 0.5, 1, 0, 0);
    ctx.fillRect(0, 0, 4, 8);
    ctx.restore();
  }
  ctx.restore();
  // Warning triangle
  const warningActive = ef.warningPulse > 0 && now - ef.warningPulse < 5;
  const anyBotHere = Object.values(state.bots).some(b => b.room === 'error' && !b.moving);
  const pulseOp = (warningActive || anyBotHere) ? 0.4 + Math.sin(now * Math.PI * 2) * 0.3 : 0.2;
  const tx = r.x + r.w / 2;
  const ty = r.y + 34;
  ctx.fillStyle = `rgba(239,68,68,${pulseOp})`;
  ctx.beginPath();
  ctx.moveTo(tx, ty); ctx.lineTo(tx - 10, ty + 16); ctx.lineTo(tx + 10, ty + 16);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = COLORS.bgRoom;
  ctx.font = 'bold 10px Inter';
  ctx.textAlign = 'center';
  ctx.fillText('!', tx, ty + 14);
  // Stack trace lines
  const lx = r.x + pad;
  const ly = r.y + 56;
  for (let i = 0; i < 5; i++) {
    const lineY = ly + i * 4 - ((now * 8) % 4);
    if (lineY > r.y + 50 && lineY < r.y + r.h - 16) {
      const lw = 15 + ((i * 17 + 7) % 30);
      ctx.fillStyle = 'rgba(239,68,68,0.15)';
      ctx.fillRect(lx, lineY, lw, 1);
    }
  }
}

function drawRateLimit(r, ef, pad) {
  // Couch
  const cx = r.x + pad + 5;
  const cy = r.y + r.h - 24;
  const cw = r.w * 0.45;
  const ch = 12;
  ctx.fillStyle = '#2A2520';
  roundRect(ctx, cx, cy, cw, ch, 4); ctx.fill();
  ctx.fillStyle = '#352F28';
  roundRect(ctx, cx, cy - 6, cw, 8, 3); ctx.fill();
  // Bookshelf
  const bx = r.x + r.w - pad - 14;
  const by = r.y + 28;
  for (let i = 0; i < 4; i++) {
    ctx.fillStyle = ['#3B3226','#2A3B30','#2B2A3B','#3B2A2A'][i];
    ctx.fillRect(bx, by + i * 10, 12, 8);
  }
  ctx.strokeStyle = '#4A4030';
  ctx.strokeRect(bx - 1, by - 1, 14, 42);
  // Coffee cup
  const cupX = r.x + r.w * 0.6;
  const cupY = r.y + r.h - 22;
  ctx.fillStyle = '#6B5B4A';
  ctx.fillRect(cupX, cupY, 6, 8);
  ctx.strokeStyle = '#6B5B4A';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(cupX + 6, cupY + 3, 3, -Math.PI/2, Math.PI/2); ctx.stroke();
  // Cooldown timers for rate-limited bots in this room
  Object.values(state.bots).forEach(bot => {
    if (bot.status === 'rate_limited' && bot.room === 'ratelimit' && !bot.moving) {
      const remain = Math.max(0, bot.rateLimitEnd - now);
      const total = 15; // approx
      const frac = Math.min(1, remain / total);
      ctx.strokeStyle = COLORS.accentAmber;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(bot.x, bot.y - 30, 8, -Math.PI/2, -Math.PI/2 + Math.PI*2*(1-frac));
      ctx.stroke();
      ctx.lineWidth = 1;
      // Zzz dots
      for (let i = 0; i < 3; i++) {
        const dy = -35 - i * 6 - (now * 8 % 6);
        const op = 0.4 - i * 0.12;
        if (op > 0) {
          ctx.fillStyle = `rgba(156,163,175,${op})`;
          ctx.font = '7px Inter';
          ctx.textAlign = 'center';
          ctx.fillText('z', bot.x + 8 + i * 3, bot.y + dy);
        }
      }
    }
  });
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ═══════════════════════════════════════
// SECTION: Bot Renderer & Animation
// ═══════════════════════════════════════
function drawBot(bot) {
  const x = bot.x;
  const breath = Math.sin(now * 1.5 + bot.breathOffset) * 1;
  const y = bot.y + (bot.status === 'idle' ? breath : 0);
  const dimAlpha = bot.dimmed ? 0.6 : 1;
  ctx.globalAlpha = dimAlpha;
  // Thinking glow
  if (bot.status === 'thinking') {
    const glowOp = 0.15 + Math.sin(now * 4) * 0.1;
    ctx.fillStyle = `rgba(139,92,246,${glowOp})`;
    ctx.beginPath(); ctx.arc(x, y - 28, 14, 0, Math.PI * 2); ctx.fill();
  }
  // Head
  ctx.fillStyle = bot.color;
  roundRect(ctx, x - 6, y - 32, 12, 12, 2); ctx.fill();
  // Body (slightly darker)
  ctx.fillStyle = darkenColor(bot.color, 0.7);
  roundRect(ctx, x - 8, y - 20, 16, 18, 2); ctx.fill();
  // Legs
  const legAnim = bot.moving ? (bot.walkPhase === 0 ? 2 : -2) : 0;
  ctx.fillStyle = darkenColor(bot.color, 0.5);
  ctx.fillRect(x - 5, y - 2, 4, 8 + legAnim);
  ctx.fillRect(x + 1, y - 2, 4, 8 - legAnim);
  // Status dot
  const dotColor = STATUS_COLORS[bot.status] || '#374151';
  ctx.fillStyle = dotColor;
  ctx.beginPath(); ctx.arc(x + 8, y - 32, 3, 0, Math.PI * 2); ctx.fill();
  // Blocked/error exclamation
  if (bot.status === 'blocked' || bot.status === 'error') {
    const shake = Math.sin(now * 20) * 2;
    ctx.fillStyle = COLORS.accentRed;
    ctx.font = 'bold 12px Inter';
    ctx.textAlign = 'center';
    ctx.fillText('!', x + shake, y - 38);
  }
  // Retrying spinner
  if (bot.status === 'retrying') {
    ctx.save();
    ctx.translate(x, y - 38);
    ctx.rotate(now * 6);
    ctx.strokeStyle = COLORS.accentAmber;
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI * 1.5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(3, -3); ctx.lineTo(4, 0); ctx.lineTo(1, -1); ctx.stroke();
    ctx.restore();
  }
  // Completion checkmark
  if (bot.completeMark && now - bot.completeMark < 0.8) {
    const op = 1 - (now - bot.completeMark) / 0.8;
    ctx.strokeStyle = `rgba(16,185,129,${op})`;
    ctx.lineWidth = 2;
    const cy = y - 38 - (1 - op) * 8;
    ctx.beginPath();
    ctx.moveTo(x - 4, cy); ctx.lineTo(x - 1, cy + 4); ctx.lineTo(x + 5, cy - 3);
    ctx.stroke();
    ctx.lineWidth = 1;
  }
  // Name
  ctx.font = '10px Inter, system-ui';
  ctx.fillStyle = COLORS.textPrimary;
  ctx.textAlign = 'center';
  ctx.fillText(bot.name, x, y + 16);
  ctx.globalAlpha = 1;
}

function darkenColor(hex, factor) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgb(${Math.floor(r*factor)},${Math.floor(g*factor)},${Math.floor(b*factor)})`;
}

// ═══════════════════════════════════════
// SECTION: Communication Visualizer
// ═══════════════════════════════════════
function updateOrbs(dt) {
  state.orbPool.forEach(orb => {
    if (!orb.active) return;
    orb.t += dt * 1000 * speedMultiplier;
    if (orb.t >= orb.dur + 200) { orb.active = false; return; }
    const progress = Math.min(1, orb.t / orb.dur);
    // Ease in-out
    const ease = progress < 0.5 ? 2*progress*progress : 1 - Math.pow(-2*progress+2,2)/2;
    // Bezier
    const midX = (orb.sx + orb.tx) / 2;
    const midY = Math.min(orb.sy, orb.ty) - 40;
    const t = ease;
    orb.x = (1-t)*(1-t)*orb.sx + 2*(1-t)*t*midX + t*t*orb.tx;
    orb.y = (1-t)*(1-t)*orb.sy + 2*(1-t)*t*midY + t*t*orb.ty;
    orb.trail.push({ x: orb.x, y: orb.y, t: orb.t });
    if (orb.trail.length > 20) orb.trail.shift();
  });
}

function drawOrbs() {
  state.orbPool.forEach(orb => {
    if (!orb.active) return;
    const progress = orb.t / orb.dur;
    // Trail
    if (orb.trail.length > 1) {
      for (let i = 1; i < orb.trail.length; i++) {
        const op = (i / orb.trail.length) * 0.3;
        ctx.strokeStyle = `rgba(6,182,212,${op})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(orb.trail[i-1].x, orb.trail[i-1].y);
        ctx.lineTo(orb.trail[i].x, orb.trail[i].y);
        ctx.stroke();
      }
    }
    if (progress <= 1) {
      // Orb
      const size = 6;
      ctx.fillStyle = `rgba(6,182,212,0.8)`;
      ctx.shadowColor = COLORS.accentCyan;
      ctx.shadowBlur = 8;
      ctx.beginPath(); ctx.arc(orb.x, orb.y, size, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
    } else {
      // Arrival flash
      const flashProgress = (orb.t - orb.dur) / 200;
      const size = 6 + flashProgress * 4;
      const op = 0.8 * (1 - flashProgress);
      ctx.fillStyle = `rgba(6,182,212,${op})`;
      ctx.beginPath(); ctx.arc(orb.tx, orb.ty, size, 0, Math.PI * 2); ctx.fill();
    }
  });
}

// SECTION: HUD Controller
// ═══════════════════════════════════════
let lastHudUpdate = 0;
function updateHUD() {
  if (now - lastHudUpdate < 1) return;
  lastHudUpdate = now;
  const bots = Object.values(state.bots);
  const online = bots.filter(b => b.status !== 'idle').length;
  const tasks = bots.filter(b => b.task).length;
  const errors = bots.filter(b => b.status === 'error').length;
  const rateLimited = bots.filter(b => b.status === 'rate_limited').length;
  const elA = document.getElementById('stat-agents');
  const elT = document.getElementById('stat-tasks');
  const elE = document.getElementById('stat-errors');
  const elR = document.getElementById('stat-ratelimited');
  elA.textContent = online;
  elT.textContent = tasks;
  elE.textContent = errors;
  elE.className = 'value' + (errors > 0 ? ' red' : '');
  elR.textContent = rateLimited;
  elR.className = 'value' + (rateLimited > 0 ? ' amber' : '');
}

// Speed buttons
document.querySelectorAll('.speed-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    speedMultiplier = parseInt(btn.dataset.speed);
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// ═══════════════════════════════════════
// SECTION: Interaction / Click Handling
// ═══════════════════════════════════════
let activePopover = null;

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  closePopover();
  // Check bots first
  for (const bot of Object.values(state.bots)) {
    if (mx > bot.x - 12 && mx < bot.x + 12 && my > bot.y - 35 && my < bot.y + 15) {
      showBotPopover(bot, e.clientX, e.clientY);
      return;
    }
  }
  // Check rooms
  for (const [rid, r] of Object.entries(layout.rooms)) {
    if (mx > r.x && mx < r.x + r.w && my > r.y && my < r.y + r.h) {
      showRoomPopover(rid, e.clientX, e.clientY);
      return;
    }
  }
});

document.addEventListener('click', e => {
  if (activePopover && !activePopover.contains(e.target) && e.target !== canvas) {
    closePopover();
  }
});

function closePopover() {
  if (activePopover) { activePopover.remove(); activePopover = null; }
}

function showBotPopover(bot, px, py) {
  const div = document.createElement('div');
  div.className = 'popover';
  const statusColor = STATUS_COLORS[bot.status] || '#374151';
  let eventsHtml = '';
  bot.events.slice(0, 5).forEach(ev => {
    eventsHtml += `<div class="log-entry"><span class="ts">${ev.ts}</span>${ev.type} — ${ev.desc}</div>`;
  });
  div.innerHTML = `
    <button class="close-btn" onclick="this.parentElement.remove()">✕</button>
    <div class="bot-name" style="color:${bot.color}">${bot.name}</div>
    <div class="info-row"><span class="dot" style="background:${statusColor}"></span>${bot.status}</div>
    <div class="info-row">Room: ${bot.room}</div>
    <div class="info-row">Task: ${bot.task || 'Idle'}</div>
    <h4>Recent Activity</h4>
    ${eventsHtml || '<div class="log-entry">No recent activity</div>'}
  `;
  positionPopover(div, px, py);
  document.body.appendChild(div);
  activePopover = div;
}

function showRoomPopover(roomId, px, py) {
  const r = layout.rooms[roomId];
  const div = document.createElement('div');
  div.className = 'popover';
  const botsHere = Object.values(state.bots).filter(b => b.room === roomId);
  let botsList = botsHere.map(b => {
    const sc = STATUS_COLORS[b.status] || '#374151';
    return `<div class="info-row"><span class="dot" style="background:${sc}"></span>${b.name} (${b.status})</div>`;
  }).join('');
  // Events in this room (last 60s)
  const recentEvents = state.globalEvents.filter(ev => {
    const bot = state.bots[ev.agent];
    return bot && bot.room === roomId;
  }).slice(0, 5);
  let eventsHtml = recentEvents.map(ev =>
    `<div class="log-entry"><span class="ts">${ev.ts}</span>${ev.type} — ${ev.desc}</div>`
  ).join('');
  div.innerHTML = `
    <button class="close-btn" onclick="this.parentElement.remove()">✕</button>
    <div class="bot-name" style="color:${r.def.accent}">${r.def.name}</div>
    <h4>Bots Here (${botsHere.length})</h4>
    ${botsList || '<div class="info-row">Empty</div>'}
    <h4>Recent Activity</h4>
    ${eventsHtml || '<div class="log-entry">No recent activity</div>'}
  `;
  positionPopover(div, px, py);
  document.body.appendChild(div);
  activePopover = div;
}

function positionPopover(div, px, py) {
  let left = px + 12;
  let top = py - 20;
  if (left + 290 > W) left = px - 292;
  if (top + 200 > H + 48) top = H + 48 - 220;
  if (top < 52) top = 52;
  div.style.left = left + 'px';
  div.style.top = top + 'px';
}

// ═══════════════════════════════════════
// SECTION: Main Loop
// ═══════════════════════════════════════
let lastTime = 0;

function frame(timestamp) {
  const dt = lastTime ? Math.min((timestamp - lastTime) / 1000, 0.1) : 0.016;
  lastTime = timestamp;
  now += dt * speedMultiplier;

  // Update
  eventSource.update(dt);
  Object.values(state.bots).forEach(bot => {
    updateBotMovement(bot, dt * speedMultiplier);
    // Auto-clear rate limit
    if (bot.status === 'rate_limited' && now > bot.rateLimitEnd) {
      eventSource.emit({ type:'rate_limit_end', agent:bot.id, target_room:bot.prevRoom || 'engineering', payload:{}, timestamp:Date.now() });
    }
  });
  updateOrbs(dt);
  updateHUD();
  // Ambient room effects
  state.roomEffects.data.barTargets.forEach((t, i) => {
    if (Math.random() < 0.005) state.roomEffects.data.barTargets[i] = 0.15 + Math.random() * 0.85;
  });
  state.roomEffects.comms.chatLines = state.roomEffects.comms.chatLines.map(l =>
    l + (Math.random() - 0.5) * 0.01
  );
  // Planning whiteboard glow when bot is thinking in planning
  if (Object.values(state.bots).some(b => b.room === 'planning' && b.status === 'thinking')) {
    state.roomEffects.planning.whiteboardGlow = 1;
  }

  // Draw
  ctx.clearRect(0, 0, W, H);
  drawBuilding();
  ROOM_DEFS.forEach(def => drawRoom(def.id));
  Object.values(state.bots).forEach(bot => drawBot(bot));
  drawOrbs();

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
