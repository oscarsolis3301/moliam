<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOLIAMA — AI Operations HQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="/css/main.css">
<script src="/js/optimization-core.js"></script>
<script src="/js/hero-interactions.js"></script>
<script src="/extensions/lead-capture-widget.js"></script>
<script src="js/error-handling.js"></script>
<script src="/js/a11y-enhancements.js"></script>
</head>

<div id="a11y-live-region" aria-live="assertive" aria-atomic="true"></div>
<div id="notification-area"></div>
<body>

<canvas id="canvas"></canvas>

<div id="hud">
  <div class="hud-section"><span class="label">Online </span><span class="value" id="s-online">0</span></div>
  <div class="hud-section"><span class="label">Tasks </span><span class="value" id="s-tasks">0</span></div>
  <div class="hud-section"><span class="label">Errors </span><span class="value error" id="s-errors">0</span></div>
  <div class="hud-section"><span class="label">Rate Limit </span><span class="value amber" id="s-rate">0</span></div>
  <div class="hd-speed-btn-group"><button data-speed="1" class="speed-btn active">x1</button><button data-speed="2" class="speed-btn">x2</button><button data-speed="5" class="speed-btn">x5</button><button data-speed="0" class="speed-btn">|&lt;</button></div>
  <button id="fs-btn">🖥 Fullscreen</button>
</div>

<div id="popover"></div>

<div id="notification-area"></div>

<div id="bot-context-menu">
  <ul><li class="ctx-reset"><span class="label">Reset Status</span></li><li class="ctx-force-error"><span class="label">Force Error</span></li></ul>
</div>

<footer>© 2025 MOLIAMA — AI Operations HQ. All rights reserved.</footer>

</body>
</html>
